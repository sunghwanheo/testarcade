<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쾅쾅 얼음깨기</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #001122;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #videoElement {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            opacity: 0.8;
        }

        #themeOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background:
                linear-gradient(to right,  rgba(0, 20, 60, 0.82) 0%, transparent 26%),
                linear-gradient(to left,   rgba(0, 20, 60, 0.82) 0%, transparent 26%),
                linear-gradient(to bottom, rgba(0, 10, 30, 0.45) 0%, transparent 14%);
            pointer-events: none;
            transition: background 0.5s;
        }

        .fever-mode-active #themeOverlay {
            background:
                linear-gradient(to right,  rgba(80, 0, 160, 0.85) 0%, transparent 26%),
                linear-gradient(to left,   rgba(80, 0, 160, 0.85) 0%, transparent 26%),
                linear-gradient(to bottom, rgba(40, 0, 80, 0.45)  0%, transparent 14%);
            animation: hueRotate 3s infinite linear;
        }

        .fever-mode-active #gameCanvas {
            animation: feverShakeCanvas 0.15s infinite alternate;
        }

        .fever-mode-active #videoElement {
            animation: feverShake 0.15s infinite alternate;
        }

        @keyframes hueRotate {
            from {
                filter: hue-rotate(0deg);
            }

            to {
                filter: hue-rotate(360deg);
            }
        }

        @keyframes feverShake {
            0%   { transform: scaleX(-1) translate( 3px,  2px); }
            25%  { transform: scaleX(-1) translate(-2px, -3px); }
            50%  { transform: scaleX(-1) translate( 2px, -1px); }
            75%  { transform: scaleX(-1) translate(-3px,  2px); }
            100% { transform: scaleX(-1) translate( 1px, -2px); }
        }

        @keyframes feverShakeCanvas {
            0%   { transform: translate( 3px,  2px); }
            25%  { transform: translate(-2px, -3px); }
            50%  { transform: translate( 2px, -1px); }
            75%  { transform: translate(-3px,  2px); }
            100% { transform: translate( 1px, -2px); }
        }

        .snow-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 2;
            animation: fall linear infinite;
        }

        .fever-mode-active .snow-particle {
            background: #ffffff;
            box-shadow: 0 0 10px #ff00ff;
            animation-duration: 2s !important;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        #gameCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        #ui {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 4;
            font-size: 42px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8);
            color: #dff9ff;
        }

        .ui-item span {
            color: #00ffff;
        }

        /* 오른쪽 게이지 UI */
        #rightUi {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .fever-title {
            position: absolute;
            top: 205px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 28px;
            font-weight: 900;
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff;
            letter-spacing: 2px;
            animation: none;
        }

        .fever-active-text {
            animation: pulseFever 0.3s infinite alternate !important;
            color: #ffff00;
            text-shadow: 0 0 20px #00ffff;
        }

        @keyframes pulseFever {
            from {
                transform: translateX(-50%) scale(1);
            }

            to {
                transform: translateX(-50%) scale(1.2);
            }
        }

        @keyframes endingBlink {
            0%   { opacity: 1;    transform: translateX(-50%) scale(1);    }
            100% { opacity: 0.15; transform: translateX(-50%) scale(0.92); }
        }
        @keyframes endingPop {
            0%   { opacity: 0; transform: translateX(-50%) scale(0.5);  }
            55%  { opacity: 1; transform: translateX(-50%) scale(1.25); }
            100% { opacity: 1; transform: translateX(-50%) scale(1);    }
        }

        #feverBarContainer {
            position: absolute;
            top: 175px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            width: 300px;
            height: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #ff00ff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        #feverBar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ff00ff, #00ffff);
            transition: width 0.1s;
            box-shadow: 0 0 20px #ff00ff;
        }

        .time-box {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 56px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8);
            transition: font-size 0.3s, color 0.3s, text-shadow 0.3s;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 15, 30, 0.85);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        button {
            padding: 20px 50px;
            font-size: 30px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.8);
            border-color: white;
        }

        #loadingMsg {
            display: none;
            margin-top: 20px;
            color: #00ffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }

        /* ── 보상 화면 ── */
        #rewardScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(30,0,80,0.92) 0%, rgba(0,5,20,0.96) 100%);
            backdrop-filter: blur(14px);
            overflow: hidden;
        }
        #rewardScreen .reward-stars {
            font-size: 90px;
            margin-bottom: 10px;
            animation: rewardBounce 0.8s ease-out;
        }
        #rewardScreen .reward-title {
            font-size: 72px;
            font-weight: 900;
            color: #ffe44d;
            text-shadow: 0 0 40px #ffaa00, 0 0 80px #ff6600, 0 4px 8px rgba(0,0,0,0.6);
            margin-bottom: 10px;
            animation: rewardPop 0.6s cubic-bezier(0.17, 0.67, 0.29, 1.4);
        }
        #rewardScreen .reward-subtitle {
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 30px;
            animation: rewardFadeUp 0.8s ease-out 0.3s both;
        }
        #rewardScreen .reward-score-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,200,50,0.5);
            border-radius: 24px;
            padding: 30px 60px;
            margin-bottom: 40px;
            text-align: center;
            animation: rewardFadeUp 0.8s ease-out 0.5s both;
        }
        #rewardScreen .reward-score-label {
            font-size: 24px;
            color: #aaddff;
            margin-bottom: 8px;
        }
        #rewardScreen .reward-score-value {
            font-size: 80px;
            font-weight: 900;
            color: #ff44ff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #cc00cc;
        }
        #rewardScreen .reward-msg {
            font-size: 26px;
            color: #ccffcc;
            margin-bottom: 30px;
            animation: rewardFadeUp 0.8s ease-out 0.7s both;
        }
        #rewardScreen .reward-btn {
            padding: 20px 50px;
            font-size: 30px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff9500, #ff2d55);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,100,50,0.6);
            transition: all 0.3s;
            animation: rewardFadeUp 0.8s ease-out 0.9s both;
        }
        #rewardScreen .reward-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255,100,50,0.9);
        }
        .confetti-piece {
            position: absolute;
            width: 12px; height: 12px;
            top: -20px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
        }
        @keyframes rewardPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes rewardBounce {
            0% { transform: scale(0) translateY(40px); opacity: 0; }
            60% { transform: scale(1.3) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); }
        }
        @keyframes rewardFadeUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
    <!-- MediaPipe files -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>

<body>
    <div id="container">
        <!-- 웹캠 영상 -->
        <video id="videoElement" autoplay playsinline></video>

        <!-- 테마 오버레이 -->
        <div id="themeOverlay"></div>

        <script>
            const overlayLayer = document.getElementById('themeOverlay');
            for (let i = 0; i < 40; i++) {
                let snow = document.createElement('div');
                snow.className = 'snow-particle';
                snow.style.left = Math.random() * 100 + 'vw';
                snow.style.top = (Math.random() * -100) + 'vh';
                snow.style.width = snow.style.height = (Math.random() * 5 + 3) + 'px';
                snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
                snow.style.animationDelay = (Math.random() * 5) + 's';
                overlayLayer.appendChild(snow);
            }
        </script>

        <canvas id="gameCanvas"></canvas>

        <div id="ui">
            <div class="ui-item">SCORE: <span id="score">0</span></div>
        </div>
        <div id="stageTitle" style="position:absolute; top:30px; left:40px; z-index:4; font-size:24px; font-weight:900; color:#ffdd00; text-shadow:0 0 15px rgba(255,220,0,0.8), 2px 2px 4px rgba(0,0,0,0.8);">Lv.1 얼음 동굴 (무기: 파란 마법장갑)</div>

        <div class="time-box" id="timeBox">01:00</div>

        <div id="feverBarContainer">
            <div id="feverBar"></div>
        </div>
        <div class="fever-title" id="feverTitle">FEVER</div>

        <div id="overlay">
            <h1 id="endTitle"
                style="color: #00ffff; font-size: 72px; margin-bottom: 20px; text-transform: uppercase; font-style: italic; text-shadow: 0 0 30px #00d2ff;">
                쾅쾅 얼음깨기</h1>
            <div
                style="background: rgba(0,0,0,0.5); padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; margin-bottom: 50px;">
                <p id="endDesc"
                    style="font-size: 26px; max-width: 700px; text-align: center; line-height: 1.6; color: #dff9ff; margin: 0;">
                    <b>1분</b> 동안 신나고 재미있게 얼음 큐브를 파괴하세요!<br><br>
                    거대한 얼음도 포기하지 않고 팡팡 두드리면 시원하게 터집니다.<br>
                    신나게 움직여서 <b>무지개 파티(FEVER)</b>를 켜면 모든 얼음이 반짝이며 터집니다!
                </p>
            </div>
            <!-- 임시 레벨 선택 -->
            <div id="levelSelect" style="margin-bottom:20px; display:flex; gap:12px; justify-content:center;">
                <button class="lvl-btn" data-lv="0" style="padding:12px 24px; font-size:20px; font-weight:bold; border:2px solid #00ffff; background:rgba(0,255,255,0.15); color:#00ffff; border-radius:8px; cursor:pointer;">Lv.1</button>
                <button class="lvl-btn" data-lv="1" style="padding:12px 24px; font-size:20px; font-weight:bold; border:2px solid #ffdd00; background:rgba(255,220,0,0.15); color:#ffdd00; border-radius:8px; cursor:pointer;">Lv.2</button>
                <button class="lvl-btn" data-lv="2" style="padding:12px 24px; font-size:20px; font-weight:bold; border:2px solid #ff66ff; background:rgba(255,100,255,0.15); color:#ff66ff; border-radius:8px; cursor:pointer;">Lv.3</button>
            </div>
            <button id="startButton">게임 시작 (카메라 권한 필요)</button>
            <div id="loadingMsg">AI 및 얼음 마법 준비중... 잠시만 기다려주세요!</div>
        </div>

        <!-- 보상 화면 -->
        <div id="rewardScreen">
            <div class="reward-stars" id="rewardStars"></div>
            <div class="reward-title" id="rewardTitle"></div>
            <div class="reward-subtitle" id="rewardSubtitle"></div>
            <div class="reward-score-box">
                <div class="reward-score-label">획득한 점수</div>
                <div class="reward-score-value" id="rewardScore"></div>
            </div>
            <div class="reward-msg" id="rewardMsg"></div>
            <button class="reward-btn" id="rewardBtn"></button>
        </div>

        <!-- 스테이지 프리뷰 오버레이 -->
        <div id="stagePreview" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,10,30,0.92); z-index:15; flex-direction:column; justify-content:center; align-items:center;
            backdrop-filter:blur(12px);">
            <h1 id="previewTitle" style="color:#00ffff; font-size:64px; margin-bottom:10px; text-shadow:0 0 30px #00d2ff;
                text-transform:uppercase; font-style:italic; animation: pulse 1s infinite alternate;"></h1>
            <p id="previewWeapon" style="font-size:36px; color:#ffdd00; margin:0 0 30px 0; text-shadow:0 0 15px #ffdd00;"></p>

            <div style="display:flex; gap:40px; margin-bottom:40px; flex-wrap:wrap; justify-content:center;" id="previewItems"></div>

            <div id="previewCountdown" style="font-size:100px; font-weight:900; color:#ffffff;
                text-shadow:0 0 40px #00ffff, 0 0 80px #ff00ff; animation: pulse 0.5s infinite alternate;"></div>
        </div>
    </div>

    <script>
        // -------------------------
        // Matter.js 설정
        // -------------------------
        const Engine = Matter.Engine,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Body = Matter.Body;

        const engine = Engine.create();
        const world = engine.world;

        // DOM 
        const container = document.getElementById('container');
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const scoreElement = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const loadingMsg = document.getElementById('loadingMsg');
        const feverTitle = document.getElementById('feverTitle');
        const feverBar = document.getElementById('feverBar');
        const timeBox = document.getElementById('timeBox');

        // 상태
        let isPlaying = false;
        let isExploding = false;
        let score = 0;
        let gameTimeLeft = 60.0; // 1분
        let gameTime = 0; // 애니메이션용 누적 시간

        // ─────────────────────────────────────────
        // Web Audio 소리 시스템
        // ─────────────────────────────────────────
        let audioCtx = null;
        let lastTickSecond = -1;

        // 째깍 소리 (초마다)
        function playTick(secondsLeft) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;

            // 1초 남았을 때는 좀 더 강하고 낮은 소리
            const isLast = secondsLeft <= 3;
            const freq   = isLast ? 900 : 1200;
            const vol    = isLast ? 0.5 : 0.3;

            // 클릭 노이즈
            const nBuf  = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
            const nData = nBuf.getChannelData(0);
            for (let i = 0; i < nData.length; i++)
                nData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / nData.length, 4);
            const noise = audioCtx.createBufferSource();
            noise.buffer = nBuf;
            const nHp = audioCtx.createBiquadFilter();
            nHp.type = 'highpass'; nHp.frequency.value = 3000;
            const nGain = audioCtx.createGain();
            nGain.gain.setValueAtTime(vol * 0.6, t);
            nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
            noise.connect(nHp); nHp.connect(nGain); nGain.connect(audioCtx.destination);
            noise.start(t); noise.stop(t + 0.04);

            // 음정 클릭
            const osc = audioCtx.createOscillator();
            const oGain = audioCtx.createGain();
            osc.connect(oGain); oGain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.06);
            oGain.gain.setValueAtTime(vol, t);
            oGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
            osc.start(t); osc.stop(t + 0.06);
        }

        // TIME'S UP!! 종료음
        function playTimeUpSound() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;

            // 낮은 "둥~" 벨 소리
            const bell = audioCtx.createOscillator();
            const bGain = audioCtx.createGain();
            bell.connect(bGain); bGain.connect(audioCtx.destination);
            bell.type = 'sine';
            bell.frequency.setValueAtTime(220, t);
            bell.frequency.exponentialRampToValueAtTime(110, t + 1.2);
            bGain.gain.setValueAtTime(0.8, t);
            bGain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
            bell.start(t); bell.stop(t + 1.2);

            // 고음 하모닉
            const h = audioCtx.createOscillator();
            const hGain = audioCtx.createGain();
            h.connect(hGain); hGain.connect(audioCtx.destination);
            h.type = 'sine';
            h.frequency.setValueAtTime(440, t);
            h.frequency.exponentialRampToValueAtTime(220, t + 0.8);
            hGain.gain.setValueAtTime(0.4, t);
            hGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
            h.start(t); h.stop(t + 0.8);
        }

        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // ── 노이즈 버퍼 생성 유틸 ──
        function createNoiseBuffer(duration, decay) {
            const len = audioCtx.sampleRate * duration;
            const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < len; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
            }
            return buf;
        }

        // ── 타격음: 얼음을 주먹으로 치는 소리 ──
        function playHit(stageIdx, blockType, iceVariant, scaleFactor) {
            ensureAudio();
            const t = audioCtx.currentTime;
            const sf = scaleFactor || 1;
            const w = Math.min(sf / 3, 2.0); // 무게감 계수 (0.33~2.0)

            if (blockType === 'bomb') {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.1);
                g.gain.setValueAtTime(0.4, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                osc.start(t); osc.stop(t + 0.12);
                return;
            }

            // ── 얼음 타격: 크기에 비례하는 무게감 ──
            // 큰 블록: 피치 낮고, 볼륨 크고, 지속 길게
            // 작은 블록: 피치 높고, 볼륨 작고, 짧고 가볍게

            const pitchMul = Math.max(0.4, 1.3 - w * 0.4); // 큰 블록 = 낮은 피치
            const volMul = 0.5 + w * 0.4; // 큰 블록 = 큰 볼륨
            const durMul = 0.7 + w * 0.3; // 큰 블록 = 긴 지속

            // 1) 충격 노이즈
            const noiseDur = 0.1 * durMul;
            const noiseBuf = createNoiseBuffer(noiseDur, 2);
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuf;
            const hpFilter = audioCtx.createBiquadFilter();
            hpFilter.type = 'highpass';
            const ng = audioCtx.createGain();
            noise.connect(hpFilter); hpFilter.connect(ng); ng.connect(audioCtx.destination);

            // 2) 얼음 공명
            const ring = audioCtx.createOscillator();
            const rg = audioCtx.createGain();
            ring.connect(rg); rg.connect(audioCtx.destination);
            ring.type = 'sine';

            // 3) 저음 펀치 — 큰 블록일수록 더 깊고 세게
            const punch = audioCtx.createOscillator();
            const pg = audioCtx.createGain();
            punch.connect(pg); pg.connect(audioCtx.destination);
            punch.type = 'sine';
            const punchFreq = Math.max(30, 120 * pitchMul);
            const punchDur = 0.08 + w * 0.06;
            punch.frequency.setValueAtTime(punchFreq, t);
            punch.frequency.exponentialRampToValueAtTime(punchFreq * 0.25, t + punchDur);
            pg.gain.setValueAtTime(Math.min(1.0, 0.6 * volMul), t);
            pg.gain.exponentialRampToValueAtTime(0.001, t + punchDur);
            punch.start(t); punch.stop(t + punchDur);

            if (iceVariant === 3) {
                // 빙하: 묵직한 "쿵탁!"
                hpFilter.frequency.setValueAtTime(600 * pitchMul, t);
                ng.gain.setValueAtTime(Math.min(1.0, 0.9 * volMul), t);
                const nd = 0.14 * durMul;
                ng.gain.exponentialRampToValueAtTime(0.001, t + nd);
                ring.frequency.setValueAtTime(300 * pitchMul, t);
                ring.frequency.exponentialRampToValueAtTime(150 * pitchMul, t + 0.18 * durMul);
                rg.gain.setValueAtTime(Math.min(1.0, 0.5 * volMul), t);
                rg.gain.exponentialRampToValueAtTime(0.001, t + 0.18 * durMul);
                noise.start(t); noise.stop(t + nd);
                ring.start(t); ring.stop(t + 0.18 * durMul);
            } else if (iceVariant === 2) {
                // 서리: 단단한 "딱!"
                hpFilter.frequency.setValueAtTime(1500 * pitchMul, t);
                ng.gain.setValueAtTime(Math.min(1.0, 0.8 * volMul), t);
                const nd = 0.1 * durMul;
                ng.gain.exponentialRampToValueAtTime(0.001, t + nd);
                ring.frequency.setValueAtTime(600 * pitchMul, t);
                ring.frequency.exponentialRampToValueAtTime(350 * pitchMul, t + 0.12 * durMul);
                rg.gain.setValueAtTime(Math.min(1.0, 0.45 * volMul), t);
                rg.gain.exponentialRampToValueAtTime(0.001, t + 0.12 * durMul);
                noise.start(t); noise.stop(t + nd);
                ring.start(t); ring.stop(t + 0.12 * durMul);
            } else if (iceVariant === 1) {
                // 눈덩이: "퍽!"
                hpFilter.frequency.setValueAtTime(300 * pitchMul, t);
                ng.gain.setValueAtTime(Math.min(1.0, 0.6 * volMul), t);
                const nd = 0.1 * durMul;
                ng.gain.exponentialRampToValueAtTime(0.001, t + nd);
                ring.frequency.setValueAtTime(250 * pitchMul, t);
                ring.frequency.exponentialRampToValueAtTime(120 * pitchMul, t + 0.1 * durMul);
                rg.gain.setValueAtTime(0.2 * volMul, t);
                rg.gain.exponentialRampToValueAtTime(0.001, t + 0.1 * durMul);
                noise.start(t); noise.stop(t + nd);
                ring.start(t); ring.stop(t + 0.1 * durMul);
            } else {
                // 투명 얼음 / 크리스탈: "칙!"
                hpFilter.frequency.setValueAtTime(2500 * pitchMul, t);
                ng.gain.setValueAtTime(Math.min(1.0, 0.75 * volMul), t);
                const nd = 0.09 * durMul;
                ng.gain.exponentialRampToValueAtTime(0.001, t + nd);
                const baseFreq = ((iceVariant === 4) ? 1200 : 800) * pitchMul;
                ring.frequency.setValueAtTime(baseFreq, t);
                ring.frequency.exponentialRampToValueAtTime(baseFreq * 0.4, t + 0.15 * durMul);
                rg.gain.setValueAtTime(Math.min(1.0, 0.4 * volMul), t);
                rg.gain.exponentialRampToValueAtTime(0.001, t + 0.15 * durMul);
                noise.start(t); noise.stop(t + nd);
                ring.start(t); ring.stop(t + 0.15 * durMul);
            }
        }

        // ── 파괴음: 얼음이 박살나는 소리 ──
        function playDestroy(stageIdx, blockType, iceVariant) {
            ensureAudio();
            const t = audioCtx.currentTime;

            if (blockType === 'bomb') {
                // 스타 폭발: 쿵! + 반짝임
                const bass = audioCtx.createOscillator();
                const bg = audioCtx.createGain();
                bass.connect(bg); bg.connect(audioCtx.destination);
                bass.type = 'sine';
                bass.frequency.setValueAtTime(80, t);
                bass.frequency.exponentialRampToValueAtTime(20, t + 0.6);
                bg.gain.setValueAtTime(0.8, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                bass.start(t); bass.stop(t + 0.6);

                const noise = audioCtx.createBufferSource();
                noise.buffer = createNoiseBuffer(0.3, 2);
                const ng = audioCtx.createGain();
                noise.connect(ng); ng.connect(audioCtx.destination);
                ng.gain.setValueAtTime(0.5, t);
                ng.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                noise.start(t); noise.stop(t + 0.3);
                return;
            }

            // ── 얼음 파괴: 크게 박살! "파삭!!!" + 파편 쨍쨍 + 저음 쿵 ──
            const v = iceVariant || 0;

            // 1) 큰 충격 노이즈 — 깨지는 순간 "파삭!!!"
            const crackNoise = audioCtx.createBufferSource();
            const crackDur = (v === 3) ? 0.25 : (v === 1) ? 0.15 : 0.2;
            crackNoise.buffer = createNoiseBuffer(crackDur, 1.8);
            const crackFilter = audioCtx.createBiquadFilter();
            crackFilter.type = 'bandpass';
            const crackGain = audioCtx.createGain();
            crackNoise.connect(crackFilter); crackFilter.connect(crackGain); crackGain.connect(audioCtx.destination);

            // 2) 파편 잔향 — 얼음 조각들이 흩어지며 "쨍쨍"
            const shard1 = audioCtx.createOscillator();
            const sg1 = audioCtx.createGain();
            shard1.connect(sg1); sg1.connect(audioCtx.destination);
            shard1.type = 'sine';

            const shard2 = audioCtx.createOscillator();
            const sg2 = audioCtx.createGain();
            shard2.connect(sg2); sg2.connect(audioCtx.destination);
            shard2.type = 'sine';

            // 3) 저음 충격 — 묵직한 "쿵!!!"
            const impact = audioCtx.createOscillator();
            const ig = audioCtx.createGain();
            impact.connect(ig); ig.connect(audioCtx.destination);
            impact.type = 'sine';

            // 4) 추가 크랙 노이즈 — 갈라지는 소리 레이어
            const crack2 = audioCtx.createBufferSource();
            crack2.buffer = createNoiseBuffer(0.1, 3);
            const c2Filter = audioCtx.createBiquadFilter();
            c2Filter.type = 'highpass';
            c2Filter.frequency.setValueAtTime(4000, t);
            const c2g = audioCtx.createGain();
            crack2.connect(c2Filter); c2Filter.connect(c2g); c2g.connect(audioCtx.destination);
            c2g.gain.setValueAtTime(0.6, t);
            c2g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            crack2.start(t); crack2.stop(t + 0.1);

            if (v === 3) {
                // 빙하: 깊은 "쿠아악!!!" — 저음 최대 + 긴 잔향
                crackFilter.frequency.setValueAtTime(1200, t);
                crackFilter.Q.setValueAtTime(1, t);
                crackGain.gain.setValueAtTime(1.0, t);
                crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                crackNoise.start(t); crackNoise.stop(t + 0.25);

                impact.frequency.setValueAtTime(80, t);
                impact.frequency.exponentialRampToValueAtTime(20, t + 0.5);
                ig.gain.setValueAtTime(1.0, t);
                ig.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                impact.start(t); impact.stop(t + 0.5);

                shard1.frequency.setValueAtTime(500, t + 0.05);
                shard1.frequency.exponentialRampToValueAtTime(200, t + 0.45);
                sg1.gain.setValueAtTime(0.4, t + 0.05);
                sg1.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
                shard1.start(t + 0.05); shard1.stop(t + 0.45);

                shard2.frequency.setValueAtTime(350, t + 0.08);
                shard2.frequency.exponentialRampToValueAtTime(120, t + 0.5);
                sg2.gain.setValueAtTime(0.3, t + 0.08);
                sg2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                shard2.start(t + 0.08); shard2.stop(t + 0.5);
            } else if (v === 1) {
                // 눈덩이: "푸삭!" — 부드럽지만 크게
                crackFilter.frequency.setValueAtTime(600, t);
                crackFilter.Q.setValueAtTime(0.5, t);
                crackGain.gain.setValueAtTime(0.7, t);
                crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                crackNoise.start(t); crackNoise.stop(t + 0.15);

                impact.frequency.setValueAtTime(120, t);
                impact.frequency.exponentialRampToValueAtTime(35, t + 0.3);
                ig.gain.setValueAtTime(0.7, t);
                ig.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                impact.start(t); impact.stop(t + 0.3);

                shard1.frequency.setValueAtTime(400, t + 0.03);
                shard1.frequency.exponentialRampToValueAtTime(150, t + 0.2);
                sg1.gain.setValueAtTime(0.25, t + 0.03);
                sg1.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                shard1.start(t + 0.03); shard1.stop(t + 0.2);

                sg2.gain.setValueAtTime(0, t);
                shard2.start(t); shard2.stop(t + 0.01);
            } else {
                // 투명얼음/서리/크리스탈: 날카로운 "파삭!!!" + 쨍쨍 크게
                const isHigh = (v === 4);
                crackFilter.frequency.setValueAtTime(isHigh ? 3500 : 2000, t);
                crackFilter.Q.setValueAtTime(1.5, t);
                crackGain.gain.setValueAtTime(0.9, t);
                crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                crackNoise.start(t); crackNoise.stop(t + 0.2);

                impact.frequency.setValueAtTime(150, t);
                impact.frequency.exponentialRampToValueAtTime(30, t + 0.35);
                ig.gain.setValueAtTime(0.8, t);
                ig.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                impact.start(t); impact.stop(t + 0.35);

                const f1 = isHigh ? 1800 : 1000;
                shard1.frequency.setValueAtTime(f1, t + 0.02);
                shard1.frequency.exponentialRampToValueAtTime(f1 * 0.3, t + 0.35);
                sg1.gain.setValueAtTime(0.4, t + 0.02);
                sg1.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                shard1.start(t + 0.02); shard1.stop(t + 0.35);

                const f2 = isHigh ? 2400 : 1400;
                shard2.frequency.setValueAtTime(f2, t + 0.04);
                shard2.frequency.exponentialRampToValueAtTime(f2 * 0.25, t + 0.4);
                sg2.gain.setValueAtTime(0.3, t + 0.04);
                sg2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                shard2.start(t + 0.04); shard2.stop(t + 0.4);
            }
        }

        function playFeverStart() {
            ensureAudio();
            const t = audioCtx.currentTime;
            [261.6, 329.6, 392, 523.3].forEach((freq, i) => {
                const osc  = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const st = t + i * 0.08;
                gain.gain.setValueAtTime(0, st);
                gain.gain.linearRampToValueAtTime(0.4, st + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, st + 0.5);
                osc.start(st); osc.stop(st + 0.5);
            });
        }

        // 피버 BGM 시스템 (신나는 루프 음악)
        let feverBgmNodes = null;

        function startFeverBgm() {
            ensureAudio();
            if (feverBgmNodes) stopFeverBgm();

            const t = audioCtx.currentTime;
            const masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, t);
            masterGain.gain.linearRampToValueAtTime(0.25, t + 0.3);
            masterGain.connect(audioCtx.destination);

            const nodes = [];

            // 베이스 드럼 (4비트 반복)
            const beatInterval = 0.25; // 240 BPM
            const loopLen = 2.0;       // 2초 루프
            const totalBeats = Math.floor(loopLen / beatInterval);

            function scheduleDrumLoop(startTime) {
                for (let i = 0; i < totalBeats; i++) {
                    const bt = startTime + i * beatInterval;
                    const kick = audioCtx.createOscillator();
                    const kickG = audioCtx.createGain();
                    kick.connect(kickG); kickG.connect(masterGain);
                    kick.type = 'sine';
                    kick.frequency.setValueAtTime(150, bt);
                    kick.frequency.exponentialRampToValueAtTime(40, bt + 0.1);
                    kickG.gain.setValueAtTime(0.6, bt);
                    kickG.gain.exponentialRampToValueAtTime(0.001, bt + 0.12);
                    kick.start(bt); kick.stop(bt + 0.12);
                    nodes.push(kick);

                    // 하이햇 (오프비트)
                    if (i % 2 === 1) {
                        const hat = audioCtx.createOscillator();
                        const hatG = audioCtx.createGain();
                        hat.connect(hatG); hatG.connect(masterGain);
                        hat.type = 'square';
                        hat.frequency.setValueAtTime(8000, bt);
                        hatG.gain.setValueAtTime(0.08, bt);
                        hatG.gain.exponentialRampToValueAtTime(0.001, bt + 0.05);
                        hat.start(bt); hat.stop(bt + 0.05);
                        nodes.push(hat);
                    }
                }
            }

            // 멜로디 (밝은 아르페지오 루프)
            const melody = [523, 659, 784, 1047, 784, 659, 523, 659]; // C5-E5-G5-C6 아르페지오
            const noteLen = loopLen / melody.length;

            function scheduleMelodyLoop(startTime) {
                melody.forEach((freq, i) => {
                    const nt = startTime + i * noteLen;
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.connect(g); g.connect(masterGain);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, nt);
                    g.gain.setValueAtTime(0.18, nt);
                    g.gain.exponentialRampToValueAtTime(0.001, nt + noteLen * 0.9);
                    osc.start(nt); osc.stop(nt + noteLen);
                    nodes.push(osc);
                });
            }

            // 베이스라인
            const bassNotes = [131, 165, 196, 165]; // C3-E3-G3-E3
            const bassNoteLen = loopLen / bassNotes.length;

            function scheduleBassLoop(startTime) {
                bassNotes.forEach((freq, i) => {
                    const nt = startTime + i * bassNoteLen;
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.connect(g); g.connect(masterGain);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, nt);
                    g.gain.setValueAtTime(0.12, nt);
                    g.gain.exponentialRampToValueAtTime(0.02, nt + bassNoteLen * 0.8);
                    osc.start(nt); osc.stop(nt + bassNoteLen);
                    nodes.push(osc);
                });
            }

            // 5루프 스케줄 (피버 8초 커버)
            for (let loop = 0; loop < 5; loop++) {
                const lt = t + loop * loopLen;
                scheduleDrumLoop(lt);
                scheduleMelodyLoop(lt);
                scheduleBassLoop(lt);
            }

            feverBgmNodes = { masterGain, nodes };
        }

        function stopFeverBgm() {
            if (!feverBgmNodes) return;
            const t = audioCtx.currentTime;
            feverBgmNodes.masterGain.gain.cancelScheduledValues(t);
            feverBgmNodes.masterGain.gain.setValueAtTime(feverBgmNodes.masterGain.gain.value, t);
            feverBgmNodes.masterGain.gain.linearRampToValueAtTime(0, t + 0.3);
            // 모든 노드 정리
            setTimeout(() => {
                if (feverBgmNodes) {
                    feverBgmNodes.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
                    feverBgmNodes.masterGain.disconnect();
                    feverBgmNodes = null;
                }
            }, 400);
        }

        // ── 스테이지 배경음 시스템 ──
        let bgmNodes = null;
        let bgmInterval = null;

        function startBgm(stageIdx) {
            stopBgm();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const master = audioCtx.createGain();
            master.gain.value = 0.08; // 은은하게
            master.connect(audioCtx.destination);

            const nodes = [];

            // 스테이지별 음계와 템포
            const configs = [
                // Lv.1 얼음 동굴: 몽환적, 차분한 펜타토닉
                { notes: [261.6, 311.1, 349.2, 392.0, 466.2, 523.3, 466.2, 392.0],
                  bass: [130.8, 155.6, 174.6, 130.8], bpm: 100, wave: 'sine', bassWave: 'triangle', vol: 0.5 },
                // Lv.2 우주 운석: 약간 긴장감, 마이너
                { notes: [329.6, 369.99, 415.3, 493.88, 554.37, 493.88, 415.3, 369.99],
                  bass: [164.8, 185.0, 207.65, 164.8], bpm: 120, wave: 'triangle', bassWave: 'sawtooth', vol: 0.4 },
                // Lv.3 다이아몬드 성: 밝고 활기찬 메이저
                { notes: [523.3, 587.3, 659.3, 784.0, 880.0, 784.0, 659.3, 587.3],
                  bass: [261.6, 293.7, 329.6, 261.6], bpm: 140, wave: 'triangle', bassWave: 'triangle', vol: 0.45 },
            ];

            const cfg = configs[stageIdx] || configs[0];
            const beatMs = 60000 / cfg.bpm;
            let noteIdx = 0;
            let bassIdx = 0;

            // 패드 (지속음, 코드 분위기)
            const pad = audioCtx.createOscillator();
            const padG = audioCtx.createGain();
            pad.type = 'sine';
            pad.frequency.value = cfg.notes[0] / 2;
            padG.gain.value = 0.15;
            pad.connect(padG);
            padG.connect(master);
            pad.start();
            nodes.push(pad);

            // 멜로디 + 베이스를 setInterval로 스케줄링
            bgmInterval = setInterval(() => {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;

                // 멜로디 음
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = cfg.wave;
                osc.frequency.value = cfg.notes[noteIdx % cfg.notes.length];
                g.gain.setValueAtTime(cfg.vol * 0.5, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + beatMs / 1000 * 0.9);
                osc.connect(g);
                g.connect(master);
                osc.start(now);
                osc.stop(now + beatMs / 1000);

                // 매 4비트마다 베이스
                if (noteIdx % 2 === 0) {
                    const bass = audioCtx.createOscillator();
                    const bg = audioCtx.createGain();
                    bass.type = cfg.bassWave;
                    bass.frequency.value = cfg.bass[bassIdx % cfg.bass.length];
                    bg.gain.setValueAtTime(cfg.vol * 0.35, now);
                    bg.gain.exponentialRampToValueAtTime(0.001, now + beatMs / 1000 * 1.8);
                    bass.connect(bg);
                    bg.connect(master);
                    bass.start(now);
                    bass.stop(now + beatMs / 1000 * 2);
                    bassIdx++;
                }

                // 패드 음 천천히 변경
                pad.frequency.setTargetAtTime(cfg.notes[noteIdx % cfg.notes.length] / 2, now, 0.5);

                noteIdx++;
            }, beatMs);

            bgmNodes = { master, nodes };
        }

        function stopBgm() {
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
            if (!bgmNodes) return;
            if (audioCtx) {
                const t = audioCtx.currentTime;
                bgmNodes.master.gain.cancelScheduledValues(t);
                bgmNodes.master.gain.setValueAtTime(bgmNodes.master.gain.value, t);
                bgmNodes.master.gain.linearRampToValueAtTime(0, t + 0.5);
                setTimeout(() => {
                    if (bgmNodes) {
                        bgmNodes.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
                        bgmNodes.master.disconnect();
                        bgmNodes = null;
                    }
                }, 600);
            } else {
                bgmNodes = null;
            }
        }

        let feverValue = 0; // 0 to 100
        let isFeverMode = false;
        let feverTimer = 0.0; // 피버 지속 시간
        const FEVER_DURATION = 8.0;

        let particles = [];
        let bodyPoints = [];
        let prevBodyPos = {}; // id -> { x, y } 이전 프레임 위치 추적
        let hitFlashMap = {}; // id -> { timer, maxTimer } 손/발 타격 플래시
        let blockSpawnTimer = 0;

        // 폭탄 충격파 이펙트
        let shockwaves = [];
        function spawnShockwave(x, y, maxRadius) {
            shockwaves.push({ x, y, radius: 0, maxRadius, alpha: 1.0 });
        }

        // 화면 흔들기
        function screenShake(duration, intensity) {
            const el = document.getElementById('container');
            const start = Date.now();
            function shake() {
                const elapsed = Date.now() - start;
                if (elapsed > duration) {
                    el.style.transform = '';
                    return;
                }
                const decay = 1 - elapsed / duration;
                const dx = (Math.random() - 0.5) * 2 * intensity * decay;
                const dy = (Math.random() - 0.5) * 2 * intensity * decay;
                el.style.transform = `translate(${dx}px, ${dy}px)`;

        let ground, leftWall, rightWall, topWall;

        // wallR: 벽/바닥 탄성계수, addTop: 천장 벽 추가 여부 (Lv.3용)
        function updateBounds(wallR = 0.1, addTop = false) {

        // 스테이지별 물리 설정
        const STAGE_PHYSICS = [

            // Lv.3: Lv.1과 같은 물리
            { gravity: 1.0,  wallR: 0.1,  addTop: false,

        // 파편 효과
        class IceParticle {
            constructor(x, y, isFever) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 300 + Math.random() * 800; // 넓게 튀김
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.size = 15 + Math.random() * 25;
                this.rotation = Math.random() * Math.PI;

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += 1500 * dt; // 중력 강하게
                this.life -= dt * 1.5;
                this.rotation += this.rotSpeed * dt;
                return this.life > 0;

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.isFever ? '#ff00ff' : '#00ffff';
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size / 2, this.size);
                ctx.lineTo(-this.size / 2, this.size);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

        function spawnShatter(x, y, count = 30, isFever = false) {

        // 스타 파티클: 별 모양으로 사방에 튀는 황금 이펙트

                this.rotSpeed = (Math.random() - 0.5) * 12;
                const palette = ['#ffd700', '#ffe966', '#ffffff', '#fff0a0', '#ffcc00'];
                this.color = palette[Math.floor(Math.random() * palette.length)];

            update(dt) {

                this.vx *= (1 - dt * 1.5); // 공기 저항
                this.life -= dt * this.decay;
                this.rotation += this.rotSpeed * dt;
                return this.life > 0;

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);

                    ctx.lineTo(Math.cos(a2) * r, Math.sin(a2) * r);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // ─────────────────────────────────────────

        // Stage 0: 얼음 주먹 — 얼음 결정 8개가 손 주위에 회전
        function drawIceFist(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            // 외부 오라
            ctx.globalCompositeOperation = 'lighter';
            const aura = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 2.2);
            aura.addColorStop(0,   'rgba(180, 245, 255, 0.55)');
            aura.addColorStop(0.5, 'rgba(0,  190, 255, 0.25)');
            aura.addColorStop(1,   'rgba(0,   80, 200, 0)');
            ctx.fillStyle = aura;
            ctx.beginPath(); ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // 얼음 결정 8개 (천천히 자전)
            const NUM = 8;
            ctx.rotate(t * 0.4);
            for (let i = 0; i < NUM; i++) {
                ctx.save();
                ctx.rotate((i / NUM) * Math.PI * 2);
                const len = r * (1.1 + 0.22 * Math.sin(t * 2.5 + i));
                const wid = r * 0.22;
                const grad = ctx.createLinearGradient(0, -r * 0.5, 0, -(r * 0.5 + len));
                grad.addColorStop(0,   'rgba(220, 248, 255, 0.95)');
                grad.addColorStop(0.4, 'rgba(100, 210, 255, 0.85)');
                grad.addColorStop(1,   'rgba(255, 255, 255, 0.3)');
                ctx.shadowBlur  = 14; ctx.shadowColor = '#00d4ff';
                ctx.fillStyle   = grad;
                // 마름모 결정 모양
                ctx.beginPath();
                ctx.moveTo(0, -r * 0.5);
                ctx.lineTo(wid * 0.55,  -(r * 0.5 + len * 0.35));
                ctx.lineTo(0,           -(r * 0.5 + len));
                ctx.lineTo(-wid * 0.55, -(r * 0.5 + len * 0.35));
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 코어 (얼음 구슬)
            ctx.shadowBlur = 25; ctx.shadowColor = '#80eeff';
            const core = ctx.createRadialGradient(0, -r * 0.1, 0, 0, 0, r * 0.65);
            core.addColorStop(0,   'rgba(255, 255, 255, 1)');
            core.addColorStop(0.4, 'rgba(160, 235, 255, 0.92)');
            core.addColorStop(1,   'rgba(0,   160, 220, 0.6)');
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // Stage 1: 불꽃 주먹 — 화염이 손에서 뿜어나옴
        function drawFireFist(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            // 외부 열기
            ctx.globalCompositeOperation = 'lighter';
            const heat = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 2.4);
            heat.addColorStop(0,   'rgba(255, 200, 50,  0.5)');
            heat.addColorStop(0.4, 'rgba(255,  80,  0,  0.25)');
            heat.addColorStop(1,   'rgba(200,   0,  0,  0)');
            ctx.fillStyle = heat;
            ctx.beginPath(); ctx.arc(0, 0, r * 2.4, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // 화염 6줄기
            const NUM = 6;
            for (let i = 0; i < NUM; i++) {
                ctx.save();
                ctx.rotate((i / NUM) * Math.PI * 2 + t * 0.8);
                const len = r * (1.25 + 0.38 * Math.sin(t * 4.5 + i * 1.3));
                const wid = r * (0.32 + 0.08 * Math.sin(t * 3 + i));
                const flameGrad = ctx.createLinearGradient(0, -r * 0.35, 0, -(r * 0.35 + len));
                flameGrad.addColorStop(0,   'rgba(255, 230,  60, 0.95)');
                flameGrad.addColorStop(0.35,'rgba(255, 110,   0, 0.85)');
                flameGrad.addColorStop(0.7, 'rgba(220,  30,   0, 0.5)');
                flameGrad.addColorStop(1,   'rgba(150,   0,   0, 0)');
                ctx.shadowBlur = 18; ctx.shadowColor = '#ff5500';
                ctx.fillStyle  = flameGrad;
                const base = -r * 0.35;
                const wobble = wid * 0.4 * Math.sin(t * 6 + i * 2);
                ctx.beginPath();
                ctx.moveTo(-wid * 0.5, base);
                ctx.bezierCurveTo(-wid * 0.6, base - len * 0.3, wobble, base - len * 0.65, 0, base - len);
                ctx.bezierCurveTo(-wobble, base - len * 0.65, wid * 0.6, base - len * 0.3, wid * 0.5, base);
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 코어 (불덩어리)
            ctx.shadowBlur = 30; ctx.shadowColor = '#ff8800';
            const core = ctx.createRadialGradient(0, -r * 0.08, 0, 0, 0, r * 0.68);
            core.addColorStop(0,   'rgba(255, 248, 180, 1)');
            core.addColorStop(0.45,'rgba(255, 160,   0, 0.9)');
            core.addColorStop(1,   'rgba(200,  40,   0, 0.7)');
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.68, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // Stage 2: 번개 검 — 손에서 에너지 검이 뻗어나옴 + 전기 아크
        function drawLightningBlade(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            // 자기장 오라
            ctx.globalCompositeOperation = 'lighter';
            const field = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 2.0);
            field.addColorStop(0,   'rgba(200, 80, 255, 0.5)');
            field.addColorStop(0.5, 'rgba(100,  0, 255, 0.25)');
            field.addColorStop(1,   'rgba(0,    0, 200, 0)');
            ctx.fillStyle = field;
            ctx.beginPath(); ctx.arc(0, 0, r * 2.0, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // 검 본체 (위쪽으로 뻗음)
            const bladeLen = r * 3.8;
            const bladeW   = r * 0.28;
            const bladeGrad = ctx.createLinearGradient(0, -r * 0.5, 0, -r * 0.5 - bladeLen);
            bladeGrad.addColorStop(0,   'rgba(255, 255, 255, 0.98)');
            bladeGrad.addColorStop(0.2, 'rgba(210, 110, 255, 0.9)');
            bladeGrad.addColorStop(0.6, 'rgba(130,  0,  255, 0.65)');
            bladeGrad.addColorStop(1,   'rgba(60,   0,  180, 0)');
            ctx.shadowBlur  = 28; ctx.shadowColor = '#cc00ff';
            ctx.fillStyle   = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-bladeW * 0.5, -r * 0.5);
            ctx.lineTo( bladeW * 0.5, -r * 0.5);
            ctx.lineTo(0, -r * 0.5 - bladeLen);
            ctx.closePath(); ctx.fill();

            // 전기 아크 (검을 따라 지직거림)
            for (let i = 0; i < 5; i++) {
                const prog    = 0.15 + (i / 5) * 0.82;
                const arcY    = -(r * 0.5 + bladeLen * prog);
                const maxAmp  = r * (0.35 - prog * 0.25);
                const amp     = maxAmp * Math.sin(t * 9 + i * 1.7);
                ctx.strokeStyle = `rgba(255, 200, 255, ${0.8 - prog * 0.4})`;
                ctx.lineWidth   = 2.5;
                ctx.shadowBlur  = 10; ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(-amp * 1.2, arcY - r * 0.18);
                ctx.lineTo(amp * 1.5,  arcY);
                ctx.lineTo(-amp * 0.7, arcY + r * 0.12);
                ctx.stroke();
            }

            // 손잡이 크로스가드
            ctx.shadowBlur  = 12; ctx.shadowColor = '#9900ff';
            ctx.fillStyle   = 'rgba(180, 80, 255, 0.85)';
            ctx.fillRect(-r * 0.7, -r * 0.65, r * 1.4, r * 0.22);

            // 코어 (에너지 구슬)
            ctx.shadowBlur = 32; ctx.shadowColor = '#dd00ff';
            const core = ctx.createRadialGradient(0, -r * 0.08, 0, 0, 0, r * 0.65);
            core.addColorStop(0,   'rgba(255, 255, 255, 1)');
            core.addColorStop(0.4, 'rgba(210, 100, 255, 0.92)');
            core.addColorStop(1,   'rgba(100,   0, 220, 0.6)');
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // Fever: 무지개 소용돌이 에너지
        function drawRainbowVortex(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            const ARMS = 7;
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < ARMS; i++) {
                ctx.save();
                ctx.rotate((i / ARMS) * Math.PI * 2 + t * 2.5);
                const hue = ((i / ARMS) * 360 + t * 110) % 360;
                const len = r * (2.2 + 0.5 * Math.sin(t * 3.5 + i));
                const wid = r * 0.38;
                const armGrad = ctx.createLinearGradient(0, 0, 0, -len);
                armGrad.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.85)`);
                armGrad.addColorStop(1, `hsla(${(hue+60)%360}, 100%, 60%, 0)`);
                ctx.shadowBlur = 22; ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                ctx.fillStyle  = armGrad;
                ctx.beginPath();
                ctx.moveTo(-wid * 0.25, 0);
                ctx.bezierCurveTo(-wid, -len * 0.28, wid * 0.5, -len * 0.55, 0, -len);
                ctx.bezierCurveTo(-wid * 0.5, -len * 0.55, wid, -len * 0.28, wid * 0.25, 0);
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 코어
            ctx.globalCompositeOperation = 'source-over';
            const pulse = 1 + 0.18 * Math.sin(t * 6);
            const hue   = (t * 130) % 360;
            ctx.shadowBlur = 45; ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
            const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.72 * pulse);
            core.addColorStop(0,   'rgba(255, 255, 255, 1)');
            core.addColorStop(0.5, `hsla(${hue}, 100%, 70%, 0.9)`);
            core.addColorStop(1,   `hsla(${hue}, 100%, 50%, 0)`);
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.72 * pulse, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // 장갑 그리기
        function drawGlove(ctx, x, y, r, stageIdx, fever) {
            ctx.save();
            ctx.translate(x, y);

            const gloveR = r * 0.55;
            let gloveColor, borderColor, shadowColor;

            if (fever) {
                gloveColor = 'rgba(255, 200, 255, 0.7)';
                borderColor = 'rgba(255, 255, 255, 0.9)';
                shadowColor = '#ff00ff';
            } else if (stageIdx === 0) {
                gloveColor = 'rgba(180, 230, 255, 0.6)';
                borderColor = 'rgba(200, 240, 255, 0.9)';
                shadowColor = '#00ccff';
            } else if (stageIdx === 1) {
                gloveColor = 'rgba(255, 150, 50, 0.6)';
                borderColor = 'rgba(255, 200, 100, 0.9)';
                shadowColor = '#ff6600';
            } else {
                gloveColor = 'rgba(220, 150, 255, 0.6)';
                borderColor = 'rgba(255, 200, 255, 0.9)';
                shadowColor = '#cc00ff';
            }

            // 장갑 본체 (둥근 주먹 모양)
            ctx.shadowColor = shadowColor;
            ctx.shadowBlur = 15;
            ctx.fillStyle = gloveColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, gloveR, gloveR * 1.15, 0, 0, Math.PI * 2);
            ctx.fill();

            // 테두리
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 손가락 마디 라인
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, -gloveR * 0.3, gloveR * 0.6, -Math.PI * 0.8, -Math.PI * 0.2);
            ctx.stroke();

            ctx.restore();
        }

        function drawWeapon(ctx, p, stageIdx, fever, t, hitFlash) {
            // 얼음 디버프 영역 안이면 이펙트 절반 크기
            const inIce = !fever && isInIceZone(p.x, p.y);
            const r = inIce ? p.radius * 0.5 : p.radius;

            // 장갑을 먼저 그리고 그 위에 무기 이펙트
            drawGlove(ctx, p.x, p.y, r, stageIdx, fever);

            if (inIce) {
                // 디버프 상태: 파란 얼어붙는 이펙트 추가
                ctx.save();
                ctx.globalAlpha = 0.4 + 0.2 * Math.sin(t * 5);
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 25;
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r * 1.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.font = `${Math.max(16, r * 0.5)}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = 0.7;
                ctx.fillText('❄️', p.x, p.y - r * 1.5);
                ctx.restore();
            }

            if (fever) { drawRainbowVortex(ctx, p.x, p.y, r, t); return; }
            if (stageIdx === 0) drawIceFist(ctx, p.x, p.y, r, t);
            else if (stageIdx === 1) drawFireFist(ctx, p.x, p.y, r, t);
            else drawLightningBlade(ctx, p.x, p.y, r, t);

            // 타격 순간 손/발 번쩍임 오버레이
            if (hitFlash) {
                const ft = hitFlash.timer / hitFlash.maxTimer; // 1→0
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';

                // 밝은 글로우 원 (빠르게 팽창 후 사라짐)
                const expand = 1 + (1 - ft) * 0.4; // 살짝 커지면서 사라짐
                const glowR = r * 1.2 * expand;
                const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
                glow.addColorStop(0, `rgba(255, 255, 255, ${ft * 0.7})`);
                glow.addColorStop(0.4, `rgba(255, 255, 255, ${ft * 0.3})`);
                glow.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        function spawnBlock() {
            const stageData  = STAGES[currentStageIndex];
            const phys       = STAGE_PHYSICS[currentStageIndex];
            const stage      = currentStageIndex;

            let scaleFactor  = 1 + Math.random() * 6.0;
            let size         = 60 * scaleFactor;
            const W = canvasElement.width, H = canvasElement.height;

            // 스테이지별 스폰 위치 및 형태
            let x, y;
            const options = phys.bodyOpts(scaleFactor);
            let block;
            let customVelocitySet = false;

            if (stage === 1 || stage === 2) {
                // Lv.2/3: 동그란 눈덩이(좌우 포물선) or 네모 블록(위에서 낙하)
                // Lv.2: clear rect + snow_round circle
                // Lv.3: clear rect + snow rect + snow_round circle
                const roundChance = stage === 2 ? 0.4 : 0.5;
                const isRound = Math.random() < roundChance;
                const mg2 = size + 50;
                if (isRound) {
                    // 동그란 눈덩이: 좌/우에서 자연스러운 포물선으로 진입
                    const fromLeft = Math.random() < 0.5;
                    x = fromLeft ? 5 : W - 5;
                    y = -size - 50;
                    block = Bodies.circle(x, y, size / 2, options);
                    Body.set(block, 'isStatic', false);
                    // 포물선: 수평으로 강하게 + 약간 아래로
                    const hSpd = 13 + Math.random() * 8;
                    const vx = fromLeft ? hSpd : -hSpd;
                    const vy = 1 + Math.random() * 2;
                    Body.setVelocity(block, { x: vx, y: vy });
                    Body.setAngularVelocity(block, (Math.random() - 0.5) * 0.3);
                    block.isRoundSnow = true;
                } else {
                    // 네모 블록: 위에서 낙하 (Lv.1과 동일)
                    x = mg2 + Math.random() * (W - mg2 * 2);
                    y = -size - 100;
                    block = Bodies.rectangle(x, y, size, size, options);
                }
                customVelocitySet = isRound; // 원형만 속도 직접 설정

            } else {
                // Lv.1: 위에서 낙하
                const margin = size + 50;
                x = margin + Math.random() * (W - margin * 2);
                y = -size - 100;
                block = Bodies.rectangle(x, y, size, size, options);
            }

            // 초기 속도 & 회전
            if (!customVelocitySet) {
                const vel = phys.initVel();
                Body.setVelocity(block, vel);
                Body.setAngularVelocity(block, phys.angVel());
            }

            block.isBlock         = true;
            block.maxHp           = Math.max(1, Math.floor(scaleFactor * stageData.hpMultiplier));
            block.hp              = block.maxHp;
            block.hitCooldown     = 0;
            block.timeSinceSpawn  = 0;
            block.rectWidth       = size;
            block.rectHeight      = size;
            block.scaleFactor     = scaleFactor;
            block.nudgeTimer      = 0; // Lv.3 랜덤 방향 재부여용
            block.hasEnteredScreen = false; // Lv.2 화면 진입 추적용

            // 특수 블록 결정
            const rng = Math.random();
            if (rng < 0.12) {
                // 스타 블록 (12%) - 터뜨리면 주변 블록도 같이 폭발!
                block.blockType = 'bomb';
                block.hp    = 5;
                block.maxHp = 5;
                Body.set(block, 'restitution', 0.01);
                Body.set(block, 'friction', 1.0);
                Body.set(block, 'frictionAir', 0.15);  // 공기저항 높여서 안 튀게
            } else if (stage === 2 && rng < 0.22) {
                // 얼음1 블록 (스테이지3 전용, 10%) - 터뜨리면 주변 영역 7초간 파워 1/5
                block.blockType = 'ice1';
                block.hp    = 3;
                block.maxHp = 3;
                Body.set(block, 'restitution', 0.01);
                Body.set(block, 'friction', 1.0);
                Body.set(block, 'frictionAir', 0.15);
            } else {
                block.blockType = 'normal';
                if (block.isRoundSnow) {
                    // 동그란 눈덩이 (모든 스테이지 공통)
                    block.iceVariant = 5; // snow_round
                    Body.set(block, 'density', block.density * 3.0);
                    Body.set(block, 'restitution', 0.2);
                    Body.set(block, 'friction', 0.5);
                    Body.set(block, 'frictionAir', 0.01);
                } else {
                    // 네모 블록 스테이지별 배리에이션
                    const allVariants = [
                        { id: 0, name: 'clear', densityMul: 1.0 },
                        { id: 1, name: 'snow',  densityMul: 4.0 },
                    ];
                    // Lv.1/3: clear+snow, Lv.2: clear만 (동그란 눈덩이가 snow 역할)
                    const pool = stage === 1
                        ? [allVariants[0]]
                        : [allVariants[0], allVariants[1]];
                    const v = pool[Math.floor(Math.random() * pool.length)];
                    block.iceVariant = v.id;
                    Body.set(block, 'density', block.density * v.densityMul);
                    if (v.id === 1) {
                        Body.set(block, 'restitution', 0.01);
                        Body.set(block, 'friction', 1.0);
                        Body.set(block, 'frictionAir', 0.12);
                    }
                }
            }

            Composite.add(world, block);
        }

        function updateUI() {
            scoreElement.innerText = score;

            // Time Text Update
            if (isExploding) return;
            let m = Math.floor(gameTimeLeft / 60);
            let s = Math.floor(gameTimeLeft % 60);
            timeBox.innerText = `0${m}:${s < 10 ? '0' + s : s}`;
            if (gameTimeLeft <= 5) {
                // 5초 미만: 빨간색, 크게, 강하게 펄스
                const urgency = 1 - (gameTimeLeft / 5); // 0→1
                const size = 56 + urgency * 40; // 56→96px
                timeBox.style.fontSize = `${size}px`;
                timeBox.style.color = '#ff3333';
                timeBox.style.textShadow = `0 0 ${20 + urgency * 40}px rgba(255, 50, 50, 0.9), 0 0 60px rgba(255, 0, 0, 0.5)`;
                timeBox.style.animation = 'pulseFever 0.2s infinite alternate';
            } else if (gameTimeLeft <= 10) {
                // 10초 미만: 노란→주황, 약간 커짐
                const urgency = 1 - ((gameTimeLeft - 5) / 5); // 0→1
                const size = 56 + urgency * 16; // 56→72px
                timeBox.style.fontSize = `${size}px`;
                timeBox.style.color = `rgb(255, ${Math.floor(255 - urgency * 100)}, ${Math.floor(50 - urgency * 50)})`;
                timeBox.style.textShadow = `0 0 ${15 + urgency * 20}px rgba(255, 200, 50, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8)`;
                timeBox.style.animation = 'pulseFever 0.3s infinite alternate';
            } else {
                timeBox.style.fontSize = '56px';
                timeBox.style.color = 'white';
                timeBox.style.textShadow = '0 0 15px rgba(255, 255, 255, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8)';
                timeBox.style.animation = 'none';
            }

            // Fever Update
            if (isFeverMode) {
                feverBar.style.width = `${(feverTimer / FEVER_DURATION) * 100}%`;
            } else {
                feverBar.style.width = `${feverValue}%`;
            }
        }

        function activateFever() {
            isFeverMode = true;
            feverTimer = FEVER_DURATION;
            feverValue = 0;
            container.classList.add('fever-mode-active');
            feverTitle.classList.add('fever-active-text');
            feverTitle.innerText = "PARTY!!";
            playFeverStart();
            startFeverBgm();
            // 배경음 볼륨 낮추기 (피버 BGM과 겹치지 않게)
            if (bgmNodes && audioCtx) {
                bgmNodes.master.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.3);
            }
        }

        function deactivateFever() {
            isFeverMode = false;
            feverTimer = 0;
            feverValue = 0;
            container.classList.remove('fever-mode-active');
            feverTitle.classList.remove('fever-active-text');
            feverTitle.innerText = "PARTY";
            stopFeverBgm();
            // 배경음 볼륨 복구
            if (bgmNodes && audioCtx) {
                bgmNodes.master.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.5);
            }
        }

        function addFever(amt) {
            if (isFeverMode || gameTimeLeft <= 0) return;
            feverValue += amt;
            if (feverValue >= 100) {
                feverValue = 100;
                activateFever();
            }
        }

        function gameOver() {
            isPlaying = false;
            isExploding = true;
            bodyPoints = [];
            lastTickSecond = -1;
            stopFeverBgm();
            stopBgm();
            playTimeUpSound();

            // ── 엔딩 텍스트 헬퍼 ──
            function setEndingText(text, color, size, shadowColor, blinkSpeed) {
                timeBox.innerText = text;
                timeBox.style.fontSize = size;
                timeBox.style.color = color;
                timeBox.style.textShadow = `0 0 30px ${shadowColor}, 0 0 60px ${shadowColor}, 2px 2px 6px rgba(0,0,0,0.8)`;
                timeBox.style.animation = 'none';
                // force reflow so pop animation restarts
                void timeBox.offsetWidth;
                timeBox.style.animation = `endingPop 0.35s ease-out forwards, endingBlink ${blinkSpeed}s infinite alternate ${0.35}s`;
            }

            // 즉시 첫 텍스트
            setEndingText('TIME\'S UP!!', '#ff4444', '68px', 'rgba(255,68,68,0.9)', '0.25');

            // ── 엔딩 연쇄폭발: 탕... 탕... 탕.. 탕. 탕탕탕 팡!! ──
            const cx = canvasElement.width / 2;
            const cy = canvasElement.height / 2;
            const W = canvasElement.width;
            const H = canvasElement.height;
            const margin = 80; // 블록 반경 여유값
            // 화면 밖 블록은 즉시 제거 (폭발 중 화면 안으로 떨어지지 않도록)
            Composite.allBodies(world).filter(b =>
                b.isBlock && (
                    b.position.x < -margin || b.position.x > W + margin ||
                    b.position.y < -margin || b.position.y > H + margin
                )
            ).forEach(b => Composite.remove(world, b));

            const blocks = Composite.allBodies(world).filter(b => b.isBlock);
            if (blocks.length > 0) {
                // 바깥쪽에서 안쪽 순으로 정렬 (마지막에 가운데가 터지도록)
                blocks.sort((a, b) =>
                    Math.hypot(b.position.x - cx, b.position.y - cy) -
                    Math.hypot(a.position.x - cx, a.position.y - cy)
                );

                const total = blocks.length;
                let delay = 600; // 첫 폭발 전 잠시 정적 (긴장감)

                blocks.forEach((b, idx) => {
                    const progress = idx / Math.max(total - 1, 1); // 0→1
                    // 처음엔 느리게(탕...탕...), 끝으로 갈수록 빠르게(탕탕탕팡!)
                    // ease-in 곡선: 간격이 점점 좁아짐
                    const baseInterval = 450; // 첫 간격
                    const minInterval = 60;   // 마지막 간격
                    const interval = baseInterval - (baseInterval - minInterval) * Math.pow(progress, 2);

                    const isLast = (idx === total - 1);

                    setTimeout(() => {
                        if (!Composite.allBodies(world).includes(b)) return;


                        // 폭발 크기: 마지막으로 갈수록 커짐
                        const explosionScale = 0.6 + progress * 1.4; // 0.6→2.0

                        // 폭발 이펙트
                        spawnShatter(b.position.x, b.position.y, Math.floor(30 * explosionScale + b.scaleFactor * 8), true);
                        spawnShockwave(b.position.x, b.position.y, Math.floor((150 + b.scaleFactor * 40) * explosionScale));
                        playDestroy(currentStageIndex, b.blockType, b.iceVariant);

                        // 점수
                        score += b.maxHp * 10;
                        updateUI();

                        // 화면 흔들림: 점점 세짐
                        const impact = Math.min(b.scaleFactor / 3, 1.5) * explosionScale;
                        screenShake(Math.floor(60 + impact * 80), Math.floor(2 + impact * 5));
                        flashAlpha = Math.max(flashAlpha, 0.05 + progress * 0.2);

                        // 히트스톱: 처음 큰 폭발들은 잠깐 멈춤 (드라마틱)
                        if (progress < 0.3) hitStopTimer = Math.max(hitStopTimer, 0.06);

                        Composite.remove(world, b);

                        // ── 마지막: 대폭발 피날레 ──
                        if (isLast) {
                            setTimeout(() => {
                                // 화면 중앙 대폭발
                                screenShake(500, 18);
                                flashAlpha = 0.7;
                                hitStopTimer = 0.1;
                                spawnShatter(cx, cy, 200, true);
                                spawnShockwave(cx, cy, 800);

                                // 피날레 사운드: 큰 저음
                                if (audioCtx) {
                                    const t = audioCtx.currentTime;
                                    const boom = audioCtx.createOscillator();
                                    const bg = audioCtx.createGain();
                                    boom.connect(bg); bg.connect(audioCtx.destination);
                                    boom.type = 'sine';
                                    boom.frequency.setValueAtTime(60, t);
                                    boom.frequency.exponentialRampToValueAtTime(15, t + 0.8);
                                    bg.gain.setValueAtTime(1.0, t);
                                    bg.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
                                    boom.start(t); boom.stop(t + 0.8);

                                    const n = audioCtx.createBufferSource();
                                    n.buffer = createNoiseBuffer(0.4, 1.5);
                                    const ng = audioCtx.createGain();
                                    n.connect(ng); ng.connect(audioCtx.destination);
                                    ng.gain.setValueAtTime(0.8, t);
                                    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                                    n.start(t); n.stop(t + 0.4);
                                }

                                setTimeout(() => {
                                    timeBox.style.animation = 'none';
                                    timeBox.style.opacity = '0';
                                    isExploding = false;
                                    showEndResult();
                                }, 800);
                            }, 300);
                        }
                    }, delay);
                    delay += interval;
                });
            } else {
                // 블록이 없으면 바로 결과
                isExploding = false;
                showEndResult();
            }
        }

        function showEndResult() {
            let isLastStage = (currentStageIndex >= STAGES.length - 1);
            showRewardScreen(score, isLastStage);

            if (isLastStage) {
                currentStageIndex = 0;
                score = 0;
            } else {
                currentStageIndex++;
            }
        }

        // ── 보상 화면 시스템 ──
        function showRewardScreen(finalScore, isAllClear) {
            const screen = document.getElementById('rewardScreen');
            screen.style.display = 'flex';

            // 별/이모지
            const starsEl = document.getElementById('rewardStars');
            if (isAllClear) {
                starsEl.textContent = '🏆🌟🏆';
            } else if (finalScore >= 300) {
                starsEl.textContent = '⭐⭐⭐';
            } else if (finalScore >= 150) {
                starsEl.textContent = '⭐⭐';
            } else {
                starsEl.textContent = '⭐';
            }
            // 리셋 애니메이션
            starsEl.style.animation = 'none';
            starsEl.offsetHeight;
            starsEl.style.animation = 'rewardBounce 0.8s ease-out';

            // 제목
            const titleEl = document.getElementById('rewardTitle');
            titleEl.textContent = isAllClear ? '모든 스테이지 클리어!' : 'STAGE CLEAR!';
