        function playRewardSound(isAllClear) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            // 팡파레 멜로디 (C E G C5 E5)
            const notes = isAllClear
                ? [523.25, 659.25, 783.99, 1046.5, 1318.5, 1568.0]
                : [523.25, 659.25, 783.99, 1046.5];

            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.25, now + i * 0.15);
                gain.gain.exponentialDecayToValueAtTime?.(0.01, now + i * 0.15 + 0.6) ||
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.6);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i * 0.15);
                osc.stop(now + i * 0.15 + 0.6);
            });

            // 심벌즈 느낌 노이즈
            const bufSize = audioCtx.sampleRate * 0.4;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buf;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.2, now + 0.1);
            ng.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            noise.connect(ng);
            ng.connect(audioCtx.destination);
            noise.start(now + 0.1);
            noise.stop(now + 0.5);
        }

        // ── 카운트다운 사운드 ──
        function playCountdownBeep(num) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            // 3→낮은음, 2→중간, 1→높은음 (점점 긴장감 UP)
            const freq = num === 3 ? 440 : num === 2 ? 554.37 : 659.25;

            // 메인 톤 (빵!)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + 0.25);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.25);

            // 킥 드럼 느낌 (뿌웅)
            const kick = audioCtx.createOscillator();
            const kickG = audioCtx.createGain();
            kick.type = 'sine';
            kick.frequency.setValueAtTime(150, now);
            kick.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            kickG.gain.setValueAtTime(0.4, now);
            kickG.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            kick.connect(kickG);
            kickG.connect(audioCtx.destination);
            kick.start(now);
            kick.stop(now + 0.15);
        }

        function playCountdownGo() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            // 상승 스윕 (빠~앙~~)
            const sweep = audioCtx.createOscillator();
            const sweepG = audioCtx.createGain();
            sweep.type = 'sawtooth';
            sweep.frequency.setValueAtTime(300, now);
            sweep.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
            sweepG.gain.setValueAtTime(0.2, now);
            sweepG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            sweep.connect(sweepG);
            sweepG.connect(audioCtx.destination);
            sweep.start(now);
            sweep.stop(now + 0.5);

            // 화음 팡파레 (C5 + E5 + G5)
            [1046.5, 1318.5, 1568.0].forEach(freq => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.2, now + 0.05);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                o.connect(g);
                g.connect(audioCtx.destination);
                o.start(now + 0.05);
                o.stop(now + 0.7);
            });

            // 노이즈 심벌 (쉬이~)
            const bufSize = audioCtx.sampleRate * 0.3;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.12;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buf;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.25, now + 0.02);
            ng.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            noise.connect(ng);
            ng.connect(audioCtx.destination);
            noise.start(now + 0.02);
            noise.stop(now + 0.35);
        }

        // -------------------------
        // MediaPipe Pose
        // -------------------------
        const pose = new Pose({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
            }
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: false,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        pose.onResults((results) => {
            bodyPoints = [];
            if (results.poseLandmarks) {
                const lms = results.poseLandmarks;
                const W = canvasElement.width;
                const H = canvasElement.height;

                // 화면 좌표 변환 (거울 반전)
                const toScreen = (lm) => ({
                    x: (1 - lm.x) * W,
                    y: lm.y * H
                });

                // 두 landmark 사이의 픽셀 거리
                const dist2D = (a, b) => {
                    const ax = (1 - a.x) * W, ay = a.y * H;
                    const bx = (1 - b.x) * W, by = b.y * H;
                    return Math.hypot(ax - bx, ay - by);
                };

                // 손 추적: 손목(wristIdx)과 검지(indexIdx) 사이 거리를 손 크기로 사용
                const trackHand = (wristIdx, indexIdx, pinkyIdx) => {
                    const wrist = lms[wristIdx];
                    const index = lms[indexIdx];
                    if (!wrist || !index) return null;
                    if (wrist.visibility < 0.4 || index.visibility < 0.4) return null;

                    // 손 크기: 손목~검지 픽셀 거리
                    let handSize = dist2D(wrist, index);

                    // 최소/최대 클램프 (너무 가까이/멀리 있을 때 대비)
                    handSize = Math.max(40, Math.min(handSize, 220));

                    // 중심 = 손목과 검지의 중간
                    const cx = (1 - (wrist.x + index.x) / 2) * W;
                    const cy = ((wrist.y + index.y) / 2) * H;

                    return { x: cx, y: cy, radius: handSize, type: 'hand', id: wristIdx };
                };

                // 발 추적: 발목~발끝 거리를 발 크기로 사용
                const trackFoot = (ankleIdx, toeIdx) => {
                    const ankle = lms[ankleIdx];
                    const toe   = lms[toeIdx];
                    if (!ankle || !toe) return null;
                    if (ankle.visibility < 0.4 || toe.visibility < 0.4) return null;

                    let footSize = dist2D(ankle, toe);
                    footSize = Math.max(35, Math.min(footSize, 180));

                    const cx = (1 - (ankle.x + toe.x) / 2) * W;
                    const cy = ((ankle.y + toe.y) / 2) * H;

                    return { x: cx, y: cy, radius: footSize, type: 'foot', id: ankleIdx };
                };

                const leftHand  = trackHand(15, 19, 17);
                const rightHand = trackHand(16, 20, 18);
                const leftFoot  = trackFoot(27, 31);
                const rightFoot = trackFoot(28, 32);

                const allParts = [leftHand, rightHand, leftFoot, rightFoot].filter(Boolean);
                for (const p of allParts) {
                    const prev = prevBodyPos[p.id];
                    if (prev) {
                        p.vx = (p.x - prev.x);
                        p.vy = (p.y - prev.y);
                    } else {
                        p.vx = 0;
                        p.vy = 0;
                    }
                    prevBodyPos[p.id] = { x: p.x, y: p.y };
                    bodyPoints.push(p);
                }
            }
        });

        // -------------------------
        // 게임 루프
        // -------------------------
        let lastTime = 0;

        function gameLoop(now) {
            if (!isPlaying && !isExploding) return;
            animationFrameId = requestAnimationFrame(gameLoop);

            const dtRaw = (now - lastTime) / 1000;
            lastTime = now;
            let dt = Math.min(dtRaw, 0.1);

            // 히트스톱: 일시 정지 효과
            if (hitStopTimer > 0) {
                hitStopTimer -= dtRaw;
                dt = 0; // 물리/타이머 멈춤, 렌더링은 계속
            }

            // 플래시 감소
            if (flashAlpha > 0) flashAlpha -= dtRaw * 1.5;

            gameTimeLeft -= dt;
            gameTime     += dt;

            // ── 10초 카운트다운 째깍 소리 ──
            if (isPlaying && gameTimeLeft > 0 && gameTimeLeft <= 10) {
                const currentSec = Math.ceil(gameTimeLeft);
                if (currentSec !== lastTickSecond) {
                    lastTickSecond = currentSec;
                    playTick(currentSec);
                }
            }

            if (gameTimeLeft <= 0 && isPlaying) {
                gameTimeLeft = 0;
                updateUI();
                gameOver();
                // return하지 않고 렌더링은 계속 (연쇄폭발 이펙트 표시를 위해)
            }

            if (isFeverMode) {
                feverTimer -= dt;
                if (feverTimer <= 0) {
                    deactivateFever();
                }
            }

            Engine.update(engine, dt * 1000);
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (isPlaying) {
            blockSpawnTimer -= dt;
            if (blockSpawnTimer <= 0) {
                spawnBlock();
                // 피버 모드일 때는 블럭 스폰 속도가 폭발적으로 증가
                if (isFeverMode) {
                    blockSpawnTimer = 0.4 + Math.random() * 0.2;
                } else {
                    let difficultSpeed = Math.min(score * 0.003, 0.8);
                    blockSpawnTimer = 2.5 - difficultSpeed + Math.random() * 0.8;
                }
            }
            }

            // 얼음 디버프 영역 타이머 업데이트
            for (let i = iceDebuffs.length - 1; i >= 0; i--) {
                iceDebuffs[i].remainTime -= dt;
                iceDebuffs[i].angle += dt * 1.2; // 초당 ~1.2라디안 회전
                iceDebuffs[i].alpha = Math.min(1.0, iceDebuffs[i].remainTime / 1.5);
                if (iceDebuffs[i].remainTime <= 0) {
                    iceDebuffs.splice(i, 1);
                }
            }

            const allBodies = Composite.allBodies(world);
            const blocks = allBodies.filter(b => b.isBlock);

            if (isPlaying) for (let b of blocks) {
                b.timeSinceSpawn += dt;
                if (b.hitCooldown > 0) b.hitCooldown -= dt;

                // 타격 검사 — 움직임이 있을 때만 히트
                for (let p of bodyPoints) {
                    let dx = b.position.x - p.x;
                    let dy = b.position.y - p.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    if (dist < p.radius + (b.rectWidth / 2) && b.hitCooldown <= 0 && speed > 20) {

                            // 무쌍(피버 모드)일 경우 데미지가 무한대!
                            // 얼음 디버프 영역 안이면 파워 1/5 (피버 모드엔 무시)
                            let damage;
                            if (isFeverMode) {
                                damage = 1000;
                            } else if (isInIceZone(p.x, p.y)) {
                                damage = ICE_DAMAGE_MULTIPLIER; // 0.2 데미지
                            } else {
                                damage = 1;
                            }
                            b.hp -= damage;

                            // 타격 쿨다운 적용. 피버일때는 바로바로 터지게 짧게.
                            b.hitCooldown = isFeverMode ? 0.05 : 0.4;

                            const sf = b.scaleFactor || 1; // 1~7
                            const weight = Math.min(sf / 4, 1.5); // 0.25~1.5 무게감 계수

                            playHit(currentStageIndex, b.blockType, b.iceVariant, sf);
                            spawnShatter(p.x, p.y, 8, isFeverMode);

                            // ── 타격감: 얼음을 주먹으로 치는 느낌 (크기에 비례) ──
                            const hitDirX = dist > 0 ? dx / dist : 0;
                            const hitDirY = dist > 0 ? dy / dist : -1;

                            // 1) 히트스톱 — 큰 블록일수록 오래 멈춤
                            if (!isFeverMode) hitStopTimer = Math.max(hitStopTimer, 0.03 + weight * 0.03);

                            // 2) 화면 흔들림 — 큰 블록일수록 세게
                            if (!isFeverMode) screenShake(60 + weight * 60, 3 + weight * 8);

                            // 3) 접촉 지점 임팩트 — 큰 블록일수록 큰 버스트
                            const contactX = p.x + hitDirX * p.radius * 0.7;
                            const contactY = p.y + hitDirY * p.radius * 0.7;
                            spawnImpactBurst(contactX, contactY, hitDirX, hitDirY, sf);

                            // 3.5) 손/발 타격 플래시 — 때리는 순간 손이 번쩍 빛남
                            hitFlashMap[p.id] = { timer: 0.15 + weight * 0.05, maxTimer: 0.15 + weight * 0.05 };

                            // 4) 타격 순간 플래시 — 큰 블록일수록 강하게
                            if (!isFeverMode) flashAlpha = Math.max(flashAlpha, 0.08 + weight * 0.12);

                            if (b.hp <= 0) {
                                // 파괴 시 점수 획득 및 피버 게이지 상승
                                let scoreGain = b.maxHp * 20;

                                // 점수 및 피버
                                score += isFeverMode ? scoreGain * 2 : scoreGain;
                                addFever(b.maxHp * 1.5);

                                // 스타 블록: 주변 블록이 연쇄적으로 터짐!
                                if (b.blockType === 'bomb') {
                                    const BOMB_RADIUS = 1200;
                                    spawnShockwave(b.position.x, b.position.y, BOMB_RADIUS);
                                    spawnStarEffect(b.position.x, b.position.y, 50);
                                    screenShake(500, 15);

                                    // 거리순 정렬 -> 가까운 것부터 순차 폭발
                                    const bx = b.position.x, by = b.position.y;
                                    const nearby = Composite.allBodies(world).filter(cb =>
                                        cb.isBlock && cb !== b &&
                                        Math.hypot(cb.position.x - bx, cb.position.y - by) < BOMB_RADIUS
                                    ).sort((a, c) =>
                                        Math.hypot(a.position.x - bx, a.position.y - by) -
                                        Math.hypot(c.position.x - bx, c.position.y - by)
                                    );
                                    nearby.forEach((cb, idx) => {
                                        setTimeout(() => {
                                            if (!Composite.allBodies(world).includes(cb)) return;
                                            score += cb.maxHp * 20;
                                            addFever(cb.maxHp * 0.5);
                                            playDestroy(currentStageIndex, cb.blockType, cb.iceVariant);
                                            spawnShockwave(cb.position.x, cb.position.y, 300);
                                            spawnStarEffect(cb.position.x, cb.position.y, 22);
                                            Composite.remove(world, cb);
                                            updateUI();
                                        }, (idx + 1) * 250);
                                    });
                                }

                                // 얼음1 블록: 주변 영역에 7초간 파워 디버프!
                                if (b.blockType === 'ice1') {
                                    spawnIceDebuff(b.position.x, b.position.y);
                                    spawnShatter(b.position.x, b.position.y, 80, false);
                                }

                                updateUI();
                                playDestroy(currentStageIndex, b.blockType, b.iceVariant);
                                if (b.blockType !== 'bomb') {
                                    spawnShatter(b.position.x, b.position.y, 50, isFeverMode);
                                }

                                // 타격감: 블록 크기에 비례한 흔들림 + 히트스톱 + 번쩍임
                                const impactSize = Math.min(b.scaleFactor / 4, 1.0);
                                screenShake(120 + impactSize * 180, 3 + impactSize * 6);
                                hitStopTimer = 0.03 + impactSize * 0.04;
                                flashAlpha = 0.15 + impactSize * 0.2;

                                Composite.remove(world, b);
                            } else {
                                // 파괴 못했을 경우 — 타격감만, 물리 밀기 없음
                                b.hitFlash = 0.18; // 블록 자체 흰색 번쩍임
                                addFever(0.8);
                                updateUI();
                            }
                        }
                    }


                // 바닥에서 멈춘 블럭 제거 (모든 스테이지 공통)
                if (b.timeSinceSpawn > 20.0 && Math.abs(b.velocity.y) < 0.5) {
                    spawnShatter(b.position.x, b.position.y, 10);
                    Composite.remove(world, b);
                }
                if (b.position.y > canvasElement.height + 600) Composite.remove(world, b);
            }

            // 블럭 렌더링
            const stageData = STAGES[currentStageIndex];

            for (let b of blocks) {
                if (!b.isBlock) continue;
                canvasCtx.save();

                // 타격 순간 블록이 잠깐 밝아지며 살짝 커지는 효과 (딱딱한 충격)
                if (b.hitCooldown > 0.5 && !isFeverMode) {
                    canvasCtx.translate(b.position.x, b.position.y);
                    canvasCtx.scale(1.03, 1.03);
                    canvasCtx.translate(-b.position.x, -b.position.y);
                }

                // hitFlash: 맞은 직후 블록 자체가 흰색으로 번쩍임
                if (b.hitFlash > 0) {
                    b.hitFlash -= dtRaw * 3.5;
                    if (b.hitFlash < 0) b.hitFlash = 0;
                }

                let hpRatio = Math.max(0, b.hp / b.maxHp);

                // ── s1 이미지 블록 렌더링 (clear/snow/snow_round) ──
                // 피버 모드: 모든 블록을 clear_25 (깨지기 직전) 이미지로 표시
                const s1ImgVariant = (b.blockType === 'normal') ? variantToType[b.iceVariant || 0] : null;
                if (s1ImgVariant) {
                    const img = isFeverMode
                        ? s1BlockImgs['clear']['25']
                        : getS1BlockImg(b.iceVariant || 0, hpRatio);
                    if (img && img.complete && img.naturalWidth > 0) {
                        canvasCtx.save();
                        canvasCtx.translate(b.position.x, b.position.y);
                        canvasCtx.rotate(b.angle);

                        // snow_round: 원형 클립으로 렌더링
                        if (s1ImgVariant === 'snow_round') {
                            const r = b.rectWidth / 2 * 1.1;
                            canvasCtx.beginPath();
                            canvasCtx.arc(0, 0, r, 0, Math.PI * 2);
                            canvasCtx.clip();
                        }

                        if (isFeverMode) {
                            // 피버: 깜빡깜빡 + 색상 시프트
                            const now = Date.now();
                            const flicker = 0.5 + 0.5 * Math.sin(now / 80); // 빠른 깜빡임
                            canvasCtx.globalAlpha = 0.55 + flicker * 0.45;
                            // hue-rotate로 색상 변화 (무지개 느낌)
                            canvasCtx.filter = `hue-rotate(${(now / 3) % 360}deg) brightness(${1.0 + flicker * 0.5})`;
                        } else {
                            canvasCtx.globalAlpha = 0.7 + hpRatio * 0.3;
                        }

                        const pad = 1.15;
                        canvasCtx.drawImage(img, -b.rectWidth * pad / 2, -b.rectHeight * pad / 2, b.rectWidth * pad, b.rectHeight * pad);
                        canvasCtx.restore();
                        canvasCtx.restore();
                        continue;
                    }
                }

                // ── 스타 블록: 이미지로만 렌더링 (사각형/균열 생략) ──
                if (b.blockType === 'bomb') {
                    const starHpRatio = b.hp / b.maxHp;
                    const starImg = isFeverMode ? starBlockImgs['25'] : getStarBlockImg(starHpRatio);
                    if (starImg && starImg.complete) {
                        // star_25는 균열 이펙트가 바깥으로 퍼져 별 본체가 작아보이므로 보정
                        const sizeBoost = (starHpRatio <= 0.25 || isFeverMode) ? 1.6 : 1.3;
                        const imgSize = Math.max(b.rectWidth, b.rectHeight) * sizeBoost;
                        canvasCtx.save();
                        canvasCtx.translate(b.position.x, b.position.y);
                        canvasCtx.rotate(b.angle);

                        if (isFeverMode) {
                            // 피버: 터지기 직전 이미지로 깜빡임 + hue 시프트
                            const now = Date.now();
                            const flicker = 0.5 + 0.5 * Math.sin(now / 80);
                            canvasCtx.globalAlpha = 0.55 + flicker * 0.45;
                            canvasCtx.filter = `hue-rotate(${(now / 3) % 360}deg) brightness(${1.0 + flicker * 0.5})`;
                            canvasCtx.shadowColor = '#ffe000';
                            canvasCtx.shadowBlur = 25 + flicker * 15;
                        } else {
                            canvasCtx.globalAlpha = 1.0;
                            canvasCtx.shadowColor = '#ffe000';
                            canvasCtx.shadowBlur = 25;
                        }

                        canvasCtx.drawImage(starImg, -imgSize / 2, -imgSize / 2, imgSize, imgSize);

                        if (!isFeverMode && b.hitFlash > 0) {
                            canvasCtx.globalAlpha = b.hitFlash * 0.5;
                            canvasCtx.filter = 'brightness(3)';
                            canvasCtx.drawImage(starImg, -imgSize / 2, -imgSize / 2, imgSize, imgSize);
                            canvasCtx.filter = 'none';
                        }
                        canvasCtx.restore();
                    }
                    canvasCtx.restore();
                    continue;
                }

                // ── 얼음1 블록: 이미지로만 렌더링 (정사각형, 사각형/균열 생략) ──
                if (b.blockType === 'ice1') {
                    const ice1Img = isFeverMode ? ice1BlockImgs['25'] : getIce1BlockImg(b.hp / b.maxHp);
                    if (ice1Img && ice1Img.complete) {
                        const imgSize = Math.max(b.rectWidth, b.rectHeight) * 1.3;
                        canvasCtx.save();
                        canvasCtx.translate(b.position.x, b.position.y);
                        canvasCtx.rotate(b.angle);

                        if (isFeverMode) {
                            // 피버: 터지기 직전 이미지로 깜빡임 + hue 시프트
                            const now = Date.now();
                            const flicker = 0.5 + 0.5 * Math.sin(now / 80);
                            canvasCtx.globalAlpha = 0.55 + flicker * 0.45;
                            canvasCtx.filter = `hue-rotate(${(now / 3) % 360}deg) brightness(${1.0 + flicker * 0.5})`;
                            canvasCtx.shadowColor = '#00ccff';
                            canvasCtx.shadowBlur = 25 + flicker * 15;
                        } else {
                            canvasCtx.globalAlpha = 1.0;
                            canvasCtx.shadowColor = '#00ccff';
                            canvasCtx.shadowBlur = 25;
                        }

                        canvasCtx.drawImage(ice1Img, -imgSize / 2, -imgSize / 2, imgSize, imgSize);

                        if (!isFeverMode && b.hitFlash > 0) {
                            canvasCtx.globalAlpha = b.hitFlash * 0.5;
                            canvasCtx.filter = 'brightness(3)';
                            canvasCtx.drawImage(ice1Img, -imgSize / 2, -imgSize / 2, imgSize, imgSize);
                            canvasCtx.filter = 'none';
                        }
                        canvasCtx.restore();
                    }
                    canvasCtx.restore();
                    continue;
                }

                // ── 기존 캔버스 드로잉 (이미지 없는 블록) ──
                // 피버 모드면 블럭도 무지개처럼 영롱하게
                if (isFeverMode) {
                    canvasCtx.globalAlpha = 0.8;
                    canvasCtx.fillStyle = 'rgba(255, 150, 255, 0.4)';
                    canvasCtx.shadowColor = '#ff00ff';
                    canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                } else {
                    // 서브타입별 비주얼 — 같은 색, 두께로만 구분
                    const v = b.iceVariant || 0;
                    canvasCtx.globalAlpha = 0.6 + hpRatio * 0.3;
                    canvasCtx.fillStyle = stageData.blockFill;
                    canvasCtx.shadowColor = stageData.blockStroke;
                    canvasCtx.strokeStyle = stageData.blockStroke;
                }
                canvasCtx.shadowBlur = 20;

                // Vertices를 그대로 사용하여 모든 다각형을 완벽히 그림!
                canvasCtx.beginPath();
                canvasCtx.moveTo(b.vertices[0].x, b.vertices[0].y);
                for (let j = 1; j < b.vertices.length; j++) {
                    canvasCtx.lineTo(b.vertices[j].x, b.vertices[j].y);
                }
                canvasCtx.closePath();

                canvasCtx.fill();
                // variant별 테두리 두께 — 확실한 차이로 구분
                const variantLineWidths = [4, 2, 16, 28, 8];
                const variantLineW = (b.blockType === 'normal' && !isFeverMode) ? (variantLineWidths[b.iceVariant || 0] || 6) : 6;
                canvasCtx.lineWidth = variantLineW;
                canvasCtx.stroke();

                // hitFlash: 맞은 순간 블록이 흰색으로 번쩍임
                if (b.hitFlash > 0) {
                    canvasCtx.globalAlpha = b.hitFlash;
                    canvasCtx.fillStyle = 'rgba(255, 255, 255, 1.0)';
                    canvasCtx.shadowBlur = 0;
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(b.vertices[0].x, b.vertices[0].y);
                    for (let j = 1; j < b.vertices.length; j++) {
                        canvasCtx.lineTo(b.vertices[j].x, b.vertices[j].y);
                    }
                    canvasCtx.closePath();
                    canvasCtx.fill();
                }

                // 일반 블록: 무거운 variant(서리/빙하)는 내부 빛줄기로 구분
                if (b.blockType === 'normal' && !isFeverMode && (b.iceVariant === 2 || b.iceVariant === 3)) {
                    canvasCtx.globalAlpha = 0.25;
                    canvasCtx.strokeStyle = 'rgba(180, 220, 255, 0.6)';
                    canvasCtx.lineWidth = 2;
                    // 대각선 빛줄기 (단단한 느낌)
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(b.position.x - b.rectWidth * 0.3, b.position.y - b.rectHeight * 0.3);
                    canvasCtx.lineTo(b.position.x + b.rectWidth * 0.3, b.position.y + b.rectHeight * 0.3);
                    canvasCtx.moveTo(b.position.x + b.rectWidth * 0.2, b.position.y - b.rectHeight * 0.3);
                    canvasCtx.lineTo(b.position.x - b.rectWidth * 0.2, b.position.y + b.rectHeight * 0.3);
                    canvasCtx.stroke();
                }

                canvasCtx.restore();

                // 크랙(균열) 그리기 — 이미지 블록은 이미 균열이 포함되어 있으므로 스킵
                if (s1ImgVariant) continue;

                canvasCtx.save();
                canvasCtx.translate(b.position.x, b.position.y);
                canvasCtx.rotate(b.angle);
                if (b.hitCooldown > 0.1 && !isFeverMode) {
                    canvasCtx.scale(1.05, 1.05);
                }

                let w = b.rectWidth;
                let h = b.rectHeight;

                canvasCtx.strokeStyle = isFeverMode ? 'rgba(255, 255, 255, 0.9)' : 'rgba(255, 255, 255, 0.9)';
                canvasCtx.lineWidth = 4 + (w * 0.02);

                let damageRatio = 1 - hpRatio;

                if (damageRatio > 0 && !isFeverMode) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(0, 0); canvasCtx.lineTo(-w * 0.35, -h * 0.4);
                    canvasCtx.moveTo(0, 0); canvasCtx.lineTo(w * 0.4, h * 0.35);

                    if (damageRatio >= 0.25) {
                        canvasCtx.moveTo(0, 0); canvasCtx.lineTo(w * 0.45, -h * 0.1);
                        canvasCtx.moveTo(w * 0.2, h * 0.15); canvasCtx.lineTo(w * 0.45, h * 0.05);
                    }
                    if (damageRatio >= 0.5) {
                        canvasCtx.moveTo(0, 0); canvasCtx.lineTo(-w * 0.4, h * 0.4);
                        canvasCtx.moveTo(0, 0); canvasCtx.lineTo(w * 0.1, -h * 0.45);
                        canvasCtx.moveTo(-w * 0.2, -h * 0.2); canvasCtx.lineTo(-w * 0.45, -h * 0.1);
                    }
                    if (damageRatio >= 0.75) {
                        canvasCtx.moveTo(w * 0.2, h * 0.15); canvasCtx.lineTo(w * 0.4, h * 0.45);
                        canvasCtx.moveTo(-w * 0.2, h * 0.2); canvasCtx.lineTo(-w * 0.45, h * 0.1);
                        canvasCtx.lineTo(-w * 0.3, h * 0.4);
                        canvasCtx.moveTo(w * 0.1, -h * 0.45); canvasCtx.lineTo(-w * 0.1, -h * 0.4);
                    }
                    canvasCtx.stroke();
                }

                canvasCtx.restore();
            }

            // 스타 충격파 렌더링
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const sw = shockwaves[i];
                sw.radius += 8;  // 퍼지는 속도
                sw.alpha = 1.0 - (sw.radius / sw.maxRadius);
                if (sw.alpha <= 0) {
                    shockwaves.splice(i, 1);
                    continue;
                }
                canvasCtx.save();
                // 바깥 테두리 (황금빛 반짝임)
                canvasCtx.globalAlpha = sw.alpha * 0.9;
                canvasCtx.strokeStyle = `rgba(255, 230, 80, ${sw.alpha})`;
                canvasCtx.lineWidth = 14 * sw.alpha + 4;
                canvasCtx.shadowColor = '#ffe000';
                canvasCtx.shadowBlur = 50;
                canvasCtx.beginPath();
                canvasCtx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                canvasCtx.stroke();
                // 안쪽 밝은 테두리 (흰빛)
                canvasCtx.globalAlpha = sw.alpha * 0.7;
                canvasCtx.strokeStyle = `rgba(255, 255, 220, ${sw.alpha})`;
                canvasCtx.lineWidth = 5 * sw.alpha + 2;
                canvasCtx.shadowBlur = 20;
                canvasCtx.stroke();
                // 안쪽 채우기 (반투명 황금)
                canvasCtx.globalAlpha = sw.alpha * 0.2;
                canvasCtx.fillStyle = 'rgba(255, 240, 100, 1)';
                canvasCtx.fill();
                canvasCtx.restore();
            }

            // 임팩트 버스트 렌더링 (타격 접촉 지점에서 방사형 충격선)
            for (let i = impactBursts.length - 1; i >= 0; i--) {
                const ib = impactBursts[i];
                ib.timer -= dtRaw;
                if (ib.timer <= 0) {
                    impactBursts.splice(i, 1);
                    continue;
                }
                const t = ib.timer / (ib.maxTimer || 0.12); // 1→0
                const lw = ib.lineWidth || 1;
                canvasCtx.save();
                canvasCtx.globalAlpha = t;
                canvasCtx.lineCap = 'round';
                // 바깥 흰색 충격선
                for (const line of ib.lines) {
                    const progress = 1 - t; // 0→1 (점점 퍼짐)
                    const startDist = 5 + line.len * progress * 0.3;
                    const endDist = startDist + line.len * (0.5 + progress * 0.5);
                    const sx = ib.x + Math.cos(line.angle) * startDist;
                    const sy = ib.y + Math.sin(line.angle) * startDist;
                    const ex = ib.x + Math.cos(line.angle) * endDist;
                    const ey = ib.y + Math.sin(line.angle) * endDist;

                    canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                    canvasCtx.lineWidth = (3 * t + 1) * lw;
                    canvasCtx.shadowColor = '#aaddff';
                    canvasCtx.shadowBlur = 8 * lw;
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(sx, sy);
                    canvasCtx.lineTo(ex, ey);
                    canvasCtx.stroke();
                }
                canvasCtx.restore();
            }

            // 얼음 디버프 영역 렌더링 (ice1_zone.png 이미지 + 회전)
            for (const ice of iceDebuffs) {
                canvasCtx.save();
                const a = Math.max(0, ice.alpha);
                const zoneSize = ice.radius * 2;
                if (ice1ZoneImg.complete) {
                    canvasCtx.globalAlpha = a * 0.7;
                    canvasCtx.shadowColor = '#00ccff';
                    canvasCtx.shadowBlur = 30;
                    canvasCtx.translate(ice.x, ice.y);
                    canvasCtx.rotate(ice.angle);
                    canvasCtx.drawImage(ice1ZoneImg, -zoneSize / 2, -zoneSize / 2, zoneSize, zoneSize);
                }
                canvasCtx.restore();
            }

            // 손/발 히트 플래시 타이머 감소
            for (const id in hitFlashMap) {
                hitFlashMap[id].timer -= dtRaw;
                if (hitFlashMap[id].timer <= 0) delete hitFlashMap[id];
            }

            // 손/발 위에 무기 이펙트 그리기
            for (let p of bodyPoints) {
                drawWeapon(canvasCtx, p, currentStageIndex, isFeverMode, gameTime, hitFlashMap[p.id]);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (!p.update(dt)) {
                    particles.splice(i, 1);
                } else {
                    p.draw(canvasCtx);
                }
            }
            // 화면 번쩍임 (흰색 플래시)
            if (flashAlpha > 0) {
                canvasCtx.save();
                canvasCtx.globalAlpha = Math.min(flashAlpha, 0.4);
                canvasCtx.fillStyle = '#ffffff';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.restore();
            }

            // 매 프레임 UI(시간/게이지) 갱신
            updateUI();
        }

        // -------------------------
        // 시작
        // -------------------------
        let cameraStarted = false;

        // 임시 레벨 선택
        document.querySelectorAll('.lvl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentStageIndex = parseInt(btn.dataset.lv);
                document.querySelectorAll('.lvl-btn').forEach(b => b.style.opacity = '0.4');
                btn.style.opacity = '1';
            });
        });
        // 기본 선택 표시
        document.querySelector('.lvl-btn[data-lv="0"]').style.opacity = '1';
        document.querySelectorAll('.lvl-btn:not([data-lv="0"])').forEach(b => b.style.opacity = '0.4');

        startButton.addEventListener('click', async () => {
            startButton.style.display = 'none';
            loadingMsg.style.display = 'block';

            try {
                if (!cameraStarted) {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: "user"
                        }
                    });
                    videoElement.srcObject = stream;

                    const camera = new Camera(videoElement, {
                        onFrame: async () => {
                            await pose.send({ image: videoElement });
                        },
                        width: 1280,
                        height: 720
                    });

                    await camera.start();
                    cameraStarted = true;
                }

                overlay.style.display = 'none';
                loadingMsg.style.display = 'none';

                // 스테이지 프리뷰를 보여준 뒤 게임 시작
                showStagePreview(() => {
                    resetGame();
                });
            } catch (e) {
                alert("카메라 권한을 부여하거나 연결에 실패했습니다.\n" + e.message);
                startButton.style.display = 'block';
                loadingMsg.style.display = 'none';
            }
        });
    </script>
</body>

</html>
