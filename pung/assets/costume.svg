<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#ffe082"/>
    </linearGradient>
    <filter id="softshadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 몸통 -->
  <rect x="20" y="20" width="120" height="140" rx="30"
    fill="url(#bodyGrad)" filter="url(#softshadow)" opacity="0.88"/>

  <!-- 배 패치 -->
  <ellipse cx="80" cy="100" rx="35" ry="50"
    fill="url(#bellyGrad)" opacity="0.8"/>

  <!-- 왼쪽 소매 -->
  <ellipse cx="10" cy="70" rx="18" ry="30"
    fill="#29b6f6" opacity="0.85" transform="rotate(-15,10,70)"/>
  <!-- 오른쪽 소매 -->
  <ellipse cx="150" cy="70" rx="18" ry="30"
    fill="#29b6f6" opacity="0.85" transform="rotate(15,150,70)"/>

  <!-- 왼손 -->
  <circle cx="10" cy="96" r="13" fill="#ffe082" opacity="0.9"/>
  <!-- 오른손 -->
  <circle cx="150" cy="96" r="13" fill="#ffe082" opacity="0.9"/>

  <!-- 단추 -->
  <circle cx="80" cy="55"  r="5" fill="#0277bd" opacity="0.7"/>
  <circle cx="80" cy="80"  r="5" fill="#0277bd" opacity="0.7"/>
  <circle cx="80" cy="105" r="5" fill="#0277bd" opacity="0.7"/>

  <!-- 칼라 -->
  <path d="M52,20 Q80,40 108,20 Q80,60 52,20Z"
    fill="#fff" opacity="0.6"/>
</svg>
