<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <defs>
    <radialGradient id="poopGrad" cx="40%" cy="30%">
      <stop offset="0%"   style="stop-color:#8B5E3C"/>
      <stop offset="60%"  style="stop-color:#6B3F1E"/>
      <stop offset="100%" style="stop-color:#4A2810"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="35%" cy="25%">
      <stop offset="0%"   style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="ps">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#2a1005" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- 몸통 레이어 (아래→위) -->
  <ellipse cx="60" cy="118" rx="46" ry="22" fill="url(#poopGrad)" filter="url(#ps)"/>
  <ellipse cx="60" cy="108" rx="38" ry="22" fill="url(#poopGrad)"/>
  <ellipse cx="60" cy="90"  rx="30" ry="22" fill="url(#poopGrad)"/>
  <ellipse cx="60" cy="74"  rx="22" ry="18" fill="url(#poopGrad)"/>
  <ellipse cx="62" cy="56"  rx="16" ry="18" fill="url(#poopGrad)"/>

  <!-- 뾰족한 꼭대기 -->
  <path d="M62,56 Q72,28 60,10 Q50,28 58,56Z" fill="url(#poopGrad)"/>

  <!-- 하이라이트 (광택) -->
  <ellipse cx="50" cy="90" rx="10" ry="16" fill="url(#shineGrad)"/>

  <!-- 눈 -->
  <circle cx="50" cy="82" r="6" fill="#1a0a00"/>
  <circle cx="70" cy="82" r="6" fill="#1a0a00"/>
  <circle cx="52" cy="80" r="2" fill="#fff"/>
  <circle cx="72" cy="80" r="2" fill="#fff"/>

  <!-- 입 (^^ 웃음) -->
  <path d="M50,96 Q60,106 70,96" stroke="#1a0a00" stroke-width="3"
    fill="none" stroke-linecap="round"/>

  <!-- 볼터치 -->
  <ellipse cx="44" cy="90" rx="7" ry="4" fill="rgba(255,100,100,0.3)"/>
  <ellipse cx="76" cy="90" rx="7" ry="4" fill="rgba(255,100,100,0.3)"/>

  <!-- 냄새선 -->
  <path d="M26,40 Q18,30 26,20 Q34,10 26,0"
    stroke="rgba(150,200,50,0.6)" stroke-width="3"
    fill="none" stroke-linecap="round"/>
  <path d="M90,38 Q100,26 90,16 Q80,6 90,-4"
    stroke="rgba(150,200,50,0.6)" stroke-width="3"
    fill="none" stroke-linecap="round"/>
</svg>
