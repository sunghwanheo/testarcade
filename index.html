<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야호 놀이터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 50px;
        }

        /* ── 게임 목록 ── */
        #gameSection {
            max-width: 1200px;
            width: 100%;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .game-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .game-icon {
            font-size: 4rem;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
        }

        .game-card:nth-child(1) .game-icon {
            background: linear-gradient(135deg, #ff6b6b33, #ff6b6b11);
        }

        .game-card:nth-child(2) .game-icon {
            background: linear-gradient(135deg, #ffd93d33, #ffd93d11);
        }

        .game-card:nth-child(3) .game-icon {
            background: linear-gradient(135deg, #6bcb7733, #6bcb7711);
        }

        .game-card:nth-child(4) .game-icon {
            background: linear-gradient(135deg, #4d96ff33, #4d96ff11);
        }

        .game-card:nth-child(5) .game-icon {
            background: linear-gradient(135deg, #e06bff33, #e06bff11);
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .game-desc {
            font-size: 0.95rem;
            color: #bbb;
            line-height: 1.5;
        }

        .play-btn {
            margin-top: auto;
            padding: 10px 30px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .game-card:hover .play-btn {
            background: white;
            color: #0a0a2e;
        }



@media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .game-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .game-card {
                padding: 20px;
            }

        }
    </style>
    <script>
        (function () {
            const lang = new URLSearchParams(window.location.search).get('lang');
            localStorage.setItem('gemgem_lang', lang === 'en' ? 'en' : 'ko');
        })();
    </script>
    <script src="./lang.js"></script>
</head>

<body>
    <h1 id="main-title">야호 놀이터</h1>

    <!-- 게임 목록 -->
    <div id="gameSection">
        <p class="subtitle" id="main-subtitle">게임을 선택하고 플레이하세요!</p>

        <div class="game-grid" id="gameGrid">
            <a class="game-card" href="balloon_pang/index.html" target="_blank" data-game="balloon_pang">
                <div class="game-icon">🎈</div>
                <div class="game-title" id="title-balloon_pang">풍선 팡팡</div>
                <div class="game-desc"  id="desc-balloon_pang">풍선 터뜨리기! 몸을 움직여 풍선을 팡팡 터뜨려보세요.</div>
                <div class="play-btn">PLAY</div>
            </a>

            <a class="game-card" href="pung/index.html" target="_blank" data-game="pung">
                <div class="game-icon">💨</div>
                <div class="game-title" id="title-pung">방귀대장 뿡뿡이</div>
                <div class="game-desc"  id="desc-pung">방귀대장 뿡뿡이! 웃음 가득한 아케이드 게임에 도전하세요.</div>
                <div class="play-btn">PLAY</div>
            </a>

            <a class="game-card" href="ice_breaker/index.html" target="_blank" data-game="ice_breaker">
                <div class="game-icon">🧊</div>
                <div class="game-title" id="title-ice_breaker">쾅쾅 얼음깨기</div>
                <div class="game-desc"  id="desc-ice_breaker">물리 엔진 기반 얼음 깨기 게임! 몸을 움직여 얼음을 부숴보세요.</div>
                <div class="play-btn">PLAY</div>
            </a>

            <a class="game-card" href="mole/index.html" target="_blank" data-game="mole">
                <div class="game-icon">🐹</div>
                <div class="game-title" id="title-mole">두더지 잡기</div>
                <div class="game-desc"  id="desc-mole">두더지를 잡아라! 올라오는 두더지를 빠르게 잡아보세요.</div>
                <div class="play-btn">PLAY</div>
            </a>

            <!-- 와구와구 임시 비활성화
            <a class="game-card" href="lion/index.html" target="_blank" data-game="lion">
                <div class="game-icon">🦁</div>
                <div class="game-title" id="title-lion">와구와구 게임</div>
                <div class="game-desc"  id="desc-lion">사자와 상추의 만남! 재미있는 액션 게임에 도전해보세요.</div>
                <div class="play-btn">PLAY</div>
            </a>
            -->
        </div>
    </div>

<script>
        // ── 한/영 텍스트 ──────────────────────────────────────────
        const LANG_MAIN = {
            ko: {
                title:    '야호 놀이터',
                subtitle: '게임을 선택하고 플레이하세요!',
                games: {
                    balloon_pang: { title: '풍선 팡팡',       desc: '풍선 터뜨리기! 몸을 움직여 풍선을 팡팡 터뜨려보세요.' },
                    pung:         { title: '방귀대장 뿡뿡이', desc: '방귀대장 뿡뿡이! 웃음 가득한 아케이드 게임에 도전하세요.' },
                    ice_breaker:  { title: '쾅쾅 얼음깨기',   desc: '물리 엔진 기반 얼음 깨기 게임! 몸을 움직여 얼음을 부숴보세요.' },
                    mole:         { title: '두더지 잡기',     desc: '두더지를 잡아라! 올라오는 두더지를 빠르게 잡아보세요.' },
                    lion:         { title: '와구와구 게임',   desc: '사자와 상추의 만남! 재미있는 액션 게임에 도전해보세요.' },
                }
            },
            en: {
                title:    'Yayho Playground',
                subtitle: 'Pick a game and start playing!',
                games: {
                    balloon_pang: { title: 'Balloon Pop',      desc: 'Pop the balloons! Move your body to burst them all!' },
                    pung:         { title: 'Fart King',        desc: 'The Fart King! Take on this hilarious arcade game!' },
                    ice_breaker:  { title: 'Ice Breaker',      desc: 'Physics-based ice smashing! Move your body to break the ice!' },
                    mole:         { title: 'Whac-A-Mole',      desc: 'Catch the moles! Hit them fast as they pop up!' },
                    lion:         { title: 'Nom Nom Game',     desc: 'Lion meets lettuce! Take on this fun action game!' },
                }
            }
        };

        function applyLang(l) {
            const t = LANG_MAIN[l];
            document.title = t.title;
            document.getElementById('main-title').textContent    = t.title;
            document.getElementById('main-subtitle').textContent = t.subtitle;
            Object.entries(t.games).forEach(([key, val]) => {
                const titleEl = document.getElementById('title-' + key);
                const descEl  = document.getElementById('desc-'  + key);
                if (titleEl) titleEl.textContent = val.title;
                if (descEl)  descEl.textContent  = val.desc;
            });
        }
        // ─────────────────────────────────────────────────────────

        const STORAGE_KEY = 'gemgem_tracking';
        const GAMES = ['쾅쾅 얼음깨기', '풍선 팡팡', '방귀대장 뿡뿡이', '두더지 잡기', '와구와구 게임'];

        // ── Supabase 로그 설정 ──
        const SUPABASE_URL = 'https://rwbgrdiecfkcedctnggv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uAWk5AgQeps9HxnkxtHXoQ_P3g5OeRP';
        const SITE_KEY = 'gemgem_site';
        const SESSION_KEY = 'gemgem_session_id';

        // ?site= 파라미터 필수, ?lang= 선택 (ko/en, 기본값 ko)
        (function () {
            const params = new URLSearchParams(window.location.search);
            const site = params.get('site');
            const VALID_SITES = ['hospital', 'angels_haven', 'handong', 'kang', 'global', 'local', 'c01-ss', 'p02-h', 'p02-l', 'gemgem'];
            if (!site || !VALID_SITES.includes(site)) {
                const isKo = (typeof getLang === 'function' ? getLang() : 'ko') === 'ko';
                document.body.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;text-align:center;padding:20px;">
                        <div style="font-size:3rem;">🔒</div>
                        <div style="font-size:1.4rem;font-weight:700;color:#ffd93d;">${isKo ? '접근 불가' : 'Access Denied'}</div>
                        <div style="color:#aaa;font-size:1rem;">${isKo ? 'URL에 유효한 <b style="color:white;">?site=</b> 파라미터가 필요합니다.' : 'A valid <b style="color:white;">?site=</b> parameter is required in the URL.'}</div>
                        <div style="color:#888;font-size:0.9rem;">?site=hospital &nbsp;|&nbsp; ?site=angels_haven &nbsp;|&nbsp; ?site=handong &nbsp;|&nbsp; ?site=kang &nbsp;|&nbsp; ?site=global&amp;lang=en</div>
                    </div>`;
                throw new Error('[접근차단] 유효하지 않은 site 파라미터: ' + site);
            }
            localStorage.setItem(SITE_KEY, site);
        })();

        function getSite() {
            return localStorage.getItem(SITE_KEY) || 'hospital';
        }
        function getLocale() {
            return localStorage.getItem('gemgem_lang') || 'ko';
        }
        function generateSessionId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }
        function sendLog(payload) {
            if (getSite() === 'local') {
                console.log('[로그 - local]', payload);
                return;
            }
            fetch(`${SUPABASE_URL}/rest/v1/game_logs`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(payload)
            }).catch(e => console.warn('[로그] 전송 실패', e));
        }

        // ── 페이지 방문 로그 ──
        (function () {
            const sessionId = generateSessionId();
            localStorage.setItem(SESSION_KEY, sessionId);
            sendLog({ event: 'visit', session_id: sessionId, site: getSite(), locale: getLocale() });
        })();
    </script>
    <div style="position:fixed; bottom:10px; right:15px; font-size:0.75rem; color:rgba(255,255,255,0.25);">v1.13.4 (2026-03-24)</div>
</body>

</html>
