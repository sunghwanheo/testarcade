        // -------------------------
        // MediaPipe Pose
        // -------------------------
        const pose = new Pose({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
            }
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        pose.onResults((results) => {
            bodyPoints = [];
            if (results.poseLandmarks) {
                const lms = results.poseLandmarks;
                const W = canvasElement.width;
                const H = canvasElement.height;

                // 화면 좌표 변환 (거울 반전)
                const toScreen = (lm) => ({
                    x: (1 - lm.x) * W,
                    y: lm.y * H
                });

                // 두 landmark 사이의 픽셀 거리
                const dist2D = (a, b) => {
                    const ax = (1 - a.x) * W, ay = a.y * H;
                    const bx = (1 - b.x) * W, by = b.y * H;
                    return Math.hypot(ax - bx, ay - by);
                };

                // 손 추적: 손목(wristIdx)과 검지(indexIdx) 사이 거리를 손 크기로 사용
                const trackHand = (wristIdx, indexIdx, pinkyIdx) => {
                    const wrist = lms[wristIdx];
                    const index = lms[indexIdx];
                    if (!wrist || !index) return null;
                    if (wrist.visibility < 0.4 || index.visibility < 0.4) return null;

                    // 손 크기: 손목~검지 픽셀 거리
                    let handSize = dist2D(wrist, index);

                    // 최소/최대 클램프 (너무 가까이/멀리 있을 때 대비)
                    handSize = Math.max(40, Math.min(handSize, 220));

                    // 중심 = 손목과 검지의 중간
                    const cx = (1 - (wrist.x + index.x) / 2) * W;
                    const cy = ((wrist.y + index.y) / 2) * H;

                    return { x: cx, y: cy, radius: handSize, type: 'hand' };
                };

                // 발 추적: 발목~발끝 거리를 발 크기로 사용
                const trackFoot = (ankleIdx, toeIdx) => {
                    const ankle = lms[ankleIdx];
                    const toe   = lms[toeIdx];
                    if (!ankle || !toe) return null;
                    if (ankle.visibility < 0.4 || toe.visibility < 0.4) return null;

                    let footSize = dist2D(ankle, toe);
                    footSize = Math.max(35, Math.min(footSize, 180));

                    const cx = (1 - (ankle.x + toe.x) / 2) * W;
                    const cy = ((ankle.y + toe.y) / 2) * H;

                    return { x: cx, y: cy, radius: footSize, type: 'foot' };
                };

                const leftHand  = trackHand(15, 19, 17);
                const rightHand = trackHand(16, 20, 18);
                const leftFoot  = trackFoot(27, 31);
                const rightFoot = trackFoot(28, 32);

                if (leftHand)  bodyPoints.push(leftHand);
                if (rightHand) bodyPoints.push(rightHand);
                if (leftFoot)  bodyPoints.push(leftFoot);
                if (rightFoot) bodyPoints.push(rightFoot);
            }
        });

        // -------------------------
        // 게임 루프
        // -------------------------
        let lastTime = 0;

        function gameLoop(now) {
            if (!isPlaying) return;
            animationFrameId = requestAnimationFrame(gameLoop);

            const dtRaw = (now - lastTime) / 1000;
            lastTime = now;
            let dt = Math.min(dtRaw, 0.1);

            // 히트스톱: 일시 정지 효과
            if (hitStopTimer > 0) {
                hitStopTimer -= dtRaw;
                dt = 0; // 물리/타이머 멈춤, 렌더링은 계속
            }

            // 플래시 감소
            if (flashAlpha > 0) flashAlpha -= dtRaw * 1.5;

            gameTimeLeft -= dt;
            gameTime     += dt;
            if (gameTimeLeft <= 0) {
                gameTimeLeft = 0;
                updateUI();
                gameOver();
                return;
            }

            if (isFeverMode) {
                feverTimer -= dt;
                if (feverTimer <= 0) {
                    deactivateFever();
                }
            }

            Engine.update(engine, dt * 1000);
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            blockSpawnTimer -= dt;
            if (blockSpawnTimer <= 0) {
                spawnBlock();
                // 피버 모드일 때는 블럭 스폰 속도가 폭발적으로 증가
                if (isFeverMode) {
                    blockSpawnTimer = 0.4 + Math.random() * 0.2;
                } else {
                    let difficultSpeed = Math.min(score * 0.003, 0.8);
                    blockSpawnTimer = 2.5 - difficultSpeed + Math.random() * 0.8;
                }
            }

            // 얼음 디버프 영역 타이머 업데이트
            for (let i = iceDebuffs.length - 1; i >= 0; i--) {
                iceDebuffs[i].remainTime -= dt;
                iceDebuffs[i].alpha = Math.min(1.0, iceDebuffs[i].remainTime / 1.5);
                if (iceDebuffs[i].remainTime <= 0) {
                    iceDebuffs.splice(i, 1);
                }
            }

            const allBodies = Composite.allBodies(world);
            const blocks = allBodies.filter(b => b.isBlock);

            for (let b of blocks) {
                b.timeSinceSpawn += dt;
                if (b.hitCooldown > 0) b.hitCooldown -= dt;

                // 타격 검사
                for (let p of bodyPoints) {
                    let dx = b.position.x - p.x;
                    let dy = b.position.y - p.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < p.radius + (b.rectWidth / 2)) {
                        if (b.hitCooldown <= 0) {

                            // 무쌍(피버 모드)일 경우 데미지가 무한대!
                            // 얼음 디버프 영역 안이면 파워 1/5 (피버 모드엔 무시)
                            let damage;
                            if (isFeverMode) {
                                damage = 1000;
                            } else if (isInIceZone(p.x, p.y)) {
                                damage = ICE_DAMAGE_MULTIPLIER; // 0.2 데미지
                            } else {
                                damage = 1;
                            }
                            b.hp -= damage;

                            // 타격 쿨다운 적용. 피버일때는 바로바로 터지게 짧게.
                            b.hitCooldown = isFeverMode ? 0.05 : 0.75;

                            playHit(currentStageIndex, b.blockType, b.iceVariant);
                            spawnShatter(p.x, p.y, 8, isFeverMode);

                            if (b.hp <= 0) {
                                // 파괴 시 점수 획득 및 피버 게이지 상승
                                let scoreGain = b.maxHp * 20;

                                // 점수 및 피버
                                score += isFeverMode ? scoreGain * 2 : scoreGain;
                                addFever(b.maxHp * 1.5);

                                // 폭탄 블록: 주변 블록이 연쇄적으로 터짐!
                                if (b.blockType === 'bomb') {
                                    const BOMB_RADIUS = 1200;
                                    spawnShockwave(b.position.x, b.position.y, BOMB_RADIUS);
                                    spawnShatter(b.position.x, b.position.y, 120, true);
                                    screenShake(500, 15);

                                    // 거리순 정렬 -> 가까운 것부터 순차 폭발
                                    const bx = b.position.x, by = b.position.y;
                                    const nearby = Composite.allBodies(world).filter(cb =>
                                        cb.isBlock && cb !== b &&
                                        Math.hypot(cb.position.x - bx, cb.position.y - by) < BOMB_RADIUS
                                    ).sort((a, c) =>
                                        Math.hypot(a.position.x - bx, a.position.y - by) -
                                        Math.hypot(c.position.x - bx, c.position.y - by)
                                    );
                                    nearby.forEach((cb, idx) => {
                                        setTimeout(() => {
                                            if (!Composite.allBodies(world).includes(cb)) return;
                                            score += cb.maxHp * 20;
                                            addFever(cb.maxHp * 0.5);
                                            playDestroy(currentStageIndex, cb.blockType, cb.iceVariant);
                                            spawnShatter(cb.position.x, cb.position.y, 80, true);
                                            spawnShockwave(cb.position.x, cb.position.y, 300);
                                            Composite.remove(world, cb);
                                            updateUI();
                                        }, (idx + 1) * 250);
                                    });
                                }

                                // 얼음1 블록: 주변 영역에 7초간 파워 디버프!
                                if (b.blockType === 'ice1') {
                                    spawnIceDebuff(b.position.x, b.position.y);
                                    spawnShatter(b.position.x, b.position.y, 80, false);
                                }

                                updateUI();
                                playDestroy(currentStageIndex, b.blockType, b.iceVariant);
                                spawnShatter(b.position.x, b.position.y, 50, isFeverMode);

                                // 타격감: 블록 크기에 비례한 흔들림 + 히트스톱 + 번쩍임
                                const impactSize = Math.min(b.scaleFactor / 4, 1.0);
                                screenShake(120 + impactSize * 180, 3 + impactSize * 6);
                                hitStopTimer = 0.03 + impactSize * 0.04;
                                flashAlpha = 0.15 + impactSize * 0.2;

                                Composite.remove(world, b);
                            } else {
                                // 파괴 못했을 경우 밀어내기
                                let pushNormalX = dist > 0 ? dx / dist : 0;
                                let pushNormalY = dist > 0 ? dy / dist : -1;

                                {
                                    // 폭탄/얼음1/무거운 블록은 거의 안 밀림 (제자리 유지)
                                    const isHeavyVariant = (b.iceVariant === 2 || b.iceVariant === 3);
                                    const isHeavy = (b.blockType === 'bomb' || b.blockType === 'ice1' || isHeavyVariant);
                                    let pushFactor = isHeavy
                                        ? 0.002 / Math.pow(b.scaleFactor, 1.5)
                                        : 0.04 / Math.pow(b.scaleFactor, 1.5);
                                    let bumpForce = pushFactor * b.mass;
                                    Body.applyForce(b, b.position, {
                                        x: pushNormalX * bumpForce,
                                        y: isHeavy ? 0 : pushNormalY * bumpForce - (0.005 * b.mass)
                                    });
                                    if (!isHeavy) Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.5);
                                }
                                addFever(0.8);
                                updateUI();
                            }
                        }
                    }
                }

                // ── Lv.3 전용: 속도 유지 & 상하좌우 랜덤 방향 ──
                if (currentStageIndex === 2) {
                    b.nudgeTimer = (b.nudgeTimer || 0) + dt;

                    const spd = Math.hypot(b.velocity.x, b.velocity.y);

                    // 속도가 일정 이하로 떨어지면 즉시 랜덤 방향으로 재점화
                    if (spd < 3) {
                        const a = Math.random() * Math.PI * 2;
                        const s = 5 + Math.random() * 4;
                        Body.setVelocity(b, { x: Math.cos(a) * s, y: Math.sin(a) * s });
                        Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.5);
                        b.nudgeTimer = 0;
                    }
                    // 4~7초마다 방향을 살짝 틀어서 예측 불가능하게
                    else if (b.nudgeTimer > 4.0 + Math.random() * 3.0) {
                        const a = Math.random() * Math.PI * 2;
                        const boost = 2 + Math.random() * 2;
                        Body.applyForce(b, b.position, {
                            x: Math.cos(a) * boost * b.mass,
                            y: Math.sin(a) * boost * b.mass
                        });
                        Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.4);
                        b.nudgeTimer = 0;
                    }

                    // 속도 상한 제한 (가속 누적 방지)
                    const MAX_SPEED = 14;
                    if (spd > MAX_SPEED) {
                        const ratio = MAX_SPEED / spd;
                        Body.setVelocity(b, { x: b.velocity.x * ratio, y: b.velocity.y * ratio });
                    }

                    // addTop: true 이므로 4면 벽이 있음 - 화면 밖 탈출 방지용 클램프
                    const W = canvasElement.width, H = canvasElement.height;
                    const margin = b.rectWidth * 0.5;
                    if (b.position.x < margin) {
                        Body.setPosition(b, { x: margin, y: b.position.y });
                        Body.setVelocity(b, { x: Math.abs(b.velocity.x), y: b.velocity.y });
                    } else if (b.position.x > W - margin) {
                        Body.setPosition(b, { x: W - margin, y: b.position.y });
                        Body.setVelocity(b, { x: -Math.abs(b.velocity.x), y: b.velocity.y });
                    }
                    if (b.position.y < margin) {
                        Body.setPosition(b, { x: b.position.x, y: margin });
                        Body.setVelocity(b, { x: b.velocity.x, y: Math.abs(b.velocity.y) });
                    } else if (b.position.y > H - margin) {
                        Body.setPosition(b, { x: b.position.x, y: H - margin });
                        Body.setVelocity(b, { x: b.velocity.x, y: -Math.abs(b.velocity.y) });
                    }

                } else if (currentStageIndex === 1) {
                    // Lv.2: 속도가 너무 떨어지면 에너지 재주입
                    const spd = Math.hypot(b.velocity.x, b.velocity.y);
                    const MIN_SPEED = 4;
                    if (spd < MIN_SPEED) {
                        // 현재 방향을 유지하면서 속도만 올림 (자연스럽게)
                        const angle = spd > 0.5
                            ? Math.atan2(b.velocity.y, b.velocity.x)
                            : Math.random() * Math.PI * 2;
                        const boost = MIN_SPEED + Math.random() * 2.5;
                        Body.setVelocity(b, {
                            x: Math.cos(angle) * boost,
                            y: Math.sin(angle) * boost
                        });
                    }
                    const W2 = canvasElement.width, H2 = canvasElement.height;
                    const mg = b.rectWidth * 0.5;

                    // 화면 진입 감지
                    if (!b.hasEnteredScreen && b.position.y > mg && b.position.x > 0 && b.position.x < W2) {
                        b.hasEnteredScreen = true;
                    }

                    // 진입 후 화면 밖으로 나가지 못하게 반사
                    if (b.hasEnteredScreen) {
                        if (b.position.y < mg) {
                            Body.setPosition(b, { x: b.position.x, y: mg });
                            Body.setVelocity(b, { x: b.velocity.x, y: Math.abs(b.velocity.y) });
                        }
                        if (b.position.x < mg) {
                            Body.setPosition(b, { x: mg, y: b.position.y });
                            Body.setVelocity(b, { x: Math.abs(b.velocity.x), y: b.velocity.y });
                        }
                        if (b.position.x > W2 - mg) {
                            Body.setPosition(b, { x: W2 - mg, y: b.position.y });
                            Body.setVelocity(b, { x: -Math.abs(b.velocity.x), y: b.velocity.y });
                        }
                        if (b.position.y > H2 - mg) {
                            Body.setPosition(b, { x: b.position.x, y: H2 - mg });
                            Body.setVelocity(b, { x: b.velocity.x, y: -Math.abs(b.velocity.y) });
                        }
                    } else if (b.position.y > H2 + mg * 2) {
                        Composite.remove(world, b);
                    }

                } else {
                    // Lv.1: 바닥에서 멈춘 블럭 제거
                    if (b.timeSinceSpawn > 20.0 && Math.abs(b.velocity.y) < 0.5) {
                        spawnShatter(b.position.x, b.position.y, 10);
                        Composite.remove(world, b);
                    }
                    if (b.position.y > canvasElement.height + 600) Composite.remove(world, b);
                }
            }

            // 블럭 렌더링
            const stageData = STAGES[currentStageIndex];

            for (let b of blocks) {
                if (!b.isBlock) continue;
                canvasCtx.save();

                // 글로벌 좌표 사용해 scale만 중앙에서 하도록 만듦
                if (b.hitCooldown > 0.1 && !isFeverMode) {
                    canvasCtx.translate(b.position.x, b.position.y);
                    canvasCtx.scale(1.05, 1.05);
                    canvasCtx.translate(-b.position.x, -b.position.y);
                }

                let hpRatio = Math.max(0, b.hp / b.maxHp);

                // 피버 모드면 블럭도 무지개처럼 영롱하게
                if (isFeverMode) {
                    canvasCtx.globalAlpha = 0.8;
                    canvasCtx.fillStyle = 'rgba(255, 150, 255, 0.4)';
                    canvasCtx.shadowColor = '#ff00ff';
                    canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                } else if (b.blockType === 'bomb') {
                    // 폭탄 블록: 빨간 + 주황 맥동, 눈에 확 띄게
                    const pulse = 0.6 + 0.35 * Math.sin(Date.now() / 150);
                    canvasCtx.globalAlpha = pulse;
                    canvasCtx.fillStyle = 'rgba(255, 60, 20, 0.6)';
                    canvasCtx.shadowColor = '#ff4400';
                    canvasCtx.strokeStyle = 'rgba(255, 200, 50, 1.0)';
                } else if (b.blockType === 'ice1') {
                    // 얼음1 블록: 하늘색 + 흰색 맥동
                    const pulse = 0.6 + 0.3 * Math.sin(Date.now() / 200);
                    canvasCtx.globalAlpha = pulse;
                    canvasCtx.fillStyle = 'rgba(100, 200, 255, 0.7)';
                    canvasCtx.shadowColor = '#00ccff';
                    canvasCtx.strokeStyle = 'rgba(200, 240, 255, 1.0)';
                } else {
                    // 서브타입별 비주얼 — 같은 색, 두께로만 구분
                    const v = b.iceVariant || 0;
                    canvasCtx.globalAlpha = 0.6 + hpRatio * 0.3;
                    canvasCtx.fillStyle = stageData.blockFill;
                    canvasCtx.shadowColor = stageData.blockStroke;
                    canvasCtx.strokeStyle = stageData.blockStroke;
                }
                canvasCtx.shadowBlur = 20;

                // Vertices를 그대로 사용하여 모든 다각형을 완벽히 그림!
                canvasCtx.beginPath();
                canvasCtx.moveTo(b.vertices[0].x, b.vertices[0].y);
                for (let j = 1; j < b.vertices.length; j++) {
                    canvasCtx.lineTo(b.vertices[j].x, b.vertices[j].y);
                }
                canvasCtx.closePath();

                canvasCtx.fill();
                // variant별 테두리 두께 — 확실한 차이로 구분
                const variantLineWidths = [4, 2, 16, 28, 8];
                const variantLineW = (b.blockType === 'normal' && !isFeverMode) ? (variantLineWidths[b.iceVariant || 0] || 6) : 6;
                canvasCtx.lineWidth = variantLineW;
                canvasCtx.stroke();

                // 폭탄 블록 아이콘 표시
                if (b.blockType === 'bomb' && !isFeverMode) {
                    const iconSize = Math.max(28, b.rectWidth * 0.4);
                    canvasCtx.globalAlpha = 1.0;
                    canvasCtx.font = `${iconSize}px serif`;
                    canvasCtx.textAlign = 'center';
                    canvasCtx.textBaseline = 'middle';
                    canvasCtx.shadowColor = '#ff4400';
                    canvasCtx.shadowBlur = 30;
                    canvasCtx.fillText('💣', b.position.x, b.position.y);
                }
                if (b.blockType === 'ice1' && !isFeverMode) {
                    const iconSize = Math.max(28, b.rectWidth * 0.4);
                    canvasCtx.globalAlpha = 1.0;
                    canvasCtx.font = `${iconSize}px serif`;
                    canvasCtx.textAlign = 'center';
                    canvasCtx.textBaseline = 'middle';
                    canvasCtx.shadowColor = '#00ccff';
                    canvasCtx.shadowBlur = 30;
                    canvasCtx.fillText('🧊', b.position.x, b.position.y);
                }

                // 일반 블록: 무거운 variant(서리/빙하)는 내부 빛줄기로 구분
                if (b.blockType === 'normal' && !isFeverMode && (b.iceVariant === 2 || b.iceVariant === 3)) {
                    canvasCtx.globalAlpha = 0.25;
                    canvasCtx.strokeStyle = 'rgba(180, 220, 255, 0.6)';
                    canvasCtx.lineWidth = 2;
                    // 대각선 빛줄기 (단단한 느낌)
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(b.position.x - b.rectWidth * 0.3, b.position.y - b.rectHeight * 0.3);
                    canvasCtx.lineTo(b.position.x + b.rectWidth * 0.3, b.position.y + b.rectHeight * 0.3);
                    canvasCtx.moveTo(b.position.x + b.rectWidth * 0.2, b.position.y - b.rectHeight * 0.3);
                    canvasCtx.lineTo(b.position.x - b.rectWidth * 0.2, b.position.y + b.rectHeight * 0.3);
                    canvasCtx.stroke();
                }

                canvasCtx.restore();

                // 크랙(균열) 그리기 - 국소 회전 좌표계로 변경
                canvasCtx.save();
                canvasCtx.translate(b.position.x, b.position.y);
                canvasCtx.rotate(b.angle);
                if (b.hitCooldown > 0.1 && !isFeverMode) {
                    canvasCtx.scale(1.05, 1.05);
                }

                let w = b.rectWidth;
                let h = b.rectHeight;

                canvasCtx.strokeStyle = isFeverMode ? 'rgba(255, 255, 255, 0.9)' : 'rgba(255, 255, 255, 0.9)';
                canvasCtx.lineWidth = 4 + (w * 0.02);

                let damageRatio = 1 - hpRatio;

                if (damageRatio > 0 && !isFeverMode) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(0, 0); canvasCtx.lineTo(-w * 0.35, -h * 0.4);
                    canvasCtx.moveTo(0, 0); canvasCtx.lineTo(w * 0.4, h * 0.35);

                    if (damageRatio >= 0.25) {
                        canvasCtx.moveTo(0, 0); canvasCtx.lineTo(w * 0.45, -h * 0.1);
                        canvasCtx.moveTo(w * 0.2, h * 0.15); canvasCtx.lineTo(w * 0.45, h * 0.05);
                    }
                    if (damageRatio >= 0.5) {
                        canvasCtx.moveTo(0, 0); canvasCtx.lineTo(-w * 0.4, h * 0.4);
                        canvasCtx.moveTo(0, 0); canvasCtx.lineTo(w * 0.1, -h * 0.45);
                        canvasCtx.moveTo(-w * 0.2, -h * 0.2); canvasCtx.lineTo(-w * 0.45, -h * 0.1);
                    }
                    if (damageRatio >= 0.75) {
                        canvasCtx.moveTo(w * 0.2, h * 0.15); canvasCtx.lineTo(w * 0.4, h * 0.45);
                        canvasCtx.moveTo(-w * 0.2, h * 0.2); canvasCtx.lineTo(-w * 0.45, h * 0.1);
                        canvasCtx.lineTo(-w * 0.3, h * 0.4);
                        canvasCtx.moveTo(w * 0.1, -h * 0.45); canvasCtx.lineTo(-w * 0.1, -h * 0.4);
                    }
                    canvasCtx.stroke();
                }

                canvasCtx.restore();
            }

            // 폭탄 충격파 렌더링
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const sw = shockwaves[i];
                sw.radius += 8;  // 퍼지는 속도 (느리게)
                sw.alpha = 1.0 - (sw.radius / sw.maxRadius);
                if (sw.alpha <= 0) {
                    shockwaves.splice(i, 1);
                    continue;
                }
                canvasCtx.save();
                // 바깥 테두리 (굵고 밝게)
                canvasCtx.globalAlpha = sw.alpha * 0.9;
                canvasCtx.strokeStyle = `rgba(255, 120, 30, ${sw.alpha})`;
                canvasCtx.lineWidth = 14 * sw.alpha + 4;
                canvasCtx.shadowColor = '#ff6600';
                canvasCtx.shadowBlur = 50;
                canvasCtx.beginPath();
                canvasCtx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
                canvasCtx.stroke();
                // 안쪽 밝은 테두리
                canvasCtx.globalAlpha = sw.alpha * 0.7;
                canvasCtx.strokeStyle = `rgba(255, 220, 80, ${sw.alpha})`;
                canvasCtx.lineWidth = 5 * sw.alpha + 2;
                canvasCtx.shadowBlur = 20;
                canvasCtx.stroke();
                // 안쪽 채우기 (반투명 오렌지-빨강)
                canvasCtx.globalAlpha = sw.alpha * 0.3;
                canvasCtx.fillStyle = 'rgba(255, 80, 20, 1)';
                canvasCtx.fill();
                canvasCtx.restore();
            }

            // 얼음 디버프 영역 렌더링 (하늘색 반투명 원)
            for (const ice of iceDebuffs) {
                canvasCtx.save();
                const a = Math.max(0, ice.alpha);
                // 바깥 테두리
                canvasCtx.globalAlpha = a * 0.6;
                canvasCtx.strokeStyle = `rgba(100, 200, 255, ${a})`;
                canvasCtx.lineWidth = 6;
                canvasCtx.shadowColor = '#00ccff';
                canvasCtx.shadowBlur = 40;
                canvasCtx.beginPath();
                canvasCtx.arc(ice.x, ice.y, ice.radius, 0, Math.PI * 2);
                canvasCtx.stroke();
                // 안쪽 채우기
                canvasCtx.globalAlpha = a * 0.12;
                canvasCtx.fillStyle = 'rgba(100, 200, 255, 1)';
                canvasCtx.fill();
                // 눈꽃 아이콘
                canvasCtx.globalAlpha = a * 0.8;
                canvasCtx.font = '40px serif';
                canvasCtx.textAlign = 'center';
                canvasCtx.textBaseline = 'middle';
                canvasCtx.fillStyle = '#ffffff';
                canvasCtx.fillText('❄️', ice.x, ice.y);
                canvasCtx.restore();
            }

            // 손/발 위에 무기 이펙트 그리기
            for (let p of bodyPoints) {
                drawWeapon(canvasCtx, p, currentStageIndex, isFeverMode, gameTime);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (!p.update(dt)) {
                    particles.splice(i, 1);
                } else {
                    p.draw(canvasCtx);
                }
            }
            // 화면 번쩍임 (흰색 플래시)
            if (flashAlpha > 0) {
                canvasCtx.save();
                canvasCtx.globalAlpha = Math.min(flashAlpha, 0.4);
                canvasCtx.fillStyle = '#ffffff';
                canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.restore();
            }

            // 매 프레임 UI(시간/게이지) 갱신
            updateUI();
        }

        // -------------------------
        // 시작
        // -------------------------
        let cameraStarted = false;

        startButton.addEventListener('click', async () => {
            startButton.style.display = 'none';
            loadingMsg.style.display = 'block';

            try {
                if (!cameraStarted) {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: "user"
                        }
                    });
                    videoElement.srcObject = stream;

                    const camera = new Camera(videoElement, {
                        onFrame: async () => {
                            await pose.send({ image: videoElement });
                        },
                        width: 1280,
                        height: 720
                    });

                    await camera.start();
                    cameraStarted = true;
                }

                overlay.style.display = 'none';
                loadingMsg.style.display = 'none';

                // 스테이지 프리뷰를 보여준 뒤 게임 시작
                showStagePreview(() => {
                    resetGame();
                });
            } catch (e) {
                alert("카메라 권한을 부여하거나 연결에 실패했습니다.\n" + e.message);
                startButton.style.display = 'block';
                loadingMsg.style.display = 'none';
            }
        });
    </script>
</body>

</html>
