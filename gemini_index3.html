<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Arcade - Ice Breaker (Physics)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #001122;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #videoElement {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            opacity: 0.8;
        }

        #themeOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: radial-gradient(circle at center, rgba(0, 200, 255, 0.1) 0%, rgba(0, 20, 60, 0.6) 100%);
            box-shadow: inset 0 0 100px rgba(0, 150, 255, 0.4);
            pointer-events: none;
            transition: all 0.5s;
        }

        .fever-mode-active #themeOverlay {
            background: radial-gradient(circle at center, rgba(255, 150, 255, 0.3) 0%, rgba(50, 0, 150, 0.6) 100%);
            box-shadow: inset 0 0 150px rgba(255, 255, 255, 0.8);
            animation: hueRotate 3s infinite linear;
        }

        .fever-mode-active #gameCanvas {
            animation: feverShakeCanvas 0.15s infinite alternate;
        }

        .fever-mode-active #videoElement {
            animation: feverShake 0.15s infinite alternate;
        }

        @keyframes hueRotate {
            from {
                filter: hue-rotate(0deg);
            }

            to {
                filter: hue-rotate(360deg);
            }
        }

        @keyframes feverShake {
            0%   { transform: scaleX(-1) translate( 3px,  2px); }
            25%  { transform: scaleX(-1) translate(-2px, -3px); }
            50%  { transform: scaleX(-1) translate( 2px, -1px); }
            75%  { transform: scaleX(-1) translate(-3px,  2px); }
            100% { transform: scaleX(-1) translate( 1px, -2px); }
        }

        @keyframes feverShakeCanvas {
            0%   { transform: translate( 3px,  2px); }
            25%  { transform: translate(-2px, -3px); }
            50%  { transform: translate( 2px, -1px); }
            75%  { transform: translate(-3px,  2px); }
            100% { transform: translate( 1px, -2px); }
        }

        .snow-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 2;
            animation: fall linear infinite;
        }

        .fever-mode-active .snow-particle {
            background: #ffffff;
            box-shadow: 0 0 10px #ff00ff;
            animation-duration: 2s !important;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        #gameCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 4;
            font-size: 42px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8);
            display: flex;
            gap: 60px;
            color: #dff9ff;
        }

        .ui-item span {
            color: #00ffff;
        }

        /* 오른쪽 게이지 UI */
        #rightUi {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .fever-title {
            font-size: 32px;
            font-weight: 900;
            color: #ff00ff;
            text-shadow: 0 0 15px #ff00ff;
            letter-spacing: 2px;
            animation: none;
        }

        .fever-active-text {
            animation: pulseFever 0.3s infinite alternate !important;
            color: #ffff00;
            text-shadow: 0 0 20px #00ffff;
        }

        @keyframes pulseFever {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.2);
            }
        }

        #feverBarContainer {
            width: 40px;
            height: 300px;
            background: rgba(0, 0, 0, 0.6);
            border: 4px solid #ff00ff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        #feverBar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #ff00ff, #00ffff);
            transition: height 0.1s;
            box-shadow: 0 0 20px #ff00ff;
        }

        .time-box {
            margin-top: 20px;
            font-size: 50px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 15, 30, 0.85);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        button {
            padding: 20px 50px;
            font-size: 30px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.8);
            border-color: white;
        }

        #loadingMsg {
            display: none;
            margin-top: 20px;
            color: #00ffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }

        /* ── 보상 화면 ── */
        #rewardScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(30,0,80,0.92) 0%, rgba(0,5,20,0.96) 100%);
            backdrop-filter: blur(14px);
            overflow: hidden;
        }
        #rewardScreen .reward-stars {
            font-size: 90px;
            margin-bottom: 10px;
            animation: rewardBounce 0.8s ease-out;
        }
        #rewardScreen .reward-title {
            font-size: 72px;
            font-weight: 900;
            color: #ffe44d;
            text-shadow: 0 0 40px #ffaa00, 0 0 80px #ff6600, 0 4px 8px rgba(0,0,0,0.6);
            margin-bottom: 10px;
            animation: rewardPop 0.6s cubic-bezier(0.17, 0.67, 0.29, 1.4);
        }
        #rewardScreen .reward-subtitle {
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 30px;
            animation: rewardFadeUp 0.8s ease-out 0.3s both;
        }
        #rewardScreen .reward-score-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,200,50,0.5);
            border-radius: 24px;
            padding: 30px 60px;
            margin-bottom: 40px;
            text-align: center;
            animation: rewardFadeUp 0.8s ease-out 0.5s both;
        }
        #rewardScreen .reward-score-label {
            font-size: 24px;
            color: #aaddff;
            margin-bottom: 8px;
        }
        #rewardScreen .reward-score-value {
            font-size: 80px;
            font-weight: 900;
            color: #ff44ff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #cc00cc;
        }
        #rewardScreen .reward-msg {
            font-size: 26px;
            color: #ccffcc;
            margin-bottom: 30px;
            animation: rewardFadeUp 0.8s ease-out 0.7s both;
        }
        #rewardScreen .reward-btn {
            padding: 20px 50px;
            font-size: 30px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff9500, #ff2d55);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,100,50,0.6);
            transition: all 0.3s;
            animation: rewardFadeUp 0.8s ease-out 0.9s both;
        }
        #rewardScreen .reward-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255,100,50,0.9);
        }
        .confetti-piece {
            position: absolute;
            width: 12px; height: 12px;
            top: -20px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
        }
        @keyframes rewardPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes rewardBounce {
            0% { transform: scale(0) translateY(40px); opacity: 0; }
            60% { transform: scale(1.3) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); }
        }
        @keyframes rewardFadeUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
    <!-- MediaPipe files -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>

<body>
    <div id="container">
        <!-- 웹캠 영상 -->
        <video id="videoElement" autoplay playsinline></video>

        <!-- 테마 오버레이 -->
        <div id="themeOverlay"></div>

        <script>
            const overlayLayer = document.getElementById('themeOverlay');
            for (let i = 0; i < 40; i++) {
                let snow = document.createElement('div');
                snow.className = 'snow-particle';
                snow.style.left = Math.random() * 100 + 'vw';
                snow.style.top = (Math.random() * -100) + 'vh';
                snow.style.width = snow.style.height = (Math.random() * 5 + 3) + 'px';
                snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
                snow.style.animationDelay = (Math.random() * 5) + 's';
                overlayLayer.appendChild(snow);
            }
        </script>

        <canvas id="gameCanvas"></canvas>

        <div id="ui">
            <div class="ui-item">SCORE: <span id="score">0</span></div>
            <div class="ui-item" style="font-size:24px; margin-top:10px; color:#ffdd00;" id="stageTitle">Lv.1 얼음 동굴 (무기:
                파란 마법장갑)</div>
        </div>

        <div id="rightUi">
            <div class="time-box" id="timeBox">01:00</div>
            <div class="fever-title" id="feverTitle">FEVER</div>
            <div id="feverBarContainer">
                <div id="feverBar"></div>
            </div>
        </div>

        <div id="overlay">
            <h1 id="endTitle"
                style="color: #00ffff; font-size: 72px; margin-bottom: 20px; text-transform: uppercase; font-style: italic; text-shadow: 0 0 30px #00d2ff;">
                Ice Breaker</h1>
            <div
                style="background: rgba(0,0,0,0.5); padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; margin-bottom: 50px;">
                <p id="endDesc"
                    style="font-size: 26px; max-width: 700px; text-align: center; line-height: 1.6; color: #dff9ff; margin: 0;">
                    <b>1분</b> 동안 신나고 재미있게 얼음 큐브를 파괴하세요!<br><br>
                    거대한 얼음도 포기하지 않고 팡팡 두드리면 시원하게 터집니다.<br>
                    신나게 움직여서 <b>무지개 파티(FEVER)</b>를 켜면 모든 얼음이 반짝이며 터집니다!
                </p>
            </div>
            <button id="startButton">게임 시작 (카메라 권한 필요)</button>
            <div id="loadingMsg">AI 및 얼음 마법 준비중... 잠시만 기다려주세요!</div>
        </div>

        <!-- 보상 화면 -->
        <div id="rewardScreen">
            <div class="reward-stars" id="rewardStars"></div>
            <div class="reward-title" id="rewardTitle"></div>
            <div class="reward-subtitle" id="rewardSubtitle"></div>
            <div class="reward-score-box">
                <div class="reward-score-label">획득한 점수</div>
                <div class="reward-score-value" id="rewardScore"></div>
            </div>
            <div class="reward-msg" id="rewardMsg"></div>
            <button class="reward-btn" id="rewardBtn"></button>
        </div>

        <!-- 스테이지 프리뷰 오버레이 -->
        <div id="stagePreview" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,10,30,0.92); z-index:15; flex-direction:column; justify-content:center; align-items:center;
            backdrop-filter:blur(12px);">
            <h1 id="previewTitle" style="color:#00ffff; font-size:64px; margin-bottom:10px; text-shadow:0 0 30px #00d2ff;
                text-transform:uppercase; font-style:italic; animation: pulse 1s infinite alternate;"></h1>
            <p id="previewWeapon" style="font-size:36px; color:#ffdd00; margin:0 0 30px 0; text-shadow:0 0 15px #ffdd00;"></p>

            <div style="display:flex; gap:40px; margin-bottom:40px; flex-wrap:wrap; justify-content:center;" id="previewItems"></div>

            <div id="previewCountdown" style="font-size:100px; font-weight:900; color:#ffffff;
                text-shadow:0 0 40px #00ffff, 0 0 80px #ff00ff; animation: pulse 0.5s infinite alternate;"></div>
        </div>
    </div>

    <script>
        // -------------------------
        // Matter.js 설정
        // -------------------------
        const Engine = Matter.Engine,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Body = Matter.Body;

        const engine = Engine.create();
        const world = engine.world;

        // DOM 
        const container = document.getElementById('container');
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const scoreElement = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const loadingMsg = document.getElementById('loadingMsg');
        const feverTitle = document.getElementById('feverTitle');
        const feverBar = document.getElementById('feverBar');
        const timeBox = document.getElementById('timeBox');

        // 상태
        let isPlaying = false;
        let score = 0;
        let gameTimeLeft = 60.0; // 1분
        let gameTime = 0; // 애니메이션용 누적 시간

        // ─────────────────────────────────────────
        // Web Audio 소리 시스템
        // ─────────────────────────────────────────
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // ── 타격음: 블록 타입별로 다른 소리 ──
        function playHit(stageIdx, blockType, iceVariant) {
            ensureAudio();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (blockType === 'bomb') {
                // 폭탄 타격: 둔탁한 금속음
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.1);
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                osc.start(t); osc.stop(t + 0.12);
            } else if (blockType === 'ice1') {
                // 얼음1 타격: 차가운 높은 음
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.1);
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                osc.start(t); osc.stop(t + 0.12);
            } else if (iceVariant === 3) {
                // 빙하 타격: 묵직한 둥 소리
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, t);
                osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                osc.start(t); osc.stop(t + 0.18);
            } else if (iceVariant === 2) {
                // 서리 타격: 단단한 탁 소리
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(350, t);
                osc.frequency.exponentialRampToValueAtTime(150, t + 0.1);
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                osc.start(t); osc.stop(t + 0.12);
            } else if (iceVariant === 1) {
                // 눈덩이 타격: 부드러운 퍽 소리
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (iceVariant === 4) {
                // 크리스탈 타격: 맑은 딩 소리
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, t);
                osc.frequency.exponentialRampToValueAtTime(600, t + 0.12);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
            } else {
                // 투명 얼음 타격: 기본 파삭
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                osc.start(t); osc.stop(t + 0.12);
            }
        }

        // ── 파괴음: 블록 타입별로 다른 소리 ──
        function playDestroy(stageIdx, blockType, iceVariant) {
            ensureAudio();
            const t = audioCtx.currentTime;

            if (blockType === 'bomb') {
                // 폭탄 폭발: 쿵! + 잔향
                const bass = audioCtx.createOscillator();
                const bg = audioCtx.createGain();
                bass.connect(bg); bg.connect(audioCtx.destination);
                bass.type = 'sine';
                bass.frequency.setValueAtTime(80, t);
                bass.frequency.exponentialRampToValueAtTime(20, t + 0.6);
                bg.gain.setValueAtTime(0.8, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                bass.start(t); bass.stop(t + 0.6);

                // 노이즈 폭발음
                const bufSize = audioCtx.sampleRate * 0.3;
                const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
                const noise = audioCtx.createBufferSource();
                noise.buffer = buf;
                const ng = audioCtx.createGain();
                noise.connect(ng); ng.connect(audioCtx.destination);
                ng.gain.setValueAtTime(0.5, t);
                ng.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                noise.start(t); noise.stop(t + 0.3);

                // 중간음 쩡
                const mid = audioCtx.createOscillator();
                const mg = audioCtx.createGain();
                mid.connect(mg); mg.connect(audioCtx.destination);
                mid.type = 'sawtooth';
                mid.frequency.setValueAtTime(250, t);
                mid.frequency.exponentialRampToValueAtTime(60, t + 0.4);
                mg.gain.setValueAtTime(0.35, t);
                mg.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                mid.start(t); mid.stop(t + 0.4);
                return;
            }

            if (blockType === 'ice1') {
                // 얼음1 파괴: 파삭 + 결빙 잔향
                const o1 = audioCtx.createOscillator();
                const g1 = audioCtx.createGain();
                o1.connect(g1); g1.connect(audioCtx.destination);
                o1.type = 'sine';
                o1.frequency.setValueAtTime(1500, t);
                o1.frequency.exponentialRampToValueAtTime(400, t + 0.3);
                g1.gain.setValueAtTime(0.4, t);
                g1.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                o1.start(t); o1.stop(t + 0.35);
                // 잔향 윙
                const o2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                o2.connect(g2); g2.connect(audioCtx.destination);
                o2.type = 'sine';
                o2.frequency.setValueAtTime(2000, t + 0.05);
                o2.frequency.exponentialRampToValueAtTime(1000, t + 0.5);
                g2.gain.setValueAtTime(0.15, t + 0.05);
                g2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                o2.start(t + 0.05); o2.stop(t + 0.5);
                return;
            }

            // 서브타입별 파괴음
            const v = iceVariant || 0;

            // 공통 저음 쿵
            const bass = audioCtx.createOscillator();
            const bg = audioCtx.createGain();
            bass.connect(bg); bg.connect(audioCtx.destination);
            bass.type = 'sine';

            // 공통 고음 파편
            const high = audioCtx.createOscillator();
            const hg = audioCtx.createGain();
            high.connect(hg); hg.connect(audioCtx.destination);

            if (v === 3) {
                // 빙하 파괴: 깊은 쿵 + 갈라지는 소리
                bass.frequency.setValueAtTime(100, t);
                bass.frequency.exponentialRampToValueAtTime(25, t + 0.5);
                bg.gain.setValueAtTime(0.7, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                bass.start(t); bass.stop(t + 0.5);

                high.type = 'sawtooth';
                high.frequency.setValueAtTime(400, t);
                high.frequency.exponentialRampToValueAtTime(80, t + 0.4);
                hg.gain.setValueAtTime(0.3, t);
                hg.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                high.start(t); high.stop(t + 0.4);
            } else if (v === 2) {
                // 서리 파괴: 단단한 쩍 + 파삭
                bass.frequency.setValueAtTime(250, t);
                bass.frequency.exponentialRampToValueAtTime(80, t + 0.3);
                bg.gain.setValueAtTime(0.6, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                bass.start(t); bass.stop(t + 0.3);

                high.type = 'square';
                high.frequency.setValueAtTime(1200, t);
                high.frequency.exponentialRampToValueAtTime(300, t + 0.2);
                hg.gain.setValueAtTime(0.2, t);
                hg.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                high.start(t); high.stop(t + 0.2);
            } else if (v === 1) {
                // 눈덩이 파괴: 부드러운 퍼프
                bass.frequency.setValueAtTime(200, t);
                bass.frequency.exponentialRampToValueAtTime(60, t + 0.25);
                bg.gain.setValueAtTime(0.35, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                bass.start(t); bass.stop(t + 0.25);

                high.type = 'sine';
                high.frequency.setValueAtTime(500, t);
                high.frequency.exponentialRampToValueAtTime(200, t + 0.15);
                hg.gain.setValueAtTime(0.15, t);
                hg.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                high.start(t); high.stop(t + 0.15);
            } else if (v === 4) {
                // 크리스탈 파괴: 맑은 딩딩 + 반짝 잔향
                bass.frequency.setValueAtTime(500, t);
                bass.frequency.exponentialRampToValueAtTime(300, t + 0.3);
                bg.gain.setValueAtTime(0.3, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                bass.start(t); bass.stop(t + 0.35);

                high.type = 'sine';
                high.frequency.setValueAtTime(1800, t);
                high.frequency.exponentialRampToValueAtTime(900, t + 0.4);
                hg.gain.setValueAtTime(0.25, t);
                hg.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                high.start(t); high.stop(t + 0.4);
            } else {
                // 투명 얼음 파괴: 기본 유리 깨지는 소리
                bass.frequency.setValueAtTime(180, t);
                bass.frequency.exponentialRampToValueAtTime(40, t + 0.35);
                bg.gain.setValueAtTime(0.5, t);
                bg.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                bass.start(t); bass.stop(t + 0.35);

                high.type = 'sawtooth';
                high.frequency.setValueAtTime(900, t);
                high.frequency.exponentialRampToValueAtTime(200, t + 0.25);
                hg.gain.setValueAtTime(0.2, t);
                hg.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                high.start(t); high.stop(t + 0.25);
            }
        }

        function playFeverStart() {
            ensureAudio();
            const t = audioCtx.currentTime;
            [261.6, 329.6, 392, 523.3].forEach((freq, i) => {
                const osc  = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const st = t + i * 0.08;
                gain.gain.setValueAtTime(0, st);
                gain.gain.linearRampToValueAtTime(0.4, st + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, st + 0.5);
                osc.start(st); osc.stop(st + 0.5);
            });
        }

        // 피버 BGM 시스템 (신나는 루프 음악)
        let feverBgmNodes = null;

        function startFeverBgm() {
            ensureAudio();
            if (feverBgmNodes) stopFeverBgm();

            const t = audioCtx.currentTime;
            const masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, t);
            masterGain.gain.linearRampToValueAtTime(0.25, t + 0.3);
            masterGain.connect(audioCtx.destination);

            const nodes = [];

            // 베이스 드럼 (4비트 반복)
            const beatInterval = 0.25; // 240 BPM
            const loopLen = 2.0;       // 2초 루프
            const totalBeats = Math.floor(loopLen / beatInterval);

            function scheduleDrumLoop(startTime) {
                for (let i = 0; i < totalBeats; i++) {
                    const bt = startTime + i * beatInterval;
                    const kick = audioCtx.createOscillator();
                    const kickG = audioCtx.createGain();
                    kick.connect(kickG); kickG.connect(masterGain);
                    kick.type = 'sine';
                    kick.frequency.setValueAtTime(150, bt);
                    kick.frequency.exponentialRampToValueAtTime(40, bt + 0.1);
                    kickG.gain.setValueAtTime(0.6, bt);
                    kickG.gain.exponentialRampToValueAtTime(0.001, bt + 0.12);
                    kick.start(bt); kick.stop(bt + 0.12);
                    nodes.push(kick);

                    // 하이햇 (오프비트)
                    if (i % 2 === 1) {
                        const hat = audioCtx.createOscillator();
                        const hatG = audioCtx.createGain();
                        hat.connect(hatG); hatG.connect(masterGain);
                        hat.type = 'square';
                        hat.frequency.setValueAtTime(8000, bt);
                        hatG.gain.setValueAtTime(0.08, bt);
                        hatG.gain.exponentialRampToValueAtTime(0.001, bt + 0.05);
                        hat.start(bt); hat.stop(bt + 0.05);
                        nodes.push(hat);
                    }
                }
            }

            // 멜로디 (밝은 아르페지오 루프)
            const melody = [523, 659, 784, 1047, 784, 659, 523, 659]; // C5-E5-G5-C6 아르페지오
            const noteLen = loopLen / melody.length;

            function scheduleMelodyLoop(startTime) {
                melody.forEach((freq, i) => {
                    const nt = startTime + i * noteLen;
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.connect(g); g.connect(masterGain);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, nt);
                    g.gain.setValueAtTime(0.18, nt);
                    g.gain.exponentialRampToValueAtTime(0.001, nt + noteLen * 0.9);
                    osc.start(nt); osc.stop(nt + noteLen);
                    nodes.push(osc);
                });
            }

            // 베이스라인
            const bassNotes = [131, 165, 196, 165]; // C3-E3-G3-E3
            const bassNoteLen = loopLen / bassNotes.length;

            function scheduleBassLoop(startTime) {
                bassNotes.forEach((freq, i) => {
                    const nt = startTime + i * bassNoteLen;
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.connect(g); g.connect(masterGain);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, nt);
                    g.gain.setValueAtTime(0.12, nt);
                    g.gain.exponentialRampToValueAtTime(0.02, nt + bassNoteLen * 0.8);
                    osc.start(nt); osc.stop(nt + bassNoteLen);
                    nodes.push(osc);
                });
            }

            // 5루프 스케줄 (피버 8초 커버)
            for (let loop = 0; loop < 5; loop++) {
                const lt = t + loop * loopLen;
                scheduleDrumLoop(lt);
                scheduleMelodyLoop(lt);
                scheduleBassLoop(lt);
            }

            feverBgmNodes = { masterGain, nodes };
        }

        function stopFeverBgm() {
            if (!feverBgmNodes) return;
            const t = audioCtx.currentTime;
            feverBgmNodes.masterGain.gain.cancelScheduledValues(t);
            feverBgmNodes.masterGain.gain.setValueAtTime(feverBgmNodes.masterGain.gain.value, t);
            feverBgmNodes.masterGain.gain.linearRampToValueAtTime(0, t + 0.3);
            // 모든 노드 정리
            setTimeout(() => {
                if (feverBgmNodes) {
                    feverBgmNodes.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
                    feverBgmNodes.masterGain.disconnect();
                    feverBgmNodes = null;
                }
            }, 400);
        }

        // ── 스테이지 배경음 시스템 ──
        let bgmNodes = null;
        let bgmInterval = null;

        function startBgm(stageIdx) {
            stopBgm();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const master = audioCtx.createGain();
            master.gain.value = 0.08; // 은은하게
            master.connect(audioCtx.destination);

            const nodes = [];

            // 스테이지별 음계와 템포
            const configs = [
                // Lv.1 얼음 동굴: 몽환적, 차분한 펜타토닉
                { notes: [261.6, 311.1, 349.2, 392.0, 466.2, 523.3, 466.2, 392.0],
                  bass: [130.8, 155.6, 174.6, 130.8], bpm: 100, wave: 'sine', bassWave: 'triangle', vol: 0.5 },
                // Lv.2 우주 운석: 약간 긴장감, 마이너
                { notes: [329.6, 369.99, 415.3, 493.88, 554.37, 493.88, 415.3, 369.99],
                  bass: [164.8, 185.0, 207.65, 164.8], bpm: 120, wave: 'triangle', bassWave: 'sawtooth', vol: 0.4 },
                // Lv.3 다이아몬드 성: 밝고 활기찬 메이저
                { notes: [523.3, 587.3, 659.3, 784.0, 880.0, 784.0, 659.3, 587.3],
                  bass: [261.6, 293.7, 329.6, 261.6], bpm: 140, wave: 'triangle', bassWave: 'triangle', vol: 0.45 },
            ];

            const cfg = configs[stageIdx] || configs[0];
            const beatMs = 60000 / cfg.bpm;
            let noteIdx = 0;
            let bassIdx = 0;

            // 패드 (지속음, 코드 분위기)
            const pad = audioCtx.createOscillator();
            const padG = audioCtx.createGain();
            pad.type = 'sine';
            pad.frequency.value = cfg.notes[0] / 2;
            padG.gain.value = 0.15;
            pad.connect(padG);
            padG.connect(master);
            pad.start();
            nodes.push(pad);

            // 멜로디 + 베이스를 setInterval로 스케줄링
            bgmInterval = setInterval(() => {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;

                // 멜로디 음
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = cfg.wave;
                osc.frequency.value = cfg.notes[noteIdx % cfg.notes.length];
                g.gain.setValueAtTime(cfg.vol * 0.5, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + beatMs / 1000 * 0.9);
                osc.connect(g);
                g.connect(master);
                osc.start(now);
                osc.stop(now + beatMs / 1000);

                // 매 4비트마다 베이스
                if (noteIdx % 2 === 0) {
                    const bass = audioCtx.createOscillator();
                    const bg = audioCtx.createGain();
                    bass.type = cfg.bassWave;
                    bass.frequency.value = cfg.bass[bassIdx % cfg.bass.length];
                    bg.gain.setValueAtTime(cfg.vol * 0.35, now);
                    bg.gain.exponentialRampToValueAtTime(0.001, now + beatMs / 1000 * 1.8);
                    bass.connect(bg);
                    bg.connect(master);
                    bass.start(now);
                    bass.stop(now + beatMs / 1000 * 2);
                    bassIdx++;
                }

                // 패드 음 천천히 변경
                pad.frequency.setTargetAtTime(cfg.notes[noteIdx % cfg.notes.length] / 2, now, 0.5);

                noteIdx++;
            }, beatMs);

            bgmNodes = { master, nodes };
        }

        function stopBgm() {
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
            if (!bgmNodes) return;
            if (audioCtx) {
                const t = audioCtx.currentTime;
                bgmNodes.master.gain.cancelScheduledValues(t);
                bgmNodes.master.gain.setValueAtTime(bgmNodes.master.gain.value, t);
                bgmNodes.master.gain.linearRampToValueAtTime(0, t + 0.5);
                setTimeout(() => {
                    if (bgmNodes) {
                        bgmNodes.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
                        bgmNodes.master.disconnect();
                        bgmNodes = null;
                    }
                }, 600);
            } else {
                bgmNodes = null;
            }
        }

        let feverValue = 0; // 0 to 100
        let isFeverMode = false;
        let feverTimer = 0.0; // 피버 지속 시간
        const FEVER_DURATION = 8.0;

        let particles = [];

        // 폭탄 충격파 이펙트

        // 화면 흔들기
        function screenShake(duration, intensity) {
            const el = document.getElementById('container');
            const start = Date.now();
            function shake() {
                const elapsed = Date.now() - start;
                if (elapsed > duration) {
                    el.style.transform = '';
                    return;
                }
                const decay = 1 - elapsed / duration;
                const dx = (Math.random() - 0.5) * 2 * intensity * decay;
                const dy = (Math.random() - 0.5) * 2 * intensity * decay;
                el.style.transform = `translate(${dx}px, ${dy}px)`;
                requestAnimationFrame(shake);
            }
            shake();
        }

        // 히트스톱 (순간 멈춤으로 타격감)

        let animationFrameId;

        const HIT_RADIUS = 0; // 각 bodyPoint의 p.radius를 사용하므로 여기선 0
        let currentStageIndex = 0;

        // 스테이지 기획 데이터 (3단계)
        const STAGES = [
            {

        let ground, leftWall, rightWall, topWall;

        // wallR: 벽/바닥 탄성계수, addTop: 천장 벽 추가 여부 (Lv.3용)
        function updateBounds(wallR = 0.1, addTop = false) {
            canvasElement.width  = window.innerWidth;
            canvasElement.height = window.innerHeight;

            [ground, leftWall, rightWall, topWall].forEach(b => { if (b) Composite.remove(world, b); });

            const w = canvasElement.width, h = canvasElement.height;
            const wallOpts = (r) => ({ isStatic: true, friction: 0.05, restitution: r });

            ground    = Bodies.rectangle(w / 2,    h + 50,  w + 1000, 100, wallOpts(wallR));
            leftWall  = Bodies.rectangle(-50,       h / 2,  100, h * 3,  wallOpts(wallR));
            rightWall = Bodies.rectangle(w + 50,    h / 2,  100, h * 3,  wallOpts(wallR));
            const bodies = [ground, leftWall, rightWall];

            if (addTop) {
                topWall = Bodies.rectangle(w / 2, -50, w + 1000, 100, wallOpts(wallR));
                bodies.push(topWall);

            Composite.add(world, bodies);

        window.addEventListener('resize', () => {

        updateBounds();

        // 스테이지별 물리 설정
        const STAGE_PHYSICS = [

            { gravity: 1.0,  wallR: 0.1,  addTop: false,

              initVel: ()  => { const a = Math.random() * Math.PI * 2, s = 5 + Math.random() * 5;
                                return { x: Math.cos(a) * s, y: Math.sin(a) * s }; },
              angVel:  ()  => (Math.random() - 0.5) * 0.4 },
        ];

        // 파편 효과
        class IceParticle {
            constructor(x, y, isFever) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 300 + Math.random() * 800; // 넓게 튀김
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.size = 15 + Math.random() * 25;
                this.rotation = Math.random() * Math.PI;
                this.rotSpeed = (Math.random() - 0.5) * 15;

                const stageData = STAGES[currentStageIndex];
                const colors = isFever
                    ? ['#ff00ff', '#00ffff', '#ffff00', '#ffaa00', '#00ffaa']
                    : stageData.particleColors;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.isFever = isFever;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += 1500 * dt; // 중력 강하게
                this.life -= dt * 1.5;
                this.rotation += this.rotSpeed * dt;
                return this.life > 0;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.isFever ? '#ff00ff' : '#00ffff';
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size / 2, this.size);
                ctx.lineTo(-this.size / 2, this.size);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        }

        // ─────────────────────────────────────────
        // 무기 이펙트 드로잉 함수
        // ─────────────────────────────────────────

        // Stage 0: 얼음 주먹 — 얼음 결정 8개가 손 주위에 회전
        function drawIceFist(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            // 외부 오라
            ctx.globalCompositeOperation = 'lighter';
            const aura = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 2.2);
            aura.addColorStop(0,   'rgba(180, 245, 255, 0.55)');
            aura.addColorStop(0.5, 'rgba(0,  190, 255, 0.25)');
            aura.addColorStop(1,   'rgba(0,   80, 200, 0)');
            ctx.fillStyle = aura;
            ctx.beginPath(); ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // 얼음 결정 8개 (천천히 자전)
            const NUM = 8;
            ctx.rotate(t * 0.4);
            for (let i = 0; i < NUM; i++) {
                ctx.save();
                ctx.rotate((i / NUM) * Math.PI * 2);
                const len = r * (1.1 + 0.22 * Math.sin(t * 2.5 + i));
                const wid = r * 0.22;
                const grad = ctx.createLinearGradient(0, -r * 0.5, 0, -(r * 0.5 + len));
                grad.addColorStop(0,   'rgba(220, 248, 255, 0.95)');
                grad.addColorStop(0.4, 'rgba(100, 210, 255, 0.85)');
                grad.addColorStop(1,   'rgba(255, 255, 255, 0.3)');
                ctx.shadowBlur  = 14; ctx.shadowColor = '#00d4ff';
                ctx.fillStyle   = grad;
                // 마름모 결정 모양
                ctx.beginPath();
                ctx.moveTo(0, -r * 0.5);
                ctx.lineTo(wid * 0.55,  -(r * 0.5 + len * 0.35));
                ctx.lineTo(0,           -(r * 0.5 + len));
                ctx.lineTo(-wid * 0.55, -(r * 0.5 + len * 0.35));
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 코어 (얼음 구슬)
            ctx.shadowBlur = 25; ctx.shadowColor = '#80eeff';
            const core = ctx.createRadialGradient(0, -r * 0.1, 0, 0, 0, r * 0.65);
            core.addColorStop(0,   'rgba(255, 255, 255, 1)');
            core.addColorStop(0.4, 'rgba(160, 235, 255, 0.92)');
            core.addColorStop(1,   'rgba(0,   160, 220, 0.6)');
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // Stage 1: 불꽃 주먹 — 화염이 손에서 뿜어나옴
        function drawFireFist(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            // 외부 열기
            ctx.globalCompositeOperation = 'lighter';
            const heat = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 2.4);
            heat.addColorStop(0,   'rgba(255, 200, 50,  0.5)');
            heat.addColorStop(0.4, 'rgba(255,  80,  0,  0.25)');
            heat.addColorStop(1,   'rgba(200,   0,  0,  0)');
            ctx.fillStyle = heat;
            ctx.beginPath(); ctx.arc(0, 0, r * 2.4, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // 화염 6줄기
            const NUM = 6;
            for (let i = 0; i < NUM; i++) {
                ctx.save();
                ctx.rotate((i / NUM) * Math.PI * 2 + t * 0.8);
                const len = r * (1.25 + 0.38 * Math.sin(t * 4.5 + i * 1.3));
                const wid = r * (0.32 + 0.08 * Math.sin(t * 3 + i));
                const flameGrad = ctx.createLinearGradient(0, -r * 0.35, 0, -(r * 0.35 + len));
                flameGrad.addColorStop(0,   'rgba(255, 230,  60, 0.95)');
                flameGrad.addColorStop(0.35,'rgba(255, 110,   0, 0.85)');
                flameGrad.addColorStop(0.7, 'rgba(220,  30,   0, 0.5)');
                flameGrad.addColorStop(1,   'rgba(150,   0,   0, 0)');
                ctx.shadowBlur = 18; ctx.shadowColor = '#ff5500';
                ctx.fillStyle  = flameGrad;
                const base = -r * 0.35;
                const wobble = wid * 0.4 * Math.sin(t * 6 + i * 2);
                ctx.beginPath();
                ctx.moveTo(-wid * 0.5, base);
                ctx.bezierCurveTo(-wid * 0.6, base - len * 0.3, wobble, base - len * 0.65, 0, base - len);
                ctx.bezierCurveTo(-wobble, base - len * 0.65, wid * 0.6, base - len * 0.3, wid * 0.5, base);
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 코어 (불덩어리)
            ctx.shadowBlur = 30; ctx.shadowColor = '#ff8800';
            const core = ctx.createRadialGradient(0, -r * 0.08, 0, 0, 0, r * 0.68);
            core.addColorStop(0,   'rgba(255, 248, 180, 1)');
            core.addColorStop(0.45,'rgba(255, 160,   0, 0.9)');
            core.addColorStop(1,   'rgba(200,  40,   0, 0.7)');
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.68, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // Stage 2: 번개 검 — 손에서 에너지 검이 뻗어나옴 + 전기 아크
        function drawLightningBlade(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            // 자기장 오라
            ctx.globalCompositeOperation = 'lighter';
            const field = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 2.0);
            field.addColorStop(0,   'rgba(200, 80, 255, 0.5)');
            field.addColorStop(0.5, 'rgba(100,  0, 255, 0.25)');
            field.addColorStop(1,   'rgba(0,    0, 200, 0)');
            ctx.fillStyle = field;
            ctx.beginPath(); ctx.arc(0, 0, r * 2.0, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // 검 본체 (위쪽으로 뻗음)
            const bladeLen = r * 3.8;
            const bladeW   = r * 0.28;
            const bladeGrad = ctx.createLinearGradient(0, -r * 0.5, 0, -r * 0.5 - bladeLen);
            bladeGrad.addColorStop(0,   'rgba(255, 255, 255, 0.98)');
            bladeGrad.addColorStop(0.2, 'rgba(210, 110, 255, 0.9)');
            bladeGrad.addColorStop(0.6, 'rgba(130,  0,  255, 0.65)');
            bladeGrad.addColorStop(1,   'rgba(60,   0,  180, 0)');
            ctx.shadowBlur  = 28; ctx.shadowColor = '#cc00ff';
            ctx.fillStyle   = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-bladeW * 0.5, -r * 0.5);
            ctx.lineTo( bladeW * 0.5, -r * 0.5);
            ctx.lineTo(0, -r * 0.5 - bladeLen);
            ctx.closePath(); ctx.fill();

            // 전기 아크 (검을 따라 지직거림)
            for (let i = 0; i < 5; i++) {
                const prog    = 0.15 + (i / 5) * 0.82;
                const arcY    = -(r * 0.5 + bladeLen * prog);
                const maxAmp  = r * (0.35 - prog * 0.25);
                const amp     = maxAmp * Math.sin(t * 9 + i * 1.7);
                ctx.strokeStyle = `rgba(255, 200, 255, ${0.8 - prog * 0.4})`;
                ctx.lineWidth   = 2.5;
                ctx.shadowBlur  = 10; ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(-amp * 1.2, arcY - r * 0.18);
                ctx.lineTo(amp * 1.5,  arcY);
                ctx.lineTo(-amp * 0.7, arcY + r * 0.12);
                ctx.stroke();
            }

            // 손잡이 크로스가드
            ctx.shadowBlur  = 12; ctx.shadowColor = '#9900ff';
            ctx.fillStyle   = 'rgba(180, 80, 255, 0.85)';
            ctx.fillRect(-r * 0.7, -r * 0.65, r * 1.4, r * 0.22);

            // 코어 (에너지 구슬)
            ctx.shadowBlur = 32; ctx.shadowColor = '#dd00ff';
            const core = ctx.createRadialGradient(0, -r * 0.08, 0, 0, 0, r * 0.65);
            core.addColorStop(0,   'rgba(255, 255, 255, 1)');
            core.addColorStop(0.4, 'rgba(210, 100, 255, 0.92)');
            core.addColorStop(1,   'rgba(100,   0, 220, 0.6)');
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // Fever: 무지개 소용돌이 에너지
        function drawRainbowVortex(ctx, x, y, r, t) {
            ctx.save();
            ctx.translate(x, y);

            const ARMS = 7;
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < ARMS; i++) {
                ctx.save();
                ctx.rotate((i / ARMS) * Math.PI * 2 + t * 2.5);
                const hue = ((i / ARMS) * 360 + t * 110) % 360;
                const len = r * (2.2 + 0.5 * Math.sin(t * 3.5 + i));
                const wid = r * 0.38;
                const armGrad = ctx.createLinearGradient(0, 0, 0, -len);
                armGrad.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.85)`);
                armGrad.addColorStop(1, `hsla(${(hue+60)%360}, 100%, 60%, 0)`);
                ctx.shadowBlur = 22; ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                ctx.fillStyle  = armGrad;
                ctx.beginPath();
                ctx.moveTo(-wid * 0.25, 0);
                ctx.bezierCurveTo(-wid, -len * 0.28, wid * 0.5, -len * 0.55, 0, -len);
                ctx.bezierCurveTo(-wid * 0.5, -len * 0.55, wid, -len * 0.28, wid * 0.25, 0);
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 코어
            ctx.globalCompositeOperation = 'source-over';
            const pulse = 1 + 0.18 * Math.sin(t * 6);
            const hue   = (t * 130) % 360;
            ctx.shadowBlur = 45; ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
            const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.72 * pulse);
            core.addColorStop(0,   'rgba(255, 255, 255, 1)');
            core.addColorStop(0.5, `hsla(${hue}, 100%, 70%, 0.9)`);
            core.addColorStop(1,   `hsla(${hue}, 100%, 50%, 0)`);
            ctx.fillStyle = core;
            ctx.beginPath(); ctx.arc(0, 0, r * 0.72 * pulse, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // 장갑 그리기
        function drawGlove(ctx, x, y, r, stageIdx, fever) {
            ctx.save();
            ctx.translate(x, y);

            const gloveR = r * 0.55;
            let gloveColor, borderColor, shadowColor;

            if (fever) {
                gloveColor = 'rgba(255, 200, 255, 0.7)';
                borderColor = 'rgba(255, 255, 255, 0.9)';
                shadowColor = '#ff00ff';
            } else if (stageIdx === 0) {
                gloveColor = 'rgba(180, 230, 255, 0.6)';
                borderColor = 'rgba(200, 240, 255, 0.9)';
                shadowColor = '#00ccff';
            } else if (stageIdx === 1) {
                gloveColor = 'rgba(255, 150, 50, 0.6)';
                borderColor = 'rgba(255, 200, 100, 0.9)';
                shadowColor = '#ff6600';
            } else {
                gloveColor = 'rgba(220, 150, 255, 0.6)';
                borderColor = 'rgba(255, 200, 255, 0.9)';
                shadowColor = '#cc00ff';
            }

            // 장갑 본체 (둥근 주먹 모양)
            ctx.shadowColor = shadowColor;
            ctx.shadowBlur = 15;
            ctx.fillStyle = gloveColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, gloveR, gloveR * 1.15, 0, 0, Math.PI * 2);
            ctx.fill();

            // 테두리
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 손가락 마디 라인
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, -gloveR * 0.3, gloveR * 0.6, -Math.PI * 0.8, -Math.PI * 0.2);
            ctx.stroke();

            ctx.restore();
        }

        function drawWeapon(ctx, p, stageIdx, fever, t) {
            // 얼음 디버프 영역 안이면 이펙트 절반 크기
            const inIce = !fever && isInIceZone(p.x, p.y);
            const r = inIce ? p.radius * 0.5 : p.radius;

            // 장갑을 먼저 그리고 그 위에 무기 이펙트
            drawGlove(ctx, p.x, p.y, r, stageIdx, fever);

            if (inIce) {
                // 디버프 상태: 파란 얼어붙는 이펙트 추가
                ctx.save();
                ctx.globalAlpha = 0.4 + 0.2 * Math.sin(t * 5);
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 25;
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r * 1.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.font = `${Math.max(16, r * 0.5)}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = 0.7;
                ctx.fillText('❄️', p.x, p.y - r * 1.5);
                ctx.restore();
            }

            if (fever) { drawRainbowVortex(ctx, p.x, p.y, r, t); return; }
            if (stageIdx === 0) drawIceFist(ctx, p.x, p.y, r, t);
            else if (stageIdx === 1) drawFireFist(ctx, p.x, p.y, r, t);
            else drawLightningBlade(ctx, p.x, p.y, r, t);
        }

        function spawnBlock() {
            const stageData  = STAGES[currentStageIndex];
            const phys       = STAGE_PHYSICS[currentStageIndex];
            const stage      = currentStageIndex;

            let scaleFactor  = 1 + Math.random() * 6.0;
            let size         = 60 * scaleFactor;
            const W = canvasElement.width, H = canvasElement.height;

            // 스테이지별 스폰 위치
            let x, y;
            if (stage === 2) {
                // Lv.3: 4면 어디서든 랜덤 진입
                const edge = Math.floor(Math.random() * 4);
                if      (edge === 0) { x = -size;    y = Math.random() * H; }          // 왼쪽
                else if (edge === 1) { x = W + size; y = Math.random() * H; }          // 오른쪽
                else if (edge === 2) { x = Math.random() * W; y = -size; }             // 위
                else                 { x = Math.random() * W; y = H + size; }          // 아래
            } else {
                const margin = size + 50;
                x = margin + Math.random() * (W - margin * 2);
                y = -size - 100;
            }

            const options = phys.bodyOpts(scaleFactor);

            let block;
            if (stageData.shapeType === 'rect') {
                block = Bodies.rectangle(x, y, size, size, options);
            } else if (stageData.shapeType === 'circle') {
                block = Bodies.circle(x, y, size / 2, options);
            } else {
                const sides = Math.floor(Math.random() * 4) + 4;
                block = Bodies.polygon(x, y, sides, size / 2, options);
            }

            // 초기 속도 & 회전 (스테이지별)
            const vel = phys.initVel();
            Body.setVelocity(block, vel);
            Body.setAngularVelocity(block, phys.angVel());

            block.isBlock         = true;
            block.maxHp           = Math.max(1, Math.floor(scaleFactor * stageData.hpMultiplier));
            block.hp              = block.maxHp;
            block.hitCooldown     = 0;
            block.timeSinceSpawn  = 0;
            block.rectWidth       = size;
            block.rectHeight      = size;
            block.scaleFactor     = scaleFactor;
            block.nudgeTimer      = 0; // Lv.3 랜덤 방향 재부여용
            block.hasEnteredScreen = false; // Lv.2 화면 진입 추적용

            // 특수 블록 결정
            const rng = Math.random();
            if (rng < 0.12) {
                // 폭탄 블록 (12%) - 터뜨리면 주변 블록도 같이 폭발!
                block.blockType = 'bomb';
                block.hp    = 5;
                block.maxHp = 5;
                Body.set(block, 'restitution', 0.01);
                Body.set(block, 'friction', 1.0);
                Body.set(block, 'frictionAir', 0.15);  // 공기저항 높여서 안 튀게
            } else if (stage === 1 && rng < 0.22) {
                // 얼음1 블록 (스테이지2 전용, 10%) - 터뜨리면 주변 영역 7초간 파워 1/5
                block.blockType = 'ice1';
                block.hp    = 3;
                block.maxHp = 3;
                Body.set(block, 'restitution', 0.01);
                Body.set(block, 'friction', 1.0);
                Body.set(block, 'frictionAir', 0.15);
            } else {
                block.blockType = 'normal';
                // 스테이지별 블록 배리에이션
                const allVariants = [
                    { id: 0, name: 'clear',   densityMul: 1.0 },  // 투명 얼음
                    { id: 1, name: 'snow',    densityMul: 0.6 },  // 눈덩이
                    { id: 2, name: 'frost',   densityMul: 5.0 },  // 서리 (무거움)
                    { id: 3, name: 'glacier', densityMul: 10.0 }, // 빙하 (매우 무거움)
                    { id: 4, name: 'crystal', densityMul: 0.8 },  // 크리스탈
                ];
                const stageVariants = [
                    [allVariants[0], allVariants[1], allVariants[3]],  // Lv.1: 투명 얼음, 눈덩이, 빙하
                    [allVariants[2], allVariants[3]],                  // Lv.2: 서리, 빙하
                    [allVariants[4]],                                  // Lv.3: 크리스탈
                ];
                const pool = stageVariants[stage] || stageVariants[0];
                const v = pool[Math.floor(Math.random() * pool.length)];
                block.iceVariant = v.id;
                // 무게 보정
                Body.set(block, 'density', block.density * v.densityMul);
                // 무거운 블록(서리, 빙하)은 안 튕기고 묵직하게
                if (v.id === 2 || v.id === 3) {
                    Body.set(block, 'restitution', 0.01);
                    Body.set(block, 'friction', 1.0);
                    Body.set(block, 'frictionAir', 0.12);
                }
            }

            Composite.add(world, block);
        }

        function updateUI() {
            scoreElement.innerText = score;

            // Time Text Update
            let m = Math.floor(gameTimeLeft / 60);
            let s = Math.floor(gameTimeLeft % 60);
            timeBox.innerText = `0${m}:${s < 10 ? '0' + s : s}`;
            if (gameTimeLeft <= 10) {
                timeBox.style.color = '#ffff00'; // 부드러운 노란색으로 경고 느낌 감소
                timeBox.style.animation = 'pulseFever 0.3s infinite alternate';
            } else {
                timeBox.style.color = 'white';
                timeBox.style.animation = 'none';
            }

            // Fever Update
            if (isFeverMode) {
                feverBar.style.height = `${(feverTimer / FEVER_DURATION) * 100}%`;
            } else {
                feverBar.style.height = `${feverValue}%`;
            }
        }

        function activateFever() {
            isFeverMode = true;
            feverTimer = FEVER_DURATION;
            feverValue = 0;
            container.classList.add('fever-mode-active');
            feverTitle.classList.add('fever-active-text');
            feverTitle.innerText = "PARTY!!";
            playFeverStart();
            startFeverBgm();
            // 배경음 볼륨 낮추기 (피버 BGM과 겹치지 않게)
            if (bgmNodes && audioCtx) {
                bgmNodes.master.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.3);
            }
        }

        function deactivateFever() {
            isFeverMode = false;
            feverTimer = 0;
            feverValue = 0;
            container.classList.remove('fever-mode-active');
            feverTitle.classList.remove('fever-active-text');
            feverTitle.innerText = "PARTY";
            stopFeverBgm();
            // 배경음 볼륨 복구
            if (bgmNodes && audioCtx) {
                bgmNodes.master.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.5);
            }
        }

        function addFever(amt) {
            if (isFeverMode || gameTimeLeft <= 0) return;
            feverValue += amt;
            if (feverValue >= 100) {
                feverValue = 100;
                activateFever();
            }
        }

        function gameOver() {
            isPlaying = false;
            stopFeverBgm();
            stopBgm();

            let isLastStage = (currentStageIndex >= STAGES.length - 1);
            showRewardScreen(score, isLastStage);

            if (isLastStage) {
                currentStageIndex = 0;
                score = 0;
            } else {
                currentStageIndex++;
            }
        }

        // ── 보상 화면 시스템 ──
        function showRewardScreen(finalScore, isAllClear) {
            const screen = document.getElementById('rewardScreen');
            screen.style.display = 'flex';

            // 별/이모지
            const starsEl = document.getElementById('rewardStars');
            if (isAllClear) {
                starsEl.textContent = '🏆🌟🏆';
            } else if (finalScore >= 300) {
                starsEl.textContent = '⭐⭐⭐';
            } else if (finalScore >= 150) {
                starsEl.textContent = '⭐⭐';
            } else {
                starsEl.textContent = '⭐';
            }
            // 리셋 애니메이션
            starsEl.style.animation = 'none';
            starsEl.offsetHeight;
            starsEl.style.animation = 'rewardBounce 0.8s ease-out';

            // 제목
            const titleEl = document.getElementById('rewardTitle');
            titleEl.textContent = isAllClear ? '모든 스테이지 클리어!' : 'STAGE CLEAR!';
            titleEl.style.animation = 'none';
            titleEl.offsetHeight;
            titleEl.style.animation = 'rewardPop 0.6s cubic-bezier(0.17, 0.67, 0.29, 1.4)';

            // 부제
            const subtitleEl = document.getElementById('rewardSubtitle');
            const praiseList = [
                '정말 대단해요! 최고!', '너무 잘했어요!', '와, 멋져요!',

                    current = target;
                    clearInterval(interval);
                }
                el.textContent = current;
            }, 30);

        function playRewardSound(isAllClear) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            // 팡파레 멜로디 (C E G C5 E5)
            const notes = isAllClear
                ? [523.25, 659.25, 783.99, 1046.5, 1318.5, 1568.0]
                : [523.25, 659.25, 783.99, 1046.5];

            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.25, now + i * 0.15);
                gain.gain.exponentialDecayToValueAtTime?.(0.01, now + i * 0.15 + 0.6) ||
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.6);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i * 0.15);
                osc.stop(now + i * 0.15 + 0.6);
            });

            // 심벌즈 느낌 노이즈
            const bufSize = audioCtx.sampleRate * 0.4;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buf;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.2, now + 0.1);
            ng.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            noise.connect(ng);
            ng.connect(audioCtx.destination);
            noise.start(now + 0.1);
            noise.stop(now + 0.5);
        }

        // ── 카운트다운 사운드 ──
        function playCountdownBeep(num) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            // 3→낮은음, 2→중간, 1→높은음 (점점 긴장감 UP)
            const freq = num === 3 ? 440 : num === 2 ? 554.37 : 659.25;

            // 메인 톤 (빵!)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + 0.25);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.25);

            // 킥 드럼 느낌 (뿌웅)
            const kick = audioCtx.createOscillator();
            const kickG = audioCtx.createGain();
            kick.type = 'sine';
            kick.frequency.setValueAtTime(150, now);
            kick.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            kickG.gain.setValueAtTime(0.4, now);
            kickG.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            kick.connect(kickG);
            kickG.connect(audioCtx.destination);
            kick.start(now);
            kick.stop(now + 0.15);
        }

        function playCountdownGo() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            // 상승 스윕 (빠~앙~~)
            const sweep = audioCtx.createOscillator();
            const sweepG = audioCtx.createGain();
            sweep.type = 'sawtooth';
            sweep.frequency.setValueAtTime(300, now);
            sweep.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
            sweepG.gain.setValueAtTime(0.2, now);
            sweepG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            sweep.connect(sweepG);
            sweepG.connect(audioCtx.destination);
            sweep.start(now);
            sweep.stop(now + 0.5);

            // 화음 팡파레 (C5 + E5 + G5)
            [1046.5, 1318.5, 1568.0].forEach(freq => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.2, now + 0.05);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                o.connect(g);
                g.connect(audioCtx.destination);
                o.start(now + 0.05);
                o.stop(now + 0.7);
            });

            // 노이즈 심벌 (쉬이~)
            const bufSize = audioCtx.sampleRate * 0.3;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.12;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buf;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.25, now + 0.02);
            ng.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            noise.connect(ng);
            ng.connect(audioCtx.destination);
            noise.start(now + 0.02);
            noise.stop(now + 0.35);
        }

        function resetGame() {
            const stageData = STAGES[currentStageIndex];

            // 스테이지별 벽 탄성
            updateBounds(phys.wallR, phys.addTop);

            score = 0;

            particles = [];

            shockwaves = [];

            updateUI();
