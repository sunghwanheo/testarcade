<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <!-- Very squished outer leaves -->
  <ellipse cx="82" cy="92" rx="75" ry="42" fill="#C0E0C0" stroke="#8fc98f" stroke-width="3.5" transform="rotate(-10,82,92)"/>
  <ellipse cx="70" cy="85" rx="38" ry="30" fill="#A8D8A8" opacity="0.7"/>
  <ellipse cx="98" cy="88" rx="32" ry="28" fill="#A8D8A8" opacity="0.5"/>

  <!-- Inner layers (flattened) -->
  <ellipse cx="82" cy="90" rx="28" ry="22" fill="#C8E8C8"/>
  <ellipse cx="82" cy="88" rx="15" ry="13" fill="#D8F0D8"/>

  <!-- Spiral eyes (dizzy) -->
  <path d="M62,80 Q65,74 70,77 Q73,82 68,84 Q63,86 60,82" stroke="#5a7a5a" stroke-width="2.5" fill="none"/>
  <path d="M88,80 Q91,74 96,77 Q99,82 94,84 Q89,86 86,82" stroke="#5a7a5a" stroke-width="2.5" fill="none"/>

  <!-- Wavy mouth -->
  <path d="M70,96 Q75,100 80,96 Q85,92 90,96" stroke="#5a7a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Stars around (dizzy effect) -->
  <text x="48" y="68" font-size="14" fill="#FFE8A8">*</text>
  <text x="108" y="72" font-size="12" fill="#FFE8A8">*</text>
  <text x="100" y="60" font-size="10" fill="#E8D7FF">*</text>
</svg>