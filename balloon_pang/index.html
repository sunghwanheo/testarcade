<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎈 풍선 팡팡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden; background: #000;
  font-family: 'Malgun Gothic', Arial, sans-serif;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }

/* ── 상단 HUD ── */
#topBar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 4%; z-index: 10; pointer-events: none;
}
#timerBox {
  font-size: 36px; font-weight: bold; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  min-width: 82px; text-align: center;
  background: rgba(0,0,0,0.25); border-radius: 16px;
  padding: 4px 14px;
}
#timerBox.warn { color: #FF6B6B; animation: timerWarn 0.5s ease-in-out infinite; }
@keyframes timerWarn { 0%,100%{opacity:1} 50%{opacity:0.5} }
#feverWrap { flex: 1; position: relative; }
#feverLabel {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold; color: rgba(255,255,255,0.85);
  letter-spacing: 1px; pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
#feverOuter {
  height: 34px; background: rgba(255,255,255,0.3);
  border-radius: 17px; border: 3px solid rgba(255,255,255,0.85);
  overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
#feverInner {
  height: 100%; width: 0%;
  background: linear-gradient(90deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF,#C77DFF);
  border-radius: 17px; transition: width 0.3s cubic-bezier(.22,1,.36,1);
}
#feverOuter.fever-active {
  border-color: #FFD700;
  box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,107,107,0.5);
  animation: feverGlow 0.3s ease-in-out infinite alternate;
}
@keyframes feverGlow { from{box-shadow:0 0 20px rgba(255,215,0,0.6)} to{box-shadow:0 0 35px rgba(255,107,107,0.9)} }
#countBox {
  font-size: 30px; font-weight: bold; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  min-width: 72px; text-align: center;
  background: rgba(0,0,0,0.25); border-radius: 16px;
  padding: 4px 12px;
}

/* ── 튜토리얼 ── */
#tutorialScreen {
  display: none; position: fixed; inset: 0; z-index: 95;
  background: #B3E5FC;
}
#tutorialScreen.show { display: block; }
#tutorialVideo {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
#tutorialOverlay {
  position: absolute; inset: 0; pointer-events: none;
}
#tutorialSkipBtn {
  position: absolute; bottom: 4%; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.45); border: 2.5px solid rgba(255,255,255,0.75);
  color: #fff; font-size: clamp(16px,2.8vw,24px); font-weight: bold;
  padding: 13px 42px; border-radius: 50px; cursor: pointer;
  font-family: 'Malgun Gothic', Arial, sans-serif; z-index: 10;
  transition: background 0.2s; pointer-events: auto;
  backdrop-filter: blur(4px);
}
#tutorialSkipBtn:hover { background: rgba(0,0,0,0.72); }

/* ── 로딩 ── */
#loading {
  position: fixed; inset: 0;
  background: linear-gradient(135deg,#1a1a2e,#16213e);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 100; color: #fff;
  text-align: center; padding: 30px; transition: opacity 0.5s;
}
#loading .bi { font-size: 90px; margin-bottom: 24px; animation: floatA 2s ease-in-out infinite; }
@keyframes floatA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
#loading h2 { font-size: 36px; margin-bottom: 14px; }
#loading p  { font-size: 20px; opacity: 0.78; margin-bottom: 32px; line-height: 1.6; }
.spinner {
  width: 58px; height: 58px;
  border: 5px solid rgba(255,255,255,0.22); border-top-color: #C77DFF;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── 메인 화면 ── */
#mainScreen {
  display: none; position: fixed; inset: 0; z-index: 90;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; color: #fff; overflow: hidden;
  background: linear-gradient(180deg, #87CEEB 0%, #b8e4f9 40%, #d4f0ff 70%, #e8f8ff 100%);
}
#mainScreen.show { display: flex; }

/* 구름 */
.mc-cloud {
  position: absolute; background: rgba(255,255,255,0.92);
  border-radius: 50px; pointer-events: none;
}
.mc-cloud::before, .mc-cloud::after {
  content:''; position:absolute; background:rgba(255,255,255,0.92); border-radius:50%;
}


/* 콘텐츠 */
.main-content {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:36px;
}
.main-title {
  font-size: clamp(56px, 11vw, 100px); font-weight: bold;
  line-height: 1.05; margin-bottom: 18px;
  background: linear-gradient(160deg,#FF6B6B 0%,#FF9E3D 40%,#FFD93D 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 3px 0 rgba(200,80,0,0.18));
  animation: floatA 2.5s ease-in-out infinite;
}
.main-sub {
  font-size: clamp(16px, 2.2vw, 21px);
  color: rgba(50,80,120,0.85); font-weight: bold;
  margin-bottom: 52px; line-height: 1.9;
}
#startBtn {
  background: linear-gradient(135deg,#FF6B9D,#FF9E3D);
  border: none; border-radius: 80px; padding: 22px 68px;
  font-size: clamp(26px, 3.5vw, 38px); font-weight: bold;
  color: #fff; cursor: pointer;
  box-shadow: 0 8px 30px rgba(255,107,157,0.45), 0 2px 0 rgba(255,255,255,0.25) inset;
  animation: btnPulse 1s ease-in-out infinite;
  font-family: 'Malgun Gothic', Arial, sans-serif;
  white-space: nowrap; letter-spacing: 1px;
  transition: transform 0.1s;
}
#startBtn:active { transform: scale(0.96); }
#cameraMsg {
  display: none;
  font-size: clamp(14px, 2vw, 17px); font-weight: bold;
  color: #fff;
  background: rgba(0,0,0,0.32);
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 24px; padding: 16px 30px;
  max-width: min(360px, 80vw); line-height: 1.8;
  text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,0.35);
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  backdrop-filter: blur(6px);
  transition: background 0.3s, border-color 0.3s;
}
#cameraMsg.ready {
  background: rgba(30,140,80,0.55);
  border-color: rgba(100,255,160,0.8);
  box-shadow: 0 4px 20px rgba(0,200,100,0.3);
}

/* ── 종료 화면 ── */
#endScreen {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.55);
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; color: #fff;
}
#endScreen.show { display: flex; }
.end-card {
  background: linear-gradient(135deg,rgba(30,20,60,0.95),rgba(20,10,50,0.95));
  border: 3px solid rgba(199,125,255,0.6);
  border-radius: 36px; padding: 50px 70px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.end-icon { font-size: 80px; margin-bottom: 16px; }
.end-title { font-size: 42px; font-weight: bold; margin-bottom: 28px;
  background: linear-gradient(90deg,#FF9DE2,#C77DFF,#4D96FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.end-score-row { font-size: 26px; color: rgba(255,255,255,0.75); margin-bottom: 8px; }
.end-score-num { font-size: 88px; font-weight: bold; line-height: 1;
  color: #FFD700; text-shadow: 0 0 30px rgba(255,215,0,0.6); }
.end-score-unit { font-size: 32px; color: rgba(255,255,255,0.8); margin-bottom: 16px; }
.end-praise { font-size: 28px; color: #FFD700; font-weight: bold; margin-bottom: 30px;
  text-shadow: 0 0 20px rgba(255,215,0,0.5); animation: btnPulse 1.2s ease-in-out infinite; }
#restartBtn {
  background: linear-gradient(135deg,#FF6B9D,#C77DFF);
  border: none; border-radius: 70px; padding: 24px 56px;
  font-size: 36px; font-weight: bold; color: #fff; cursor: pointer;
  box-shadow: 0 10px 40px rgba(199,125,255,0.55);
  animation: btnPulse 0.9s ease-in-out infinite; white-space: nowrap;
}
@keyframes btnPulse {
  0%,100%{transform:scale(1)} 50%{transform:scale(1.07)}
}


</style>
</head>
<body>

<video id="video" style="display:none" playsinline autoplay muted></video>
<canvas id="c"></canvas>

<button id="exit-btn" onclick="window.close()" style="position:fixed;top:12px;left:12px;z-index:200;padding:8px 18px;background:rgba(0,0,0,0.55);color:#fff;border:1.5px solid rgba(255,255,255,0.35);border-radius:20px;font-size:0.95rem;font-weight:700;cursor:pointer;backdrop-filter:blur(6px);letter-spacing:1px;" onmouseover="this.style.background='rgba(255,60,60,0.75)'" onmouseout="this.style.background='rgba(0,0,0,0.55)'">나가기</button>

<div id="topBar">
  <div id="timerBox">1:00</div>
  <div id="feverWrap">
    <div id="feverOuter"><div id="feverInner"></div></div>
    <div id="feverLabel"></div>
  </div>
  <div id="countBox">🎈 0</div>
</div>

<div id="loading" style="display:none"></div>

<!-- 튜토리얼 화면 -->
<div id="tutorialScreen">
  <video id="tutorialVideo" src="media/tutorial.mp4" playsinline></video>
  <canvas id="tutorialOverlay"></canvas>
  <button id="tutorialSkipBtn">건너뛰기 ▶</button>
</div>

<div id="mainScreen" class="show">
  <!-- 배경 튜토리얼 영상 (반복 재생) -->
  <video id="bgTutVideo" src="media/tutorial.mp4" playsinline muted loop autoplay
    style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:1;pointer-events:none;z-index:0;"></video>

  <!-- 구름 -->
  <div class="mc-cloud" style="width:180px;height:55px;top:8%;left:5%;opacity:0.9;">
    <div style="position:absolute;width:80px;height:80px;background:rgba(255,255,255,0.92);border-radius:50%;top:-40px;left:25px;"></div>
    <div style="position:absolute;width:55px;height:55px;background:rgba(255,255,255,0.92);border-radius:50%;top:-25px;left:75px;"></div>
  </div>
  <div class="mc-cloud" style="width:220px;height:60px;top:14%;right:8%;opacity:0.85;">
    <div style="position:absolute;width:90px;height:90px;background:rgba(255,255,255,0.92);border-radius:50%;top:-45px;left:30px;"></div>
    <div style="position:absolute;width:65px;height:65px;background:rgba(255,255,255,0.92);border-radius:50%;top:-30px;left:100px;"></div>
  </div>
  <div class="mc-cloud" style="width:150px;height:45px;top:28%;left:18%;opacity:0.75;">
    <div style="position:absolute;width:65px;height:65px;background:rgba(255,255,255,0.92);border-radius:50%;top:-32px;left:20px;"></div>
    <div style="position:absolute;width:48px;height:48px;background:rgba(255,255,255,0.92);border-radius:50%;top:-22px;left:70px;"></div>
  </div>

  <!-- 풍선 캔버스 -->
  <canvas id="mainCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>

  <!-- 로고 + 인원 선택 (중앙) -->
  <div class="main-content">
    <img id="titleImg" src="assets/title_new.png"
      style="max-width:min(420px,68vw);filter:drop-shadow(0 4px 16px rgba(0,0,0,0.18));"
      alt="풍선 팡팡">
    <div id="player-select" data-max="3"></div>
  </div>

  <!-- 게임 시작 버튼 (하단 고정) -->
  <div style="position:absolute;bottom:8%;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:5;">
    <button id="startBtn">🎈 게임 시작!</button>
    <div id="cameraMsg"></div>
  </div>
</div>


<div id="endScreen">
  <div class="end-card">
    <div class="end-icon">🎊</div>
    <div class="end-title">최고예요!</div>
    <div class="end-score-row">1분 동안</div>
    <div class="end-score-num" id="finalScore">0</div>
    <div class="end-score-unit">개나 터뜨렸어요! 🎉</div>
    <button id="restartBtn">🎈 한 번 더!</button>
  </div>
</div>

<script src="../player-select.js"></script>
<script src="./lang.js"></script>
<script src="../tracking.js" data-game="풍선 팡팡"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
'use strict';

// ── 다국어 ────────────────────────────────────────────────
const LANG = {
  ko: {
    skipBtn:      '건너뛰기 ▶',
    startBtn:     '🎈 게임 시작!',
    endTitle:     '최고예요!',
    endScoreRow:  '1분 동안',
    endScoreUnit: '개나 터뜨렸어요! 🎉',
    restartBtn:   '🎈 한 번 더!',
    pop:          '팡!',
    greatJob:     '잘했어요! 🌟',
    go:           '시작!',
    ready:        '준비',
    feverTime:    '🔥 팡팡타임! 🔥',
    tutGuide:     '손을 뻗어 풍선을 터트려보세요!',
  },
  en: {
    skipBtn:      'Skip ▶',
    startBtn:     '🎈 Start!',
    endTitle:     'Amazing!',
    endScoreRow:  'In 1 minute',
    endScoreUnit: 'balloons popped! 🎉',
    restartBtn:   '🎈 Play Again!',
    pop:          'Pop!',
    greatJob:     'Great job! 🌟',
    go:           'Go!',
    ready:        'Ready',
    feverTime:    '🔥 Fever Time! 🔥',
    tutGuide:     'Reach out and pop the balloons!',
  }
};

function applyLang(l) {
  const t = LANG[l];
  document.title = l === 'en' ? '🎈 Balloon Pop!' : '🎈 풍선 팡팡';
  document.getElementById('tutorialSkipBtn').textContent = t.skipBtn;
  document.getElementById('startBtn').textContent        = t.startBtn;
  document.querySelector('.end-title').textContent       = t.endTitle;
  document.querySelector('.end-score-row').textContent   = t.endScoreRow;
  document.querySelector('.end-score-unit').textContent  = t.endScoreUnit;
  document.getElementById('restartBtn').textContent      = t.restartBtn;
  // 타이틀 이미지
  const titleImg = document.getElementById('titleImg');
  if (titleImg) titleImg.src = l === 'en' ? 'assets/title_en.png' : 'assets/title_new.png';
  // 튜토리얼 타이틀 이미지
  tutTitleImg.src = l === 'en' ? 'assets/tutorial_title_en.png' : 'assets/tutorial_title.png';
}

// ── Canvas ────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const videoEl = document.getElementById('video');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); if (balloon) spawnBalloon(); });

// ── Audio ─────────────────────────────────────────────────
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ── 보이스 응원 사운드 ─────────────────────────────────────
const CHEER_FILES = ['media/voice_cheer_04a.wav','media/voice_cheer_04b.wav','media/voice_cheer_07.wav','media/voice_cheer_09.wav','media/voice_cheer_12.wav'];
const cheerAudios = CHEER_FILES.map(f => { const a=new Audio(f); a.preload='auto'; return a; });
const readyStartAudio = (() => { const a=new Audio('media/voice_ready_start.wav'); a.preload='auto'; return a; })();

const EN_CHEER_FILES = ['media/voice_cheer_04a_en-US.ogg','media/voice_cheer_04b_en-US.ogg','media/voice_cheer_09_en-US.ogg','media/voice_cheer_12_en-US.ogg'];
const enCheerAudios = EN_CHEER_FILES.map(f => { const a=new Audio(f); a.preload='auto'; return a; });
const enReadyStartAudio = (() => { const a=new Audio('media/voice_ready_start_en-US.ogg'); a.preload='auto'; return a; })();

let lastCheerIdx = -1;
function playCheer() {
  if (typeof getLang === 'function' && getLang() === 'en') {
    const idx = Math.floor(Math.random() * enCheerAudios.length);
    const a = enCheerAudios[idx];
    a.currentTime = 0; a.play().catch(()=>{});
    return;
  }
  let idx;
  do { idx = Math.floor(Math.random()*cheerAudios.length); }
  while (idx===lastCheerIdx && cheerAudios.length>1);
  lastCheerIdx = idx;
  const a = cheerAudios[idx];
  a.currentTime = 0;
  a.play().catch(()=>{});
}
function playPop(isFever=false) {
  if (!audioCtx) return;
  const len = audioCtx.sampleRate * 0.14;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.8)*0.9;
  const src=audioCtx.createBufferSource(), gn=audioCtx.createGain();
  src.buffer=buf; gn.gain.setValueAtTime(0.75,audioCtx.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.14);
  src.connect(gn); gn.connect(audioCtx.destination); src.start();
  const osc=audioCtx.createOscillator(), og=audioCtx.createGain();
  osc.frequency.setValueAtTime(isFever?900:650,audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(150,audioCtx.currentTime+0.12);
  osc.type='sine'; og.gain.setValueAtTime(0.4,audioCtx.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
  osc.connect(og); og.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.12);
}
function playChime() {
  if (!audioCtx) return;
  [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f; o.type='sine';
    g.gain.setValueAtTime(0.28,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.6);
  },i*130));
}
function playFeverStart() {
  if (!audioCtx) return;
  [440,554,659,880].forEach((f,i)=>setTimeout(()=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f; o.type='square';
    g.gain.setValueAtTime(0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.3);
  },i*80));
}
// 축하/피날레 팡파레
function playFanfare() {
  if (!audioCtx) return;
  const seq=[[523,0],[659,120],[784,240],[1047,360],[1319,480],[1047,600],[784,720],[1047,900],[1319,1020],[1047,1200],[784,1320],[659,1440],[523,1560]];
  seq.forEach(([f,t])=>setTimeout(()=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0.18,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.55);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.55);
  },t));
}
// BGM
let bgmIntervalId=null, bgmNoteIdx=0;
const BGM_MELODY=[523,659,784,880,784,659,587,523,659,784,880,1047,880,784,659,523];
const BGM_BASS  =[131,131,131,131,175,175,175,175,196,196,196,196,175,175,175,175];
function playBGMStep() {
  if (!audioCtx||audioCtx.state==='suspended') return;
  const freq=BGM_MELODY[bgmNoteIdx%BGM_MELODY.length];
  const bass=BGM_BASS[bgmNoteIdx%BGM_BASS.length];
  const om=audioCtx.createOscillator(),gm=audioCtx.createGain();
  om.type='sine'; om.frequency.value=freq;
  gm.gain.setValueAtTime(0,audioCtx.currentTime);
  gm.gain.linearRampToValueAtTime(0.05,audioCtx.currentTime+0.04);
  gm.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.55);
  om.connect(gm); gm.connect(audioCtx.destination); om.start(); om.stop(audioCtx.currentTime+0.55);
  if (bgmNoteIdx%4===0) {
    const ob=audioCtx.createOscillator(),gb=audioCtx.createGain();
    ob.type='sine'; ob.frequency.value=bass;
    gb.gain.setValueAtTime(0.07,audioCtx.currentTime);

const TUT_MELODY=[
  523,523,784,784,880,880,784,   // 반짝반짝 작은별
  698,698,659,659,587,587,523,   // 아름답게 빛나네

  131,0,175,0,196,0,175,
  175,0,165,0,147,0,131,
  175,0,175,0,165,0,147,
  175,0,175,0,165,0,147,
  131,0,175,0,196,0,175,
  175,0,165,0,147,0,131,

function playTutBGMStep() {
  if (!audioCtx||audioCtx.state==='suspended') return;
  const freq=TUT_MELODY[tutBgmNoteIdx%TUT_MELODY.length];
  const bass=TUT_BASS[tutBgmNoteIdx%TUT_BASS.length];
  if (freq) {
    // 실로폰 느낌: triangle파, 빠른 어택 + 짧은 서스테인
    const om=audioCtx.createOscillator(),gm=audioCtx.createGain();
    om.type='triangle'; om.frequency.value=freq;
    gm.gain.setValueAtTime(0,audioCtx.currentTime);
    gm.gain.linearRampToValueAtTime(0.09,audioCtx.currentTime+0.015);
    gm.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.38);
    om.connect(gm); gm.connect(audioCtx.destination); om.start(); om.stop(audioCtx.currentTime+0.38);
    // 배음 (옥타브 위 살짝) — 반짝이는 느낌

    oh.type='sine'; oh.frequency.value=freq*2;
    gh.gain.setValueAtTime(0.025,audioCtx.currentTime);

    oh.connect(gh); gh.connect(audioCtx.destination); oh.start(); oh.stop(audioCtx.currentTime+0.22);

    ob.type='sine'; ob.frequency.value=bass;
    gb.gain.setValueAtTime(0.06,audioCtx.currentTime);

  // 베이스 + 타악기 (4박마다)

    // 스네어 느낌

function hexA(hex,a) {

const mcCanvas = document.getElementById('mainCanvas');

const DECO_COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9DE2','#FF9E3D'];
const decoB = Array.from({length:8},(_,i)=>({
  x:0, y:0, r:0,
  color: DECO_COLORS[i%DECO_COLORS.length],
  speed:0, swing:0, phase:Math.random()*Math.PI*2,

function initDecoB() {
  mcCanvas.width  = window.innerWidth;
  mcCanvas.height = window.innerHeight;
  mctx = mcCanvas.getContext('2d');
  const mW=mcCanvas.width, mH=mcCanvas.height;
  decoB.forEach(b=>{
    b.r      = rand(28,58);
    b.x      = rand(b.r, mW-b.r);
    b.y      = rand(mH*0.4, mH+b.r*2);
    b.speed  = rand(40,90);
    b.swing  = rand(18,40);
    b._shade1 = shadeColor(b.color, -40); // 매 프레임 파싱 방지
    b._shade2 = shadeColor(b.color, -30);
  });
}
function updateDecoB(dt) {
  const mH=mcCanvas.height, mW=mcCanvas.width;
  decoB.forEach(b=>{
    b.y -= b.speed*dt;
    b.phase += dt*0.9;
    if (b.y < -b.r*3) { b.y=mH+b.r; b.x=rand(b.r,mW-b.r); }
  });
}
function drawDecoB() {
  if (!mctx) return;
  const mW=mcCanvas.width, mH=mcCanvas.height;
  mctx.clearRect(0,0,mW,mH);
  decoB.forEach(b=>{
    const bx = b.x + Math.sin(b.phase)*b.swing;
    mctx.save();
    const grad=mctx.createRadialGradient(bx-b.r*0.28,b.y-b.r*0.28,b.r*0.08,bx,b.y,b.r);
    grad.addColorStop(0,'rgba(255,255,255,0.55)');
    grad.addColorStop(0.45,b.color);
    grad.addColorStop(1,b._shade1);
    mctx.beginPath(); mctx.ellipse(bx,b.y,b.r,b.r*1.18,0,0,Math.PI*2);
    mctx.fillStyle=grad; mctx.fill();
    mctx.beginPath();
    mctx.arc(bx,b.y+b.r*1.18,b.r*0.13,0,Math.PI*2);
    mctx.fillStyle=b._shade2; mctx.fill();
    mctx.beginPath();
    mctx.moveTo(bx,b.y+b.r*1.3);
    mctx.bezierCurveTo(bx+12,b.y+b.r*2,bx-8,b.y+b.r*2.8,bx+4,b.y+b.r*3.5);
    mctx.strokeStyle='rgba(0,0,0,0.25)'; mctx.lineWidth=1.5; mctx.stroke();
    mctx.restore();

}
function shadeColor(hex, amt) {
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,Math.min(255,((n>>16)&0xff)+amt));
  const g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
  const b2=Math.max(0,Math.min(255,(n&0xff)+amt));
  return `rgb(${r},${g},${b2})`;
}

// ── 좌우 교대 위치 ────────────────────────────────────────
function getPeripheralPos(r) {
  const pad  = r * 1.4;
  const cx1  = W * CX1, cx2 = W * CX2;
  // 풍선 반지름 고려: 상단 여백 r*1.2, 하단 여백 r*1.45 (매듭 포함)
  const yMin = Math.max(H * CY_MIN, r * 1.2);
  const yMax = Math.min(H * CY_MAX, H - r * 1.45);

  // 반드시 반대 측으로
  const side = (lastSide === 'left') ? 'right' : 'left';
  lastSide = side;

  // y는 상단/하단으로 변형 가능
  const yMid = H * 0.5;
  const yBand = Math.random() < 0.35
    ? rand(yMin, Math.min(H * 0.38, yMid))   // 상단
    : Math.random() < 0.5
      ? rand(Math.max(H * 0.58, yMid), yMax) // 하단
      : rand(H * 0.35, H * 0.65);            // 중간

  if (side === 'left') {
    const xMax = Math.max(cx1 - pad, pad + r);
    return { x: rand(pad, xMax), y: yBand };
  } else {
    const xMin = Math.min(cx2 + pad, W - pad - r);
    return { x: rand(xMin, W - pad), y: yBand };
  }
}

// ── Balloon draw ──────────────────────────────────────────
function drawBalloon(x, y, r, color, yShift=0) {
  const oy = y + yShift;
  ctx.save(); ctx.translate(x, oy);

  // 1. 매듭 (바디 뒤 — 꼭짓점이 위를 향해 바디에 살짝 가려짐)
  ctx.save(); ctx.scale(1,1.12);
  ctx.beginPath();
  ctx.moveTo(0, r*0.85);        // 꼭짓점 (위, 풍선 안쪽)
  ctx.lineTo(-r*.13, r*1.08);   // 좌하단
  ctx.lineTo(r*.13, r*1.08);    // 우하단
  ctx.closePath(); ctx.fillStyle=darken(color,28); ctx.fill(); ctx.restore();

  // 2. 풍선 바디 (매듭 앞)
  ctx.shadowColor='rgba(0,0,0,0.22)'; ctx.shadowBlur=24; ctx.shadowOffsetY=10;
  ctx.save(); ctx.scale(1,1.12);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
  ctx.restore(); ctx.shadowColor='transparent';

  // 3. 하이라이트 — 바디와 동일한 scale(1,1.12) 안에서 그려야 좌표 일치
  ctx.save(); ctx.scale(1, 1.12);
  // 메인: x=-0.65r, y=-0.3r, 너비=0.25r, 높이=0.1r, 회전=0.65rad
  ctx.beginPath();
  ctx.ellipse(-r*0.65, -r*0.3, r*0.25, r*0.1, -1.2, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.52)'; ctx.fill();
  // 보조: x=-0.4r, y=-0.7r, 반지름=0.05r
  ctx.beginPath();
  ctx.arc(-r*0.413, -r*0.694, r*0.05, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.fill();
  ctx.restore();

  ctx.restore();
  // 실 (줄)
  const ky = oy + r*1.12*1.08;
  ctx.beginPath(); ctx.moveTo(x,ky);
  ctx.bezierCurveTo(x+r*.55,ky+r*.8,x-r*.55,ky+r*1.4,x,ky+r*1.9);
  ctx.strokeStyle='rgba(80,60,60,0.42)'; ctx.lineWidth=2.5; ctx.stroke();
}

// ── Pop effects ───────────────────────────────────────────
function drawStarPath(cx,cy,r,pts,rot) {
  ctx.beginPath();
  for (let i=0;i<pts*2;i++) {
    const ang=(i/(pts*2))*Math.PI*2+rot-Math.PI/2;
    const rad=i%2===0?r:r*.42;
    i===0?ctx.moveTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad)
         :ctx.lineTo(cx+Math.cos(ang)*rad,cy+Math.sin(ang)*rad);
  }
  ctx.closePath();
}
function spawnPop(x, y, r, color) {
  // 원형 파티클
  for (let i=0;i<40;i++) {
    const a=(i/40)*Math.PI*2+rand(-0.08,0.08), s=rand(4,20);
    popParticles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(4,16),color,life:rand(0.6,1.1)});
  }
  // 색종이
  for (let i=0;i<24;i++) {
    popParticles.push({x,y,vx:rand(-15,15),vy:rand(-16,-2),r:rand(5,11),
      color:choice(['#FFD700','#FF6B6B','#6BCB77','#4D96FF','#C77DFF','#FF9DE2','#FFFFFF']),
      life:rand(0.7,1.3),square:true,rot:rand(0,Math.PI)});
  }
  // 별 파티클
  for (let i=0;i<10;i++) {
    const a=(i/10)*Math.PI*2, s=rand(6,18);
    popParticles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(8,20),
      color:choice(['#FFD700','#FFFFFF','#FFB703','#FF9DE2']),
      life:rand(0.8,1.2),star:true,rot:rand(0,Math.PI),rotV:rand(-0.15,0.15)});
  }
  for (let i=0;i<3;i++)
    popRings.push({x,y,r:r*.3,targetR:r*(2.5+i*.7),life:1.0,color,delay:i*0.08});
  pangTexts.push({x,y:y-r*.4,vy:-3,life:1.0,size:Math.round(r*.9)});
  shakeAmt = 22;
}
function updatePop(dt) {
  for (const p of popParticles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.vx*=0.96;
    p.life-=dt*1.7; if(p.square) p.rot+=0.14; if(p.star) p.rot+=p.rotV||0.1;
  }
  popParticles=popParticles.filter(p=>p.life>0);
  for (const rng of popRings) {
    if (rng.delay>0){rng.delay-=dt;continue;}
    rng.r+=(rng.targetR-rng.r)*0.22; rng.life-=dt*3.0;
  }
  popRings=popRings.filter(r=>r.life>0);
  for (const t of pangTexts) { t.y+=t.vy; t.vy*=0.94; t.life-=dt*2.2; }
  pangTexts=pangTexts.filter(t=>t.life>0);
}
function drawPop() {
  for (const p of popParticles) {
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    if (p.star){
      drawStarPath(p.x,p.y,p.r,5,p.rot); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
    } else if (p.square){ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);}
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  for (const rng of popRings) {
    if(rng.delay>0) continue;
    ctx.save(); ctx.globalAlpha=Math.max(0,rng.life)*.75;
    ctx.beginPath(); ctx.arc(rng.x,rng.y,rng.r,0,Math.PI*2);
    ctx.strokeStyle=rng.color; ctx.lineWidth=Math.max(1,rng.life*9); ctx.stroke(); ctx.restore();
  }
  for (const t of pangTexts) {
    const scale=1+(1-t.life)*.6;
    ctx.save(); ctx.globalAlpha=Math.max(0,t.life);
    ctx.font=`bold ${Math.round(t.size*scale)}px 'Malgun Gothic',Arial`;

// ── Fever ─────────────────────────────────────────────────
function startFever() {
  if (getSite() === 'handong') return;
  feverActive=true; feverPopN=0; feverFlashT=0; feverCycleN=0;
  document.getElementById('feverOuter').classList.add('fever-active');
  document.getElementById('feverLabel').textContent='';
  initAudio(); playFeverStart();
  setTimeout(startFeverBGM,420);
}
function endFever() {
  feverActive=false; feverPopN=0;
  stopFeverBGM();
  document.getElementById('feverOuter').classList.remove('fever-active');
  document.getElementById('feverLabel').textContent='';
  updateFeverGauge();
  startBGM();
}
function updateFever(dt) {
  if (!feverActive) return;
  feverFlashT+=dt*5;
}
function drawFeverOverlay() {
  if (!feverActive) return;
  const alpha=0.95;
  const bw=40;
  const grad=ctx.createLinearGradient(0,0,W,0);
  RAINBOW.forEach((c,i)=>grad.addColorStop(i/(RAINBOW.length-1),c));
  ctx.save();
  // 외곽 두꺼운 무지개 테두리
  ctx.globalAlpha=alpha*(0.8+Math.sin(feverFlashT)*.2);
  ctx.strokeStyle=grad; ctx.lineWidth=bw;
  ctx.strokeRect(bw/2,bw/2,W-bw,H-bw);
  // 안쪽 빛나는 흰 테두리
  ctx.globalAlpha=alpha*(0.35+Math.sin(feverFlashT*2)*.25);
  ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=5;
  ctx.strokeRect(bw+8,bw+8,W-bw*2-16,H-bw*2-16);
  ctx.restore();
  // FEVER 텍스트
  const pulse=1+Math.sin(feverFlashT*2.5)*.09;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.translate(W/2, H*.115); ctx.scale(pulse,pulse);
  ctx.font="bold 48px 'Malgun Gothic',Arial";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=7; ctx.strokeStyle='#fff'; ctx.strokeText(LANG[getLang()].feverTime,0,0);
  ctx.fillStyle='#FFD700'; ctx.fillText(LANG[getLang()].feverTime,0,0);
  ctx.restore();
}
function updateFeverGauge() {
  const pct = getSite() === 'handong'
    ? ((GAME_TIME - gameTimer) / GAME_TIME * 100)
    : feverActive ? 100 : (feverCycleN / FEVER_EVERY * 100);
  document.getElementById('feverInner').style.width = pct + '%';
}

// ── Timer ─────────────────────────────────────────────────
function updateTimerDisplay() {
  const s   = Math.ceil(gameTimer);
  const min = Math.floor(s/60);
  const sec = s % 60;
  const el  = document.getElementById('timerBox');
  el.textContent = `${min}:${sec.toString().padStart(2,'0')}`;

// ── HUD ───────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('countBox').textContent = `🎈 ${popped}`;
  updateFeverGauge();
}

// ── Hit test ──────────────────────────────────────────────
function effectiveR() {
  if (!balloon) return 0;
  return (gameState==='playing' && hintTimer>=7) ? balloon.r*1.5 : balloon.r;
}
function hitTest(px, py) {
  if (!balloon) return false;
  const dx=px-balloon.x, dy=py-balloon.y;
  const er=effectiveR();
  return dx*dx+dy*dy <= er*er;
}

// ── Pop trigger ───────────────────────────────────────────
function doPop() {
  if (!balloon||!canPop||gameState!=='playing') return;
  canPop=false;
  const prevHintTimer=hintTimer; // 리셋 전에 먼저 저장
  hintTimer=0;
  initAudio(); playPop(feverActive); playCheer();
  spawnPop(balloon.x, balloon.y, balloon.r, balloon.color);
  popped++;
  if (feverActive) {
    feverPopN += 1;
    if (feverPopN >= FEVER_POPS) endFever();
  } else {
    const bonus = prevHintTimer >= 7 ? 3 : prevHintTimer >= 3 ? 2 : 1;
    feverCycleN += bonus;
    if (feverCycleN >= FEVER_EVERY) startFever();
  }
  updateHUD();
  balloon=null;
  setTimeout(spawnBalloon, feverActive ? SPAWN_FEVER : SPAWN_DELAY);
}

// ── 힌트 표시 (10초 미반응 시) ────────────────────────────

// ── 힌트: 글로우 (3초: 풍선 색 / 7초+: 무지개) ─────────
function drawHintRainbowGlow(bx, by) {
  if (!balloon||hintTimer<3||gameState!=='playing') return;
  const pulse=(Math.sin(wobbleT*2.0)+1)/2;
  const er=effectiveR();

  if (hintTimer<7) {
    // 3~7초: 풍선과 같은 색 은은한 글로우
    const glowR=er*1.85+pulse*12;
    const col=feverActive?RAINBOW[Math.floor(wobbleT*5)%RAINBOW.length]:balloon.color;
    const gr=ctx.createRadialGradient(bx,by,er*.5,bx,by,glowR);
    gr.addColorStop(0, hexA(col, 0.32+pulse*.14));
    gr.addColorStop(1, hexA(col, 0));
    ctx.save();
    ctx.beginPath(); ctx.arc(bx,by,glowR,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill(); ctx.restore();
  } else {
    // 7초+: 무지개 글로우
    const hue=(wobbleT*55)%360;
    const glowR=er*2.2+pulse*18;
    const gr=ctx.createRadialGradient(bx,by,er*.4,bx,by,glowR);
    gr.addColorStop(0,   `hsla(${hue},100%,68%,${0.40+pulse*.18})`);
    gr.addColorStop(0.45,`hsla(${(hue+120)%360},100%,62%,${0.15+pulse*.10})`);
    gr.addColorStop(1,   `hsla(${(hue+240)%360},100%,58%,0)`);
    ctx.save();
    ctx.beginPath(); ctx.arc(bx,by,glowR,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill(); ctx.restore();
  }
}

// ── Pose detection (Gemini 방식) ──────────────────────────
function onPoseResults(results) {
  bodyPoints = [];
  if (!results.poseLandmarks) return;

  const lms = results.poseLandmarks;
  const dist2D = (a,b) => {
    const ax=(1-a.x)*W, ay=a.y*H, bx=(1-b.x)*W, by=b.y*H;
    return Math.hypot(ax-bx, ay-by);
  };

  // ── 가장 앞 사람 필터 (어깨 너비 기준) ──
  const ls = lms[11], rs = lms[12];
  if (ls && rs && ls.visibility >= 0.4 && rs.visibility >= 0.4) {
    const sw = dist2D(ls, rs);
    if (baselineShoulderW === 0) {
      baselineShoulderW = sw; // 첫 프레임 기준값 설정
    } else if (sw < baselineShoulderW * 0.55) {
      return; // 뒷사람 감지 → 무시
    } else {
      baselineShoulderW = baselineShoulderW * 0.97 + sw * 0.03; // 서서히 적응
    }
  }

  // 손 추적: 손목~검지 중심 + 실제 손 크기를 반경으로
  const trackHand = (wristIdx, indexIdx) => {
    const wrist=lms[wristIdx], index=lms[indexIdx];
    if (!wrist||!index) return null;
    if (wrist.visibility<0.4||index.visibility<0.4) return null;
    let r = dist2D(wrist, index);
    r = Math.max(40, Math.min(r, 220));
    return { x:(1-(wrist.x+index.x)/2)*W, y:((wrist.y+index.y)/2)*H, radius:r, id:wristIdx, type:'hand' };
  };

  // 발 추적: 발목~발끝 중심 + 발 크기를 반경으로
  const trackFoot = (ankleIdx, toeIdx) => {
    const ankle=lms[ankleIdx], toe=lms[toeIdx];
    if (!ankle||!toe) return null;
    if (ankle.visibility<0.4||toe.visibility<0.4) return null;
    let r = dist2D(ankle, toe);
    r = Math.max(35, Math.min(r, 180));
    return { x:(1-(ankle.x+toe.x)/2)*W, y:((ankle.y+toe.y)/2)*H, radius:r, id:ankleIdx, type:'foot' };
  };

  const parts = [
    trackHand(15,19), // 왼손
    trackHand(16,20), // 오른손
    trackFoot(27,31), // 왼발
    trackFoot(28,32), // 오른발
  ].filter(Boolean);

  for (const p of parts) {
    const prev = prevBodyPos[p.id];
    p.vx = prev ? p.x-prev.x : 0;
    p.vy = prev ? p.y-prev.y : 0;
    prevBodyPos[p.id] = {x:p.x, y:p.y};
    bodyPoints.push(p);
  }

  if (gameState!=='playing'||!balloon||!canPop) return;

  const er = effectiveR();
  for (const p of bodyPoints) {
    const dx=balloon.x-p.x, dy=balloon.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if (dist < p.radius+er && speed > HIT_SPEED_THRESH) {
      doPop(); break;
    }
  }
}

function drawHandDots() {
  for (const p of bodyPoints) {
    const isHand = p.type==='hand';
    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius*0.5, 0, Math.PI*2);
    ctx.fillStyle = isHand ? 'rgba(255,255,255,0.1)' : 'rgba(255,200,80,0.1)';
    ctx.fill();
    ctx.strokeStyle = feverActive ? choice(RAINBOW)
                    : isHand ? 'rgba(199,125,255,0.8)' : 'rgba(255,170,50,0.8)';
    ctx.lineWidth = 4;
    ctx.shadowBlur = 16;
    ctx.shadowColor = feverActive ? 'rgba(255,200,0,0.6)'
                    : isHand ? 'rgba(199,125,255,0.5)' : 'rgba(255,150,0,0.4)';
    ctx.stroke();
    ctx.restore();
  }
}

// ── Countdown ─────────────────────────────────────────────
function startPlaying() {
  if (typeof trackPlay === 'function') trackPlay();
  if (gameState!=='countdown') return;
  gameState='playing';
  startBGM();
  spawnBalloon();
}
function playReadyStart() {
  const audio = (typeof getLang === 'function' && getLang() === 'en') ? enReadyStartAudio : readyStartAudio;
  readyStartAudio.onended = null;
  enReadyStartAudio.onended = null;
  audio.currentTime = 0;
  audio.onended = startPlaying;
  audio.play().catch(()=>setTimeout(startPlaying, 2000));
}
function updateCountdown(dt) {
  countdownT+=dt;
  if (countdownN===1 && countdownT>=(getLang()==='en' ? 0.5 : 1.0)) {
    countdownT=0;
    countdownN=0; // 시작! 표시 — 오디오 종료 시 게임 시작
  }
}
function drawCountdown() {
  if (countdownN < 0) return;
  const label = countdownN===0 ? LANG[getLang()].go : LANG[getLang()].ready;
  const scale = 1+Math.sin(Math.min(countdownT,1)*Math.PI)*0.4;
  const alpha = 1;
  ctx.save();

  ctx.translate(W/2,H/2); ctx.scale(scale,scale);
  ctx.font=`bold ${Math.round(Math.min(W,H)*.28)}px 'Malgun Gothic',Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=18;
  ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.strokeText(label,0,0);
  ctx.fillStyle=countdownN<=0?'#6BCB77':'#FFD700'; ctx.fillText(label,0,0);
  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────
let prevTs=0;
function loop(ts) {
  const dt=Math.min((ts-prevTs)/1000,.05); prevTs=ts;

  // 메인화면: 게임 캔버스는 #mainScreen 뒤에 가려져 있으므로 데코 풍선만 처리
  if (gameState==='main') {
    updateDecoB(dt);
    drawDecoB();
    requestAnimationFrame(loop);
    return;
  }

  ctx.save();
  if (shakeAmt>.5) {
    ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);
    shakeAmt*=.78;
  } else shakeAmt=0;
  ctx.clearRect(-50,-50,W+100,H+100);

  wobbleT+=dt;

  // 배경 (카메라 or 스카이)
  if (cameraReady&&videoEl.readyState>=2) {
    ctx.save(); ctx.scale(-1,1); ctx.drawImage(videoEl,-W,0,W,H); ctx.restore();
    drawCloudOverlay();
  } else {
    drawBG();
  }

  if (gameState==='countdown') {
    updateCountdown(dt);
    drawCountdown();
  }

  // 타이머 업데이트
  if (gameState==='playing') {
    gameTimer-=dt;
    if (gameTimer<=0) { gameTimer=0; triggerGameEnd(); }
    updateTimerDisplay();
    updateFever(dt);
    if (getSite() === 'handong') updateFeverGauge();

    hintTimer+=dt;

    if (balloon) {
      // 기본 부유 효과 (살랑살랑 + 숨쉬기)
      const floatX = !feverActive ? Math.sin(wobbleT*1.4)*5 : 0;
      const floatY = !feverActive ? Math.cos(wobbleT*0.9)*3 : 0;
      // 3초+ 서서히 최대 1.5배까지 성장 (5초에 걸쳐 점진적으로)
      const hintScale = hintTimer>=3 ? Math.min(1.5, 1.0 + (hintTimer-3)*0.1) : 1.0;

      const wobble=balloon.cfg.wobble?Math.sin(wobbleT*2.8)*11:0;
      const feverWobble=feverActive?Math.cos(wobbleT*4.5)*7:0;
      // 피버 중 진동 (스릴감)
      const fvX=feverActive?Math.sin(wobbleT*26)*4.5:0;
      const fvY=feverActive?Math.cos(wobbleT*31)*3.5:0;
      const breath=1+Math.sin(wobbleT*1.6)*.03;

      let col=balloon.color;
      if (feverActive) col=RAINBOW[Math.floor(wobbleT*5)%RAINBOW.length];

      const bx=balloon.x+fvX+floatX;
      const by=balloon.y+fvY+floatY;
      drawHintRainbowGlow(bx, by); // 글로우 (풍선 뒤, 5/10초+)
      ctx.save();
      ctx.translate(bx,by); ctx.scale(breath*hintScale,breath*hintScale); ctx.translate(-bx,-by);
      drawBalloon(bx,by,balloon.r,col,wobble+feverWobble);
      ctx.restore();
    }
    // 팡팡타임 색종이 비 (위에서 아래로 떨어짐)
    if (feverActive&&Math.random()<0.28&&feverSparkles.length<45) {
      feverSparkles.push({
        x:rand(0,W), y:-12,
        vx:rand(-1.2,1.2), vy:rand(2.5,5.5),
        w:rand(7,16), h:rand(3,7),
        color:choice(RAINBOW),
        rot:rand(0,Math.PI), rotV:rand(-0.12,0.12)
      });
    }
    // 색종이 업데이트 + 렌더
    for(const p of feverSparkles){
      p.x+=p.vx+Math.sin(wobbleT*2+p.y*0.008)*0.9;
      p.y+=p.vy; p.rot+=p.rotV;
    }
    feverSparkles=feverSparkles.filter(p=>p.y<H+20);
    for(const p of feverSparkles){
      ctx.save(); ctx.globalAlpha=0.82;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
    drawHandDots(); updatePop(dt); drawPop();
    drawFeverOverlay();
  }

  if (gameState==='finale') {
    updateFinale(dt); drawFinale();
    drawHandDots(); updatePop(dt); drawPop();
  }

  if (gameState==='ended') {
    if (cameraReady&&videoEl.readyState>=2) {
      ctx.save(); ctx.scale(-1,1); ctx.drawImage(videoEl,-W,0,W,H); ctx.restore();
      drawCloudOverlay();
    } else { drawBG(); }
    updateEndConfetti(dt); drawEndConfetti();
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// ── MediaPipe ─────────────────────────────────────────────
async function initMediaPipe() {
  const pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
  pose.setOptions({
    modelComplexity:1,
    smoothLandmarks:false,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
  });
  pose.onResults(onPoseResults);

  const camera=new Camera(videoEl,{
    onFrame:async()=>{ await pose.send({image:videoEl}); },
    width:1280,height:720
  });
  camera.start()
    .then(()=>{
      cameraPermission='granted'; cameraReady=true; initAudio();
      const msg=document.getElementById('cameraMsg');
      const isEn=typeof getLang==='function'&&getLang()==='en';
      msg.textContent=isEn?'✅ Ready!':'✅ 카메라 준비 완료!';
      msg.classList.add('ready');
      msg.style.display='block';
    })
    .catch(()=>{ cameraPermission='denied'; showCameraError(); initAudio(); });
}

function showCameraError() {
  const msg = document.getElementById('cameraMsg');
  if (!msg) return;
  const isEn = typeof getLang === 'function' && getLang() === 'en';
  msg.textContent = isEn
    ? '📷 Camera permission is required to play.'
    : '📷 카메라 권한이 필요해요.\n브라우저에서 권한을 허용해주세요.';
  msg.style.display = 'block';
}

canvas.addEventListener('mousedown',e=>{

canvas.addEventListener('touchstart',e=>{

document.addEventListener('keydown',e=>{

});
// ══════════════════════════════════════════════════════════
// ── 튜토리얼 시스템 ───────────────────────────────────────
// ══════════════════════════════════════════════════════════
const tutorialVideoEl  = document.getElementById('tutorialVideo');
const tutorialOverlayEl= document.getElementById('tutorialOverlay');
const tutorialSkipBtn  = document.getElementById('tutorialSkipBtn');
let tutCtx, tutW, tutH;
let tutLoop = 0;
const TUT_MAX_LOOPS = 2;
let tutRAF = 0;
let tutElapsed = 0; // 렌더 경과시간 (wobble용)

// ── 튜토리얼 풍선 시퀀스 (video.currentTime 기준, 초) ────
// tAppear: 풍선 등장 시작, tPop: 팡 터짐
// side: 'L'(왼쪽 x=0.28) | 'R'(오른쪽 x=0.72)
// ※ 영상 타이밍 조정 시 tAppear/tPop 값만 수정하세요
const TUT_SEQ = [
  { side:'L', color:'#FF6BB5', tAppear:0.1,  tPop:1.0  },
  { side:'R', color:'#4D96FF', tAppear:4.0,  tPop:6.0  },
];
let tutSeqIdx = 0;
let tutBalloon = null; // 현재 활성 풍선
// 게임과 동일한 팝 파티클 (튜토리얼 전용 배열)
let tutPopParts = [], tutPopRings = [], tutPangTxts = [];

function resizeTutCanvas() {
  tutW = tutorialOverlayEl.width  = window.innerWidth;
  tutH = tutorialOverlayEl.height = window.innerHeight;
}

// ── 게임과 동일한 drawBalloon (tutCtx 용) ────────────────
function tutDrawBalloon(x, y, r, color, yShift) {
  const c = tutCtx;
  const oy = y + (yShift||0);
  c.save(); c.translate(x, oy);
  // 매듭
  c.save(); c.scale(1,1.12);
  c.beginPath();
  c.moveTo(0, r*0.85); c.lineTo(-r*.13, r*1.08); c.lineTo(r*.13, r*1.08);
  c.closePath(); c.fillStyle=darken(color,28); c.fill(); c.restore();
  // 바디
  c.shadowColor='rgba(0,0,0,0.22)'; c.shadowBlur=24; c.shadowOffsetY=10;
  c.save(); c.scale(1,1.12);
  c.beginPath(); c.arc(0,0,r,0,Math.PI*2); c.fillStyle=color; c.fill();
  c.restore(); c.shadowColor='transparent';
  // 하이라이트
  c.save(); c.scale(1,1.12);
  c.beginPath(); c.ellipse(-r*0.65,-r*0.3,r*0.25,r*0.1,-1.2,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,0.52)'; c.fill();
  c.beginPath(); c.arc(-r*0.413,-r*0.694,r*0.05,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,0.32)'; c.fill(); c.restore();
  c.restore();
  // 실
  const ky = oy + r*1.12*1.08;
  c.beginPath(); c.moveTo(x,ky);
  c.bezierCurveTo(x+r*.55,ky+r*.8,x-r*.55,ky+r*1.4,x,ky+r*1.9);
  c.strokeStyle='rgba(80,60,60,0.42)'; c.lineWidth=2.5; c.stroke();
}

// ── 게임과 동일한 spawnPop (tutCtx 용) ───────────────────
function tutSpawnPop(x, y, r, color) {
  for (let i=0;i<40;i++) {
    const a=(i/40)*Math.PI*2+rand(-0.08,0.08), s=rand(4,20);
    tutPopParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(4,16),color,life:rand(0.6,1.1)});
  }
  for (let i=0;i<24;i++) {
    tutPopParts.push({x,y,vx:rand(-15,15),vy:rand(-16,-2),r:rand(5,11),
      color:choice(['#FFD700','#FF6B6B','#6BCB77','#4D96FF','#C77DFF','#FF9DE2','#FFFFFF']),
      life:rand(0.7,1.3),square:true,rot:rand(0,Math.PI)});
  }
  for (let i=0;i<10;i++) {
    const a=(i/10)*Math.PI*2, s=rand(6,18);
    tutPopParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(8,20),
      color:choice(['#FFD700','#FFFFFF','#FFB703','#FF9DE2']),
      life:rand(0.8,1.2),star:true,rot:rand(0,Math.PI),rotV:rand(-0.15,0.15)});
  }
  for (let i=0;i<3;i++)
    tutPopRings.push({x,y,r:r*.3,targetR:r*(2.5+i*.7),life:1.0,color,delay:i*0.08});
  tutPangTxts.push({x,y:y-r*.4,vy:-3,life:1.0,size:Math.round(r*.9)});
  playPop(false);
}

function tutUpdatePop(dt) {
  for (const p of tutPopParts) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.5; p.vx*=0.96;
    p.life-=dt*1.7; if(p.square)p.rot+=0.14; if(p.star)p.rot+=p.rotV||0.1;
  }
  tutPopParts=tutPopParts.filter(p=>p.life>0);
  for (const rng of tutPopRings) {
    if(rng.delay>0){rng.delay-=dt;continue;}
    rng.r+=(rng.targetR-rng.r)*0.22; rng.life-=dt*3.0;
  }
  tutPopRings=tutPopRings.filter(r=>r.life>0);
  for (const t of tutPangTxts) { t.y+=t.vy; t.vy*=0.94; t.life-=dt*2.2; }
  tutPangTxts=tutPangTxts.filter(t=>t.life>0);
}

function tutDrawPop() {
  const c = tutCtx;
  for (const p of tutPopParts) {
    c.save(); c.globalAlpha=Math.max(0,p.life); c.fillStyle=p.color;
    if (p.star) {
      // drawStarPath 인라인
      c.beginPath();
      for (let i=0;i<10;i++) {
        const ang=(i/10)*Math.PI*2+p.rot-Math.PI/2;
        const rad=i%2===0?p.r:p.r*.42;
        i===0?c.moveTo(p.x+Math.cos(ang)*rad,p.y+Math.sin(ang)*rad)
             :c.lineTo(p.x+Math.cos(ang)*rad,p.y+Math.sin(ang)*rad);
      }
      c.closePath(); c.fill();
      c.strokeStyle='rgba(255,255,255,0.6)'; c.lineWidth=1.5; c.stroke();
    } else if (p.square) {
      c.translate(p.x,p.y); c.rotate(p.rot); c.fillRect(-p.r/2,-p.r/2,p.r,p.r);
    } else {
      c.beginPath(); c.arc(p.x,p.y,p.r,0,Math.PI*2); c.fill();
    }
    c.restore();
  }
  for (const rng of tutPopRings) {
    if(rng.delay>0) continue;
    c.save(); c.globalAlpha=Math.max(0,rng.life)*.75;
    c.beginPath(); c.arc(rng.x,rng.y,rng.r,0,Math.PI*2);
    c.strokeStyle=rng.color; c.lineWidth=Math.max(1,rng.life*9); c.stroke(); c.restore();
  }
  for (const t of tutPangTxts) {
    const scale=1+(1-t.life)*.6;
    c.save(); c.globalAlpha=Math.max(0,t.life);
    c.font=`bold ${Math.round(t.size*scale)}px 'Malgun Gothic',Arial`;
    c.textAlign='center'; c.textBaseline='middle';
    c.lineWidth=5; c.strokeStyle='#fff'; c.strokeText(LANG[getLang()].pop,t.x,t.y);
    c.fillStyle='#FF2222'; c.fillText(LANG[getLang()].pop,t.x,t.y); c.restore();
  }
}

// ── 튜토리얼 타이틀 이미지 (프리로드) ───────────────────
const tutTitleImg = new Image();
tutTitleImg.src = 'assets/tutorial_title.png';

// ── 상단: 타이틀 이미지 + 안내 문구 ─────────────────────
function drawTutGuide() {
  const c = tutCtx;
  const imgH = tutH * 0.12;  // 타이틀 이미지 높이
  const imgW = tutTitleImg.complete && tutTitleImg.naturalWidth > 0
    ? imgH * (tutTitleImg.naturalWidth / tutTitleImg.naturalHeight)
    : tutW * 0.5;
  const imgY = tutH * 0.01;
  const imgX = (tutW - imgW) / 2;

  const sz = Math.round(Math.min(tutW,tutH)*0.033);
  const textY = imgY + imgH + sz * 0.8;

  // 반투명 배경 바
  const barH = textY + sz * 1.1;
  const g = c.createLinearGradient(0,0,0,barH);
  g.addColorStop(0,'rgba(0,0,0,0.42)'); g.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=g; c.fillRect(0,0,tutW,barH);

  // 타이틀 이미지
  if (tutTitleImg.complete && tutTitleImg.naturalWidth > 0) {
    c.drawImage(tutTitleImg, imgX, imgY, imgW, imgH);
  }

  // 안내 텍스트
  c.save();
  c.textAlign='center'; c.textBaseline='middle';
  c.font=`bold ${sz}px 'Malgun Gothic',Arial`;
  c.lineWidth=Math.round(sz*0.15);
  c.strokeStyle='rgba(0,0,0,0.55)'; c.strokeText(LANG[getLang()].tutGuide,tutW/2,textY);
  c.fillStyle='#ffffff'; c.fillText(LANG[getLang()].tutGuide,tutW/2,textY);
  c.restore();
}

let tutLastTime = 0;
function tutRenderLoop(ts) {
  tutRAF = requestAnimationFrame(tutRenderLoop);
  const dt = Math.min(0.08, (ts-(tutLastTime||ts))/1000);
  tutLastTime = ts;
  tutElapsed += dt;

  tutCtx.clearRect(0,0,tutW,tutH);

  const bR = baseRadius();
  const curT = tutorialVideoEl.currentTime;

  // ── 시퀀스 진행 ──────────────────────────────────────────
  if (tutSeqIdx < TUT_SEQ.length) {
    const seq = TUT_SEQ[tutSeqIdx];
    const bx = seq.side==='L' ? tutW*0.22 : tutW*0.83;
    const by = seq.side==='L' ? tutH*0.30 : tutH*0.38;

    // 풍선 생성
    if (!tutBalloon && curT >= seq.tAppear) {
      tutBalloon = {x:bx, y:by, r:bR, color:seq.color, appear:0, popped:false};
    }
    // 풍선 업데이트
    if (tutBalloon && !tutBalloon.popped) {
      tutBalloon.appear = Math.min(1, tutBalloon.appear + dt*2.5);
      // 팡 타이밍
      if (curT >= seq.tPop) {
        tutBalloon.popped = true;
        tutSpawnPop(tutBalloon.x, tutBalloon.y, tutBalloon.r, tutBalloon.color);
        tutBalloon = null;
        tutSeqIdx++;
      }
    }
  }

  // 팝 파티클 업데이트
  tutUpdatePop(dt);

  // ── 풍선 그리기 ──────────────────────────────────────────
  if (tutBalloon && !tutBalloon.popped && tutBalloon.appear > 0) {
    const floatY = Math.sin(tutElapsed*1.4)*3;
    const sc = tutBalloon.appear;
    tutCtx.save();
    tutCtx.translate(tutBalloon.x, tutBalloon.y);
    tutCtx.scale(sc, sc);
    tutCtx.translate(-tutBalloon.x, -tutBalloon.y);
    tutDrawBalloon(tutBalloon.x, tutBalloon.y, tutBalloon.r, tutBalloon.color, floatY);
    tutCtx.restore();
  }

  // 팝 효과
  tutDrawPop();

  // 상단 안내 텍스트
  drawTutGuide();
}

function resetTutSeq() {
  tutSeqIdx = 0; tutBalloon = null;
  tutPopParts = []; tutPopRings = []; tutPangTxts = [];
  tutElapsed = 0;
}

function startTutorial() {
  document.getElementById('tutorialScreen').classList.add('show');
  resizeTutCanvas();
  tutCtx = tutorialOverlayEl.getContext('2d');
  tutLoop = 0;
  resetTutSeq();

  tutorialVideoEl.currentTime = 0;
  tutorialVideoEl.loop = false;
  tutorialVideoEl.playbackRate = 1.25;

  tutorialVideoEl.onended = () => {
    tutLoop++;
    if (tutLoop >= TUT_MAX_LOOPS) { endTutorial(); return; }
    tutorialVideoEl.currentTime = 0;
    resetTutSeq();
    tutorialVideoEl.play().catch(()=>{});
  };

  tutLastTime = 0;
  tutRAF = requestAnimationFrame(tutRenderLoop);
  startTutBGM();
  tutorialVideoEl.play().then(() => {
    if (getLang() === 'ko') {
      const v1 = new Audio('balloon_tut_1.wav');
      v1.play().catch(() => {});
      v1.onended = () => { new Audio('balloon_tut_2.wav').play().catch(() => {}); };
    }
  }).catch(() => { endTutorial(); });
}

function endTutorial() {
  cancelAnimationFrame(tutRAF);
  tutorialVideoEl.pause();
  tutorialVideoEl.onended = null;
  document.getElementById('tutorialScreen').classList.remove('show');
  stopTutBGM();
  gameState = 'countdown';
  countdownN = 1; countdownT = 0;
  playReadyStart();
}

tutorialSkipBtn.addEventListener('click', endTutorial);
tutorialSkipBtn.addEventListener('touchstart', e=>{e.preventDefault();endTutorial();},{passive:false});
window.addEventListener('resize', resizeTutCanvas);

function startGame() {
  if (cameraPermission === 'denied') { showCameraError(); return; }
  if (cameraPermission === 'pending') {
    const msg = document.getElementById('cameraMsg');
    const isEn = typeof getLang === 'function' && getLang() === 'en';
    if (msg) { msg.textContent = isEn ? '📷 Connecting camera...' : '📷 카메라 연결 중...'; msg.style.display = 'block'; }
    return;
  }
  const msg = document.getElementById('cameraMsg');
  msg.style.display = 'none'; msg.classList.remove('ready');
  initAudio();
  baselineShoulderW = 0;
  const bgVid = document.getElementById('bgTutVideo');
  if (bgVid) bgVid.pause();
  document.getElementById('mainScreen').classList.remove('show');
  // 튜토리얼 없이 바로 카운트다운 시작
  gameState = 'countdown';
  countdownN = 1; countdownT = 0;
  playReadyStart();
}
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, {passive:false});
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('restartBtn').addEventListener('touchstart', e => { e.preventDefault(); restartGame(); }, {passive:false});

// ── 시작 ─────────────────────────────────────────────────
updateHUD(); updateTimerDisplay();
initDecoB();
// 카메라 연결 중 상태 초기 표시
(()=>{
  const msg=document.getElementById('cameraMsg');
  const isEn=typeof getLang==='function'&&getLang()==='en';
  msg.textContent=isEn?'📷 Connecting camera...':'📷 카메라 연결 중...';
  msg.style.display='block';
})();
requestAnimationFrame(loop);
setTimeout(initMediaPipe, 200);
